body:
  text: 西溪易説卷十一宋李過撰下經震上震下震震亨震來虩虩笑言啞啞震驚百里不喪七鬯彖曰震亨震來虩虩恐致福也笑言啞啞後有則也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也洊雷為震雷天地之威也莫震如之處震驚而不動然後可以觀人之所養人固有也疾雷破山而耳不懾泰山墮前而目不瞬者其中有主而所存者素定也其義則見于震曰震亨恐懼而至亨也虩虩恐懼貌當天地動威之時不可不恐懼故震來虩虩然君子所履出處語默皆有常則不可以恐懼而變也故笑言啞啞震驚百里震之極也當其承宗廟祭祀手執匕鬯以交鬼神此時此心純一無間雖震驚百里而所執不喪也人心常如執七鬯之時則天下患難莫之恐懼矣惟六五爻可以當之彖曰震亨震來虩虩恐致福也以恐懼而致福也笑言啞啞後有則也雖處恐懼而出處語默之常則不失也驚逺懼邇震之極也處震之極而此心不動則可以守宗廟而主祭矣此就于不喪匕鬯之中取義也象曰洊雷震君子以恐懼修省恐懼修省此心無時而不存也初九震來虩虩後笑言啞啞吉象曰震來虩虩恐致福也笑言啞啞後有則也震之初言所以處震之道已見于彖六二震來厲億喪貝躋于九陵勿逐七日得象曰震來厲乘剛也雷陽氣也陽居初與四為洊雷二與三為初所震五與上為四所震六二以柔居柔中無所主者也為初所震大喪其所有之貝互體有艮升艮之上而至六五五能無喪六二之貝既喪而復得艮少陽其數七越艮而得五是七日也故曰躋于九陵勿逐七日得謂六二中無所守能如六五之有事則可以無喪也象曰乘剛也謂乘初九之剛為初所震也六三震蘇蘇震行無眚象曰震蘇蘇位不當也以六居三其位本危况處震六為初所震氣息僅存故震蘇蘇然以恐懼而行亦可無眚不失為戒謹之事也象曰位不當也以三位不正也九四震遂泥象曰震遂泥未光也四處洊雷陷互體坎中遂泥之象也象曰未光也以中行剛非善處恐懼者六五震往來厲億無喪有事象曰震往來厲危行也具事在中大無喪也五為洊雷所震初震才往四震又來故曰震往來厲以柔處剛中有所主故震而無喪其所以無喪者以其有事也孟子所謂必有事焉而勿正曰有事存養之功也此心所存當如執匕鬯之時則何恐懼之可變故六五有事雖洊雷而不能震也不失匕鬯此爻當之象曰震往來厲危行也謂莫危于洊雷也其事在中大無喪也惟此心主一其中有事則大無喪也億大也上六震索索視矍矍征凶震不于其躬于其鄰無咎婚媾有言象曰震索索中未得也雖凶無咎畏鄰戒也處震之極為洊雷所恐故索索而又矍矍驚懼如此征則必凶然四震在五非震六也震不在己之躬而在已之鄰因鄰致戒可以無咎蓋恐懼戒謹不失為謹獨之學也己應在三婚媾也三居坎下坎為小有言三震蘇蘇豈能救已所以有言象曰震索索中未得也以中未有所得故其恐索索雖凶無咎畏鄰戒也凶而無咎者因鄰致戒聖人與之艮下艮下艮艮其背不獲其身行其庭不見其人無咎彖曰艮止也時止則止時行則行動靜不失其時其道光明艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人無咎也艮止也止其所而不與物接也不與物接則與物背故但見其背而已咸與物感故咸卦六爻言人之前艮與物背故艮卦六爻言人之背曰艮其背不獲其身行其庭不見其人既與物背人所見者背而己是以不獲其身也庭者交際之所既與物背雖行于交際之所亦不得見其人也彖曰時止則止時行則行動靜不失其時其道光明艮固止也然亦不終止可以出則出可以處則處各當其時之可而己故曰不失其時其道光明聖人此意于學者深有功艮其止止其所也萬物各有所止能止于當止之所則止道得矣上下六爻剛柔不能相應無相與之義惟不相與故與物背而但見其背惟其如是故不獲其身行其庭不見其人無咎也象曰兼山艮君子以思不出其位言止其所也如立天下之正位素其位而行不在其位不謀其政皆位也初六艮其趾無咎利貞象曰艮其止未失正也六爻背言人之背以止為義欲趾而不欲動趾在下而不動則無咎利永貞人有止于暫而不能止于久者非善止也故曰利永貞象曰未失正也能止于初故未有失六二艮其腓不拯其隨其心不快象曰不拯其隨未退聽也二居止上腓也物在前而足向後但見其腓而已與物背故不拯而隨物然心固難持也足雖不拯而心常不快故止不在腓而在心心止則腓止是止腓之道也象曰未退聽也言未正心而正腓故腓未退聽也九三艮其限列其夤厲薰心象曰艮其限危薰心也限者背之下股之上腰折處也夤纍肉也人身欲轉力在夤限三位當之故艮其限列其夤使不相屬所以然者恐行與物接則危懼足以薰心也蓋蹶者趨者是氣也而足以反動其心也象曰艮其限危薰心也恐危懼薰汝心也六四艮其身無咎象曰艮其身止諸躬也四在夤上通以身言之身既止則止其所矣象曰止諸躬也六五艮其輔言有序悔亡象曰艮其輔以中正也五處躬上輔頰之兩旁骨背後可得而見者咸説前故并見頰舌艮説後故止見其輔口言則輔動輔止則言寡故言有序象曰以中正也止而至此得止之正矣上九敦艮吉象曰敦艮之吉以厚終也自趾之輔皆得所止則止道厚矣故艮之終但贊以厚艮吉象曰敦艮之吉以厚終矣易中惟咸與艮言人之身咸言人前艮言人背艮卦艮其腓咸卦咸其腓咸卦咸其輔艮亦艮其輔蓋腓雖在後前可得而見故咸卦得兼艮之腓輔雖在前後可得而見故艮卦得兼咸之輔艮下巽上漸漸女歸吉利貞彖曰漸之進也女歸吉也進得位往有功也進以正可以正邦也其位剛得中也止而巽動不窮也漸進以漸也止而巽漸之義也水之流也以漸木之生也以漸鴻之飛也亦以漸至漸莫如水而木漸鴻漸如之象取木漸以二體言之六爻則取鴻漸以物之有德者言也自初漸于干以次至五乃漸于陵此言漸進之義而鴻之德則在上爻鴻漸于陸君子耻一物之不知論格物之學未有如易之盡者觀漸可見卦辭曰女歸吉進之漸莫如歸女女子從人必待六禮之備至不苟也納吉納綵問名納幣請期親迎各有其序不可遽合也卦則九居五夫道也六居二婦道也二進歸五如鴻之漸故曰漸女歸吉利貞進以正也彖進得位往有功也其位剛得中也指二五言也進以正可以正邦也未有已不正而能正人者也止而巽動不窮也止于其所以順往則得動靜之時故其動不窮此漸進之義所謂非其往不往非其居不居之意也象曰山上有木漸君子以居賢德善俗木之生也其進必以漸善俗之道要非一日王豹處于淇而河西善謳杞梁之妻善哭其夫而變國俗漸之道蓋如此初六鴻漸于干小子厲有言無咎象曰小子之厲義無咎也鴻物之隨陽者也寒氣復則自北而南其來也必以漸六爻設鴻漸最有綱領就物理觀之鴻之飛其羣不亂其長幼有序其飲食不貪其夫婦相保其防患有道此物之有德者也據六爻列鴻于上羣雁也鴻之飛長在前而幼在後此其序也干水湄也初漸于干以次而進所謂非其居而不居也初處最下小子也厲危也鴻之進也常有弓繳之危故小子厲有言遇有危事則鴻以警衆即俗語爾為鴈奴是也其防患有道故雖危無咎象曰小子之厲義無咎也防患如此宜其無咎也六二鴻漸于磐飲食衎衎吉象曰飲食衎衎不素飽也磐水中之石二進至磐止而食也所謂君看隨陽雁各有稻粱謀是也然鴻食則呼衆故飲食衎衎和鳴也象曰不素飽也言共飲食不貪也九三鴻漸于陸夫征不復婦孕不育凶利用禦冦象曰夫征不復離羣醜也婦孕不育失其道也利用禦冦順相保也陸平地鴻之所遵也三進至陸雁為陽鳥卦中三陽上與五在前九三處二隂之問失羣雁也所謂誰憐一片影相失萬重雲者也應在上夫也往而不復己婦也失配故孕而不育然雁羣不亂止則相保故利用禦冦不可他配也象曰離羣醜也言上九離其類而去也婦孕不育失其道也失隂陽之道也利用禦寇順相保也謂上九依前漸陸而相保也六四鴻漸于木或得其桷無咎象曰或得其桷順以巽也四進至木居巽體巽為木鴈足有幕不能爪木桷木之平處故亦可止巽體順故為得桷象曰順以巽也九五鴻漸于陵婦三嵗不孕終莫之勝吉象曰終莫之勝吉得所願也五漸至陵二已應也在後不孕然女歸以漸故終莫之勝象曰得所願也上九鴻漸于陸其羽可用為儀吉象曰其羽可用為儀吉不可亂也飛極則止上應在三依前遵陸以求已配蓋其羣不亂鴻之德也聖人觀此羽毛其飛有序其止有所其飲食不飽其羣不亂其夫婦相保其防患又有道是物之有知而又有義者也故可用以為儀如贄見執鴈婚禮奠鴈之類謂其德可以配禮也象曰不可亂也三言順相保上言不可亂於此可觀物理兊下震上歸妹歸妹征凶無攸利彖曰歸妹天地之大義也天地不交而萬物不興歸妹人之終始也説以動所歸妹也征凶位不當也無攸利柔乘剛也咸言取女漸言女歸又説歸妹何也歸妹歸娣也古者諸侯一娶九女以娣從之無娣則以姪從故一國之女不以異姓娣之年未及則待年于父母之邦及期然後逆以歸故歸妹人之終也謂嫡婦已久姪娣之媵待年而歸既歸則終事也然娣媵之歸必以禮逆女子從人其歸以漸不待禮而進非夫婦之義故曰征凶歸妹之禮不能如嫡故曰無攸利彖古人歸妹蓋廣繼嗣之道故曰天地之大義也天地不交而萬物不興男女不交而萬物不生曰歸妹人之終始也嫡既歸矣繼以娣媵終事也故曰人之終始兊説而震動歸妹之義也媵道居五禮逆後歸餘爻未逆義不當歸故曰位不當也以六居五其袂雖良其禮則殺故曰無攸利柔乘剛也象曰澤上有雷歸妹君子以永終知敝澤上有雷水氣隨之而升則隂陽和而為雨矣是天地之交歸妹之象也歸妹者人道終始故君子以永終知敝初九歸妹以娣跛能履征吉象曰歸妹以娣以恆也跛能吉相承也初處兊下兊為少女娣之象也兊為毁折跛之象也為其非嫡宜示不足如跛能履以此往則吉謂能自降于嫡也象曰以常者謂此是天子諸侯之常道也吉相承者以其嫡媵之相承所以吉也九二眇能視利幽人之貞象曰利幽人之貞未變常也二應在五而五歸之五柔二剛故戒以眇能視謂非可以與嫡並宜示不足如眇能視以幽人之道自守則吉象曰未變常也謂以義分自守也六三歸妹以須反歸以娣象曰歸妹以須未當也三年未及而欲歸者也須待也謂年未及尚待年也俟嫡反歸而以娣行方可往也象曰未當也言未當歸也九四歸妹愆期遲歸有時象曰愆期之志有待而行也四年己及而未歸者也故曰愆期然其歸亦有時矣謂其歸亦不久也象曰愆期之志有待而行也六五帝乙歸妹其君之袂不如其娣之袂良月幾望吉象曰帝乙歸妹不如其娣之袂良也其位在中以貴行也五歸妹之主君嫡也其娣新歸故其嫡之袂不如新歸之袂良人情喜新厭舊故幾望則吉謂於禮宜殺也望則與嫡敵體矣象曰其位在中以貴行也歸妹在五歸而從君是以貴行也上六女承筐無實士刲羊無血無攸利象曰上六無實承虛筐也無實無血謂非嫡也筐者所以承告虔之物也承筐無實不贄見也士謂夫也殺生所以告廟也血毛必具刲羊無血不告廟也以其歸也不贄見不告廟所以無實無血也為設嫡媵之禮使知貴賤等數之異三代盛時為娣媵者能以義命自守而無上僣之敝者以禮教素明也故聖人于歸妹上爻特設其義其意逺矣象曰上六無實承虛筐也離下震上豐豐亨王假之勿憂宜日中彖曰豐大也明以動故豐王假之尚大也勿憂宜日中宜照天下也日中則昃月盈則食天地盈虛與時消息而况于人乎况于鬼神乎豐大也言光明盛大之時也卦震上離下六五之君出震在上天下之明皆歸之故豐曰豐亨大而亨也王假之謂王者當天而假此也勿憂天下無虞也宜日中日君象也日之方中天下無不被其照臨有日中之主在上則天下常如豐亨之時也彖豐大也明以動故豐天下盛大之時設施注措無不光明故明以動故豐也皆王者積纍艱難之所至故曰尚大也日中之主在上天下皆在臨照則能有其豐矣故曰宜照天下也治亂安危與世推移日中之主不常出也大弊極壞之形常出于豐亨豫大之後故曰日中則昃月盈則食天地盈虛與時消息此理也雖天地如之人與神安得而違也故曰而况于人乎况于鬼神乎以卦辭言宜日中故彖重發此意以為後世習治者之戒象曰雷電皆至豐君子以折獄致刑雷天地盛太之氣也電天地光明之氣也盛大光明豐亨之象也為豐之主體光明之氣以折獄體盛大之氣以致刑折獄致刑明以動者之事也初九遇其配主雖旬無咎往有尚象曰雖旬無咎遇旬災也豐卦六爻以五為主日中之主在五上下五爻皆當歸五初處五逺以九求六配主也謂剛柔相配也下體離離數八越四而得五旬日方遇也苟往而得君雖旬無咎但往則有尚象曰過旬災也過旬而不至則必有災蓋求主不可後也六二豐其蔀日中見斗往得疑疾有孚發若吉象曰有孚發若信以發志也二離體在下六五日中之主也日中之主在上豈容在下者得耀其明豐其蔀自蔽其明也蓋五日既中見己之明猶斗之明也然當日之中斗安得明所謂日月出而爝火息也遽以明往其君必疑君德既孚然後發已之志以上應則得吉象曰信以發志也九三豐其沛日中見沫折其右肱無咎象曰豐其沛不可大事也折其右肱終不可用也三居下卦之上在下而得民者也欲自施沛澤以妝衆心故曰豐其沛然日中之主在上豈容三施澤但見其如水之沫然自當消鑠也所謂雨雪瀌瀌見睍曰消者也苟欲無咎勢當自傷以示無用然後可故曰折其右肱無咎象曰豐其沛不可大事也蓋小之也折其右肱終不可用也謂其自傷以求免禍九四豐其蔀日中見斗遇其夷主吉象曰豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也四近五居大臣之位依日月之光可也亦當先自蔽其明日既中矣見四之明亦如斗然夷平也謂六五也以六居五為夷平之主往遇之則吉象曰豐其蔀位不當也以居位不當宜自蔽其明日中見斗幽不明也謂日既中斗不應有明也往遇夷主則以明歸君是以吉行也六五來章有慶譽吉象曰六五之吉有慶也六五為日中之主天下之明盡來歸之故曰來章所謂室家種葵藿是也不惟得位又且得名故曰有慶譽吉象曰六五之吉有慶也所謂王假尚大宜照天下皆在此爻宜其有慶也上六豐其屋蔀其家窺其戶閴其無人三嵗不覿凶象曰豐其屋天際翔也窺其戶閴其無人自藏也上六居卦之外不受六五之照臨者也既豐其屋又蔀其家深自掩蔽自處于覆盆之下怡聲屏氣視之若無人焉然日中之主出矣豈容其偃然自大若三嵗不覿則六師夷之矣以堯舜之世十日在上而三子偃然于蓬艾之間雖堯舜不能釋然于南面况下于堯舜者哉三嵗不覿是自取凶也象曰豐其屋天際翔也窺其戶閴其無人自藏也艮下離上旅旅小亨旅貞吉彖曰旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也旅之時義大矣哉旅商旅之道也商旅至微也聖人設卦安用屑屑于商旅哉古者四民商居其一洪範八政繼食以貨蓋懋遷有無阜通貨賄亦有國者之先務也凡旅行者為商坐者為賈總名之旅也卦辭小亨言旅貞吉又言旅與他卦辭異者以卦中有二旅者也有出塗之旅行商是也有坐肆之旅坐賈是也卦艮下離上離明乎外艮止乎內小亨在外之旅出塗之旅也貞吉在內之旅坐肆之旅也內旅貴處艮止之義外旅貴出離明之義明而出則亨止而處則貞故外卦三爻貴出內卦三爻貴處彖柔得中乎外而順乎剛外旅之事也六五一柔麗乎二剛之間非順不能也止而麗乎明內旅之事也下體雖止非麗乎上體之明則無以通逺方之貨惟其如此故外者小亨而內者貞吉也象曰山上有火旅君子以明慎用刑而不留獄山上有火明足以及逺商旅覘四方物賈之低昂而操其利非明足以見逺不能也君子觀旅之象明謹用刑而不留獄蓋貨財貴阜通而刑獄不欲積滯也財利君子不言故體其象以明獄初六旅瑣瑣斯其所取災象曰旅瑣瑣志窮災也六在下最賤旅之童僕也為言待童僕之道人之待童僕苟屑屑焉惟豪末是計則其下必不安而反有脫遺之患故曰旅瑣瑣斯其所取災象曰志窮災也童僕之志窮則為變矣六二旅即次懷其資得童僕貞象曰得童僕貞終無尤也在內為坐肆之旅二爻當之故曰旅即次即其資而次止也故其資不散童僕在下切近于己而已得之則可以貞守而吉也象曰終無尤也九三旅焚其次喪其童僕貞厲象曰旅焚其次亦以傷矣以旅與下其義喪也三下體宜處者也上係于離離火也為離所焚故旅焚其次其次既焚童僕亦喪蓋童僕己為二得己不能有取也既焚且喪雖貞亦厲象曰旅焚其次亦以傷矣以旅與下其義喪也九四旅于處得其資斧我心不快象曰旅于處未得位也得其資斧心未快也四上體宜出者也下連于艮艮止也為艮所止故曰旅于處宜出而處何以獲利但得其資斧而已故其心不愜快象曰旅于處未得位也以未至五也得其資斧心未快也六五射雉一矢亡終以譽命象曰終以譽命上逮也上卦為在外之旅五當之旅乘時射利者也如射雉然不靳一矢之亡然後可以得禽必委千金之資然後可以謀什百之利亡矢得禽委資而得利旅道之善也然後可以當富商巨賈之名故終以譽命象曰上逮也謂有道以至此也上九鳥焚其巢旅人先笑後號咷喪牛于易凶象曰以旅在上其義焚也喪牛于易終莫之聞也五既得譽可以貞守矣而利心無厭處離之極乃焚其巢拔援不已義必喪也方其焚也以身免為喜故先笑及其定也資斧皆喪莫之追悔故後號咷牛所以載資斧也牛既喪則資斧喪可知聖人故戒之曰所以喪牛者以利心拔援不能持重故曰喪牛于易象以旅在上其義焚也謂拔援不止義當焚也喪牛于易終莫之間也人之利心不可過雖戒之以輕喪終如不聞也聖人設此義後世謀利者莫不吻合巽下巽上巽巽小亨利有攸往利見大人彖曰重巽以申命剛巽乎中正而志行柔皆順乎剛是以小亨利有攸往利見大人巽順也下也柔行巽入之道小人之事不可以常也巽為風為君者體之以出令上以言巽下下因言以巽上則不害其為巽故巽之道在上行之則為恭為謙為敬有禮在下行之則為諂為佞為巧言令色足恭六爻綱領亦取此為義上三爻在上者之巽也故上三爻皆善下三爻在下者之巽也故下三爻皆未善曰巽小亨以柔巽人非大亨之道利有攸往柔行巽入無往而不可利見大人見君之初未可求深故雍容和緩為告君之體然不可以順為正為小亨之道也所謂仁言不如仁聲之入人深也彖言重巽以申命亦小亨之道也卦二五剛皆得中以巽而吉二柔處四剛之下皆順乎剛體上下二卦之義乃善于用巽者是以小亨利有攸往利見大人者之所為也象曰隨風巽君子以申命行事象義甚明初六進退利武人之貞象曰進退志疑也利武人之貞志治也進退趦趄囁嚅之象也以柔處下而巽乎上其行進退易流于諂濟之以剛猶無害也故利武人之貞象曰進退志疑也利武人之貞志治也人惟以志為帥則不為血氣所動九二巽在牀下用史巫紛若吉無咎象曰紛若之吉得中也二處重巽巽在牀下過于巽也以九居二猶為得中小亨可也故用之史巫繁縟之禮則吉亦非君子事神之道象曰得中也九三頻巽吝象曰頻巽之吝志窮也三處重巽之間巽而又巽以巽為常者也己不中正以巽為常吝道也象曰頻巽之吝志窮也六四悔亡田獲三品象曰田獲三品有功也四與五在上體處上而巽不害為恭四以柔處衆剛之間以巽得上下之心故曰田獲三品田獵得禽一乾豆二賓客三充君之庖故象曰有功也九五貞吉悔亡無不利無初有終先庚三日後庚三日吉象曰九五之吉位正中也以居位處巽而得中居上而下下君德之善也故貞吉悔亡無不利君之巽下必以言重巽申命未從而命是無初也既命而從是有終也先庚三日後庚三日申命之道也先庚三日而得丁後庚三日而得癸人君申命必須大吉天下使明知上意然後陳揆而行之故大盛于丁而陳揆于癸也上九巽在牀下喪其資斧貞凶象曰巽在牀下上窮也喪其資斧正乎凶也處巽之極過乎巽也在上而巽固巽之善用巽而過又正乎凶二處下體巽在牀下未害也已處上體巽在牀下則反失威重併其資斧喪之矣古人有行之者夷王下堂見諸侯未害為恭也而諸侯反不至正謂此也象曰巽在下工窮也喪其資斧正乎凶也西溪易説卷十一
