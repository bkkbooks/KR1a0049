body:
  text: 西溪易說卷六宋李過撰上經乾下艮上大畜大畜利貞不家食吉利涉大川彖曰大畜剛健篤實輝光日新其德剛上而尚賢能止健大正也不家食吉飬賢也利涉大川應乎天也大畜小畜皆止健也小畜臣畜君大畜君畜民以臣畜君當用巽止君之於民可以令行而禁止之也故用艮止五方之民皆有性凡有血氣者皆有爭心天下之健固難畜也必有道以貞守之故曰利貞不家食吉賢者然後不家食畜道成則舉天下皆不家食之賢者也堯舜比屋皆可封之民成周之世人人皆有士君子之行則不家食之謂也彖曰大畜剛健大畜天下之剛健也篤實輝光日新其德畜健之道也大凡血氣之剛與理義之剛相對日新其德理義既勝則血氣之强自消故聖人止健只就日新其德上著工夫剛上而尚賢謂上九也以九居上畜道成矣有賢德之可尚止健之道至此大正也不家食吉養賢也天下皆可養之賢也利涉大川應乎天也謂畜道既濟則應天而亨也象曰天在山中大畜君子以多識前言往行以畜其德天在山中天地發生之意山中之天常在後天陽一敷無物不暢而窮山絶谷之中猶凝然蓋涸隂沍寒之地許多陽氣為積隂所斬未得發逹也此天在山中為止健之象君子觀此多識前言往行以畜其德大其所藴畜而不遽發一發則沛然矣猶之山中包含許多生意積隂既散發生之意不可禦矣古詩人間四月芳菲盡山寺桃花始盛開即此理也初九有厲利己象曰有厲利己不犯灾也六爻皆以畜健為義自初而上以漸而畜畜而至上九畜道乃成故初有厲二說輻三馬逐此三爻健體畜之頗用力四童牛五豶豕二爻隂體也受畜矣上九何天畜道成矣不假畜矣初畜之始健體欲動必戒之曰動則有危難且冝止也以灾厲而恐懼之也初能受畜故不犯灾矣九二輿說輻象曰輿說輻中無尤也二健欲動如車有輪為說其輻使不得行二得中亦能受畜故曰中無尤也小畜亦說輻然以臣畜君則犯堂陛之分故說輻必反曰大畜君畜民可以令行而禁止之故說輻則受畜九三良馬逐利艱貞曰間輿衛利有攸往象曰利有攸往上合志也畜健至三受畜者半矣而未受畜者猶半也良馬逐未受畜者也如良馬之逐逐然則宜以艱貞之道止之間輿衛已受畜者也班間其輿衛而不進則宜與之往此聖人抑揚之道正如由也兼人故退之求也退故進之象曰利有攸往上合志也謂間輿衛者志與上合故得與進也六四童牛之牿元吉象曰六四元吉有喜也畜而至四以六居之其性柔矣良馬之性畜為童牛牛性順童牛又順者然未免觸故以木牿其角而後馴變乾為順畜之易矣故元吉而喜六五豶豕之牙吉象曰六五之吉有慶也畜至於五柔而得中畜道成矣豶豕去勢之豕也豕既去勢不復躑躅以就馴養四之童牛未免加牿五之豶豕并牿去之其性熟矣不惟有喜又有慶也上九何天之衢亨象曰何天之衢道大行也畜而至此畜道亨矣四通八逹防間不立而天下相忘於道術之中如何天之衢然了無窒礙也所謂千年古道萬年堤老牯馴馴不解迷牧子不知何處去亂山芳草鷓鴣啼是也象曰道大行也畜道至此而後大行古者所謂大同之世也如堯舜之世康衢之童子擊壤之老人皆天衢中瑞物也震下艮上頤此卦先儒說頤之理亦貫但卦爻不相屬頤貞吉觀頤自求口實彖曰頤貞吉養正則吉也觀頤觀其所養也自求口實觀其自養也天地養萬物聖人養賢以及萬民頤之時大矣哉上下二陽中四隂外實中虛頤之象也卦艮上震下艮止震動上止而下動亦頤之象也頤養也頤之飲食所以養體也曰頤貞吉觀頤自求口實彖頤貞吉人生有口體之纍孰不求養然得之必有道故曰養正則吉也有大人之養有小人之養養其大體則為大人養其小體則為小人觀其所養觀其所從養也飲食不可自外求之求所以得飲食之道求在我者也故曰自求口實觀其自養也從而推之天地養萬物聖人養賢以及萬民則頤之時大矣哉六爻一陽在上為頤之主上體止而下體動以應之故下之求食者皆由上而得故上為由頤然口容貴止不貴動上三爻止而皆吉下三爻勤而皆凶象曰山下有雷頤君子以愼言語節飲食山下有雷蟄雷也震在下艮止之故為蟄雷復卦雷在地中上體順陽動於下而以順行此卦上體止陽動於下而艮止一畫止之其聲閉而不能出故在復為雷之動在頤為雷之蟄夫雷所以發號令而施潤澤也今蟄於山下號令不發而潤澤不施是天地之口閉也君子體此以自養天不發號令故謹言語天不施潤澤故節飲食初九舍爾靈龜觀我朵頤凶象曰觀我朵頤亦不足貴也六爻貴止不貴動口之飲食上止而下動初九在頤下震體動求飲食之人也靈龜心也朵頤口也常謂人曰舍汝養心之道而觀我養口體故凶飲食之人人賤之故曰不足貴六二顚頤拂經于丘頤征凶象曰六二征凶行失類也二當上應丘近初反隨下體之動故曰顚頤拂逆也經正也五在上居艮丘頤也二應之正也逆正而從下故曰拂經于丘頤以此而往凶也象曰行失類也拂上從下失其黨類也六三拂頤貞凶十年勿克用無攸利象曰十年勿用道大悖也三當應上九居上體為頤之主應之正也三亦拂之而隨下體之動以正言之凶也志求飲食為人所惡至於十年而不見用三取上隔互體坤坤數十故曰十年既不為上用何利之有象曰十年勿用道大悖也六四顚頤吉虎視耽耽其欲逐逐無咎象曰顚頤之吉上施光也四居上體與初為應亦曰顚頤然四艮體止於上而初以動應之故吉蓋已不求人而人求我也虎視耽耽其欲逐逐四居上位如虎之據而視下其狀貌耽耽然而所欲物逐逐以奔赴之已之威嚴不失也何咎象曰上施光也以居上體而所施光大也六五拂經居貞吉不可涉大川象曰居貞之吉順以從上也五正當應二以二從初故拂經而居貞自止其所也止則吉然居五不為頤之主下無與不可以濟難故曰不可涉大川象曰以從上也言舍二而從上也上九由頤厲吉利涉大川象曰由頤厲吉大有慶也以九處上為頤之主體純止天下之求養者皆由之以成功故曰由頤如人之頤然上體不全則下雖動而無所應飲食之道廢矣然居上位危將應天下之求能危懼則吉故曰厲吉下皆從之可以濟難故曰利涉大川象曰大有慶也頤之功成故大有慶天地養萬物聖人養賢及萬民功用全屬此爻巽下兑上大過大過棟橈利有攸往亨彖曰大過大者過也棟橈本末弱也剛過而中巽而說行利有攸往乃亨大過之時大矣哉剛過乎隂大者過也天下之理惟中而已安可過也然有過而後中者君子之時中也卦中六爻陽雖過而陽得中故雖過而可用古之聖人有行之者湯武之君也湯武之過不害為湯武之中周公之兄弟周公之過也不害為周公之中所為過而中也然太過必曰棟橈卦中四陽在中上下皆柔猶之棟柱然中實而上下橈也六爻分明有此象古之聖人有不得已而於過中取中者皆出於橈敗之世故湯武處君臣之變然後以弒君為中周公處兄弟之變然後以殺兄弟為中彼其犯大義虧人倫而不顧者其所遇然也使所處者在平世安用過以取中哉故大過必曰棟橈曰利有攸往亨者不以橈敗而止也必求所以濟橈敗者往則亨也彖曰大過大者過也謂陽過也棟橈本末弱也謂上下皆柔也剛過而中巽而說行以六爻言之剛雖過而二五得中以二卦之義言之則下巽而上說以此而行宜可以濟故往而亨也當大過之時而不往求濟是聽其橈敗而委之無可奈何也自古聖人固有以身當天下之變者蓋因時而制宜也故曰大過之時大矣哉全卦之象上下皆橈故曰棟橈分上下卦而觀之上卦上橈而下實下實則猶可立故四居上卦之下而曰棟隆吉下卦下橈而上實下橈則上必傾故三居下卦之上而曰棟橈他爻不取棟象而三四爻取者分上下體而言也初爻言過謹上爻言過勇二五言隂陽之過三四言棟橈此六爻之大略也象曰澤滅木大過君子以獨立不懼遁世無悶木在地上水在澤中常理也今以澤水泛濫而滅木是大過之象也君子觀此所以大過於人者獨立不懼遁世無悶而已蓋水無常滅木之理水勢衰則木見矣君子所以貴於獨立也初六藉用白茅無咎象曰藉用白茅柔在下也一柔在四陽之下以柔藉剛猶以茅藉物然過乎謹也過謹又何咎繫辭苟錯諸地可矣藉之用茅何咎之有愼之至也夫茅之為物薄而用可重也愼斯術也以往其無所失矣九二枯楊生稊老夫得其女妻無不利象曰老夫女妻過以相與也二應五而得兑兑為少女老夫得其女妻也陽過乎隂雖過無害故象曰過以相與也九三棟橈凶象曰棟撓之凶不可以有輔也下卦上實而下弱下弱則上傾故三居下卦之上而曰棟橈凶象曰不可以有輔也言下弱而無助也九四棟隆吉有它吝象曰棟隆之吉不橈乎下也上卦上弱而下實下實則可載故四居上卦之下而曰棟隆吉橈在上六非己吝故曰有他吝象曰不橈乎下也謂下實也此二爻當分上下體看九五枯楊生華老婦得其士夫無咎無譽象曰枯楊生華何可久也老婦士夫亦可醜也五應二而得巽巽為長女老婦得其士夫也隂過乎陽不能生育故象曰亦可醜也卦止二女疑無夫象與頥對值頥卦震下震為長男故下卦對之為老夫頥卦上艮艮為少男故上卦對之為士夫上六過涉滅頂凶無咎象曰過涉之凶不可咎也六居澤上澤方滅木而已欲過涉過而滅頂過乎勇也故凶然無咎者可以死勇無害也求仁於井固不可陷君臣之難義在必死則冒白創蹈水火不可已也捨生取義何畏滅頂象曰不可咎也言過涉之不可罪也設此義以為逃難偷生者之戒坎下坎上坎習坎有孚維心亨行有尚彖曰習坎重險也水流而不盈行險而不失其信維心亨乃以剛中也行有尚往有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉習重也坎險也上下皆坎險難之極也然坎之德中實而有孚故能濟險難者亦必如坎也何以見之坎為水水之為水日流而不息既盈而復進至於海然後得水之平其未至海也歷險多矣雖瞿塘灧澦不辭也故天下善出險無如水人之處險難能如水之不息則何難之不濟自止於心則無可亨之理矣故曰有孚維心亨行有尚象曰水流而不盈行險而不失其信水之流不以盈而止盈則復往矣其行險也日以繼夜未嘗少息也故有信莫如水此坎之所以為有孚也維心亨乃以剛中也坎能出險以其中實以心而亨也六爻二雖剛中在重坎之下故求小得未能出坎也九五剛中處坎上卦其險可出全卦之德盡屬五然一陽陷二隂之間亦未能出也以有坎之德方在濟險則無咎然亦未出險也故卦辭云行有尚而彖曰往則有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉夫險固難也而用險之功亦不可無也築城鑿池背山阻河亦所以固國也恃險而不修德固不可恃德而不修險亦大不可故夫子於彖言之象曰水洊至習坎君子以常德行習教事洊至相繼而至也君子處坎如水之流則出坎矣常德行習教事所當盡其在我者也曰常曰習乃不息之功也初六習坎入于坎窞凶象曰習坎入坎失道凶也處重坎之下坎貴乎出而初入坎宜其凶也今水之先流者入坎後至者出坎入坎而盈既盈而出者至海而入者在坎是先至者為後至者之藉也初在先故入坎象曰失道凶違行而失道所以凶也九二坎有險求小得象曰求小得未出中也二五君臣也二逺君而在下非能共謀以濟者為國守險以俟時平可也故曰坎有險求小得不可大用也象曰未出中也以在重坎之中未能出也如張巡許逺所處乃為國守險者也六三來之坎坎險且枕入於坎窞勿用象曰來之坎坎終無功也三處一坎又一坎來來之坎坎也處險又枕險雖在下卦之上猶在上卦之下是為上一坎之藉也故亦入坎而不可用象曰終無功也三不中正非有常德故終坎而無功六四樽酒簋貮用缶納約自牖終無咎象曰樽酒簋貮剛柔際也九五為濟難之君四近君為腹心共濟之臣投機之㑹間不容髮腹心之臣非他人比相與謀惟密而不泄禮不必備止以樽酒不容他人惟陳簋器不必文用缶而已不可庭議自牖納約坎難之時君臣交際固當如此正如宋藝祖夜半冒雪幸大臣之第以議南征北伐之計熾炭燒肉普妻行酒而已君臣相遇如此何難不濟九五坎不盈祗既平無咎象曰坎不盈中未大也五濟難之君也有孚維心亨全在五如水流而不盈行險而不失其信者然後可以去難故曰坎不盈不以盈坎而止也須止於既平然後無咎如水至於海既得水之平然後其流息也蓋當患難之世天下之才何限智者思獻謀勇者思效力惟患人主無平難之心苟有其心天下莫不與也象曰中未大也謂五在險中方圖濟險尚未能光大也上六係用徽纆置于叢棘三嵗不得凶象曰上六失道凶三嵗也上六處坎之上其難深矣如被繩縳又墜於叢棘之中無可出之理也至於三嵗之久而竟不得脫蓋已應在三越三爻以求援又入于坎窞故曰三嵗不得凶象曰上六失道凶三嵗也蓋以柔居上非濟難之才故不能出坎離下離上離離利貞亨畜牝牛吉彖曰離麗也日月麗乎天百穀草木麗乎土重明以麗乎正乃化成天下柔麗乎中正故亨是以畜牝牛吉也據此一卦乃重明繼離之象卦辭彖辭與大象皆極善而六爻之變三為日昃之辭四又死如棄如六五正重明之主也乃出涕戚嗟重明之義安在前輩以出涕戚嗟為謙恭夫謙恭可也安用涕哭為哉殊不知重明之象以明繼明文王於此為萬世定立君之法盡在於是惟夫子知之彖象所釋其辭甚嚴先儒皆未之能察也蓋唐虞禪夏后殷周繼夫繼世以子三代共之而立子必以嫡此又聖人立一定不易之之法萬世莫能改也故文王于此六爻中詳之上下二體皆重明繼離也原闕西溪易說卷六
