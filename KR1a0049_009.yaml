body:
  text: 西溪易説卷九宋李過撰下經兊下艮上損損有孚元吉無咎可貞利有攸往曷之用二簋可用享彖曰損損下益上其道上行損而有孚元吉無咎可貞利有攸往曷之用二簋可用享二簋應有時損剛益柔有時損益盈虛與時偕行損下益上其卦為損卦自泰變損三一陽上益上九故下為兊而上為艮是損下益上之義也天下之人皆有愛君之心故相與出力以奉上聖人為之斟酌立為一定之法夏商周之貢助徹不過什一皆損下益上之義也其義盡見于損卦曰損有孚元吉無咎可貞利有攸往損之始出于斯民奉上之誠心故曰有孚必得六五之位然後可以受天下之益故曰元吉無咎其法不過天下之中正故曰可貞出力奉上後已得其治故曰利有攸往曷之用二簋可用享然不可多損也謂將何用與苟有愛君之誠心不必其物之備也野人得芹且以獻主而筐筥錡釜之器亦可羞于王公如其益主雖二簋可用享也故彖曰二簋應有時損剛益柔有時損益盈虛與時偕行蓋多取不若少取嵗之豐歉無常不可于豐年取盈如二簋亦有時而用也象曰山下有澤損君子以懲忿窒欲損澤之土以益山則澤益下而山益髙損下益上之象也君子觀此當天下奉上之時財賦充溢冝懲忿而窒欲蓋忿心不懲則必窮兵欲心不窒則必極侈窮兵極侈則聚斂猶不足供其用矣初九己事遄往無咎酌損之象曰己事遄往尚合志也遄速也言下之益上農事才已便當速往則無咎所謂我稼既同上入執宫功之類此在下者之職也酌損之因其奉上不可多取也冝斟酌而損之此在上者之職也蓋遄往者下人奉上之誠而酌損者上人愛民之仁也聖人本無取民之心于損之初便言酌損象曰尚合志也下遄往而上酌損君民之心無二本也九二利貞征凶弗損益之象曰九二利貞中以為志也初酌損得其宜矣二又損則過故曰利貞征凶謂宜以中正之法取民過征則凶也什一之法天下之中制多取之則為桀少取之則為貉不可得而損益也故曰弗損益之象曰中以為志也謂以中正之法為志也以二爻得中故寓聖人立法之意六三三人行則損一人一人行則得其友象曰一人行三則疑也損卦之成由此一爻上往故言損剛益柔之義謂下卦三爻同行則損一陽以益上一陽既往一隂順下而成應故曰三人行則損一人一人行則得其友言剛柔損益盈虛之理也象曰一人行三則疑也言三陽並行兩不成竒一不成耦必一陽上往然後剛柔相應而竒耦立故三則疑己繫辭于中又取致一之義曰天地絪緼萬物化醇男女搆精萬物化生易曰三人行則損一人一人行則得其友言致一也六四損其疾使遄有喜無咎象曰損其疾亦可喜也四初應受初之益疾害也當損去蠧財害民之政使遄往奉上者皆有樂輸其上之意如我朱孔陽為公子裳言私其豵獻豜于公之類則無咎故曰損其疾使遄有喜象曰亦可喜也六五或益之十朋之龜弗克違元吉象曰六五元吉自上祐也六五之君受天下之益古者以龜為貝十龜曰朋十朋言其數之多也民之奉君禮所當然不可得而辭也故曰弗克違元吉象曰自上祐也六五居上位天下皆祐之也上九弗損益之無咎貞吉利有攸往得臣無家象曰弗損益之大得志也居損之極不可復損也宜思所以益民故曰弗損益之則無咎而貞吉先王受地之制補助賑救之政皆所以益民也宜以此往益之則普天之下皆國爾忘家之臣也故曰利有攸往得臣無家象曰大得志也聖人取民未幾而與民之意已繼之矣蓋與民者聖人之本心也故曰大得志震下巽上益益利有攸往利涉大川彖曰益損上益下民説無疆自上下下其道大光利有攸往中正有慶利涉大川木道乃行益動而巽日進無疆天施地生其益無方凡益之道與時偕行損上益下其卦為益受損以益民君之相與也如此古人之于民夫受百畝而凡室廬服食器用之需皆上之人與之至于賑賙之法補助之政又有以濟其不及蓋下之人既出力以奉上上之人必有實惠以及民此損上益下之所以為益也卦自否來損四一陽下益初九損上益下之義也曰利有攸往利涉大川古者君民相親相接如者耕省斂之類皆星言夙駕以説于農郊也故曰利有攸往得衆則可以濟難故曰利涉大川彖損上益下民説無疆在上既有以與民恩意浹洽宜其説之無疆也上之人自上下下其道乃益大光眀古者君民雖若等夷而君尊未嘗失也顧以下下而光眀以益民之道往君民相得宜其有慶巽體居下以巽順下何難不濟故木道乃行聖人益民無自窮已卦動而巽故日進無疆惟恐其不益也天施地生其益無方凡益之道與時偕行天地益萬物更無限極聖人益民必欲與天地同大所謂配天其澤也故其益無方然天地之益萬物無時而不益未嘗有止息也聖人之益民亦與天運為不息則益道至矣故與時偕行蓋損上益下聖人之本心也故彖辭贊美之象曰風雷益君子以見善則遷有過則改天地之益萬物莫大于風雷長養以風發生以雷然風所以長養萬物亦所以肅殺萬物雷所以發生萬物亦所擊摶萬物發生長養天地興利之事也擊摶肅殺天地除害之事也益民之事莫過于興利除害見善則遷興利之事也有過則改除害之事也初九利用為大作元吉無咎象曰元吉無咎下不厚事也初居最下受益于上正當此爻君之益民豈必其盡出己物以與之但民生利用之具大為之興作則凡日用飲食無非聖人之賜是千萬世無窮之益也如作網罟取諸離作耒耨取諸益作宫室取諸大壯作舟楫取諸涣之類所謂因民之利而利之也如此則得元吉而無咎象曰下不厚事也謂爻中既得元吉矣復言無咎何也蓋聖人興盡天下之利未嘗以為已功也獨以塞吾責而責而已故天下之人受聖人之益安于自然亦不知聖人之為厚我也故曰下不厚事也老人曰我耕田而食鑿井而飲帝力于我何有哉皆下不厚事之謂也惟不知其益所以為益之大六二或益之十朋之龜弗克違永貞吉王用享于帝吉象曰或益之自外來也二臣位人臣受益于君者也十朋之龜言錫禮之蕃也弗克違君命不敢辭也永貞吉受以正則吉也王用享于帝吉人臣受益之極則左右奉璋以助祭如相維辟公天子穆穆是也王九五也用二以助享于帝也象曰自外來也謂五自外卦而來益已也六三益之用凶事無咎有孚中行告公用圭象曰益用凶事固有之也三居下卦之上在下而長民奉君命以益民者也凶荒札瘥益之用凶事也謂當凶荒之年宜發倉廪以行賑救也如此則無咎有孚中行心苟自信則酌中而行之不必待君命也事已然後用圭而告公上蓋民之食必待中覆則無及矣正如汲黯河內事象曰固有之也謂天災流行固有之事也六四中行告公從利用為依遷國象曰告公從以益志也六四近君非六三比益民之事須先告公上既從然後行之不然則為擅命違國視民之利而遷之如盤庚遷都之類皆所以利民也損上益下正屬此爻故以遷國言之象曰以益志也君從臣行是以九五益民之意而益之也九五有孚惠心勿問元吉有孚惠我德象曰有孚惠心勿問之矣惠我德大得志也五君位處可為之勢有益民之實則順吾心而行之不待問于下也如此則元吉民受實賜然後惠我德而不忘于心矣故曰有孚惠我德象曰有孚惠心勿問之矣惠我德大得志也民惠我德是大得天下之心也上九莫益之或擊之立心勿恆凶象曰莫益之偏辭也或擊之自外來也下四爻皆受益而上九居外無職事之間民也古者民有常數士農工商不易其業豈容有一不耕不織之間夫哉故莫益之而擊之故田不耕者出屋粟宅不毛者有里布間民無常職者轉移執事之類所以然者以其立心之勿恆也古者民有常産而有常心既無常心宜其凶也故曰立心勿恆凶象曰莫益之偏辭也不士不農不工不商求益之偏辭也或擊之自外來也所以擊之者以其不在四民之中自外而來也乾下兑上夬夬揚于王庭孚號有厲告自邑不利即戎利有攸往象曰夬決也剛決柔也健而説決而和揚于王庭柔乘五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸往剛長乃終也夬決也五陽決一陽也然一隂在五陽之上小人之據尊位雖五陽並進而一隂在君側小人之善固結其君而不去者也將誅君側之小人辭雖直而勢不順自古寡謀淺慮輕舉妄動身戮而國隨以亂者皆不眀夬決之理也故決衆小人易決一小人難衆皆去而一獨留且據尊位而得君必其巧詐之深而未易動也故處夬之道其為危懼戒謹之辭者不一聖人之示後世者深矣曰夬揚于王庭小人據尊位彌縫之計密而君不以為疑也必揚其過于王庭使人主明知其為小人也君既信矣然後號令于衆謂將有危事也使舉朝皆知其為小人也又告令于邑中使舉國皆知其為小人也不利即戎小人竊威福之權利在興兵君子于此欲舉兵以誅之則惡在君側其勢不順而小人必勝矣故不利即戎而利有攸往陽氣方長隂道必終往則有功也彖夬決也剛決柔也衆剛決一柔也健而説決而和決小人之道也揚于王庭柔乘五剛也柔乘五剛之上小人據尊位者也必揚其罪于王庭使人主知其惡也孚號有厲其危乃光以危事警衆而豫防之則小人不能為害其危乃光也小人利在興兵若舉兵以應之是小人之計中而君子敗矣所尚乃窮也然剛長至五不容一隂之獨留往則必決故曰剛長乃終也象曰澤上于天夬君子以施祿及下居德則忌夫水升之則為雲降之則為雨澤氣升于天將決而為雨夬決之象也君子既去小人當振拔困窮而施之以祿若自居其功而澤不及下則自流于小人冒嫉之行矣初九壯于前趾往不勝為咎象曰不勝而往咎也陽進而決隂初居最下至微者也趾欲動也已居最微而欲輕動以誅君側之小人往必不勝而為咎矣李訓鄭注未及舉事身已膏斧鉞正坐此爾象曰不勝而往咎也九二惕號莫夜有戎勿恤象曰有戎勿恤得中道也二與五同德既信于君矣但謹懼而施號令于邑使小人無所容則其勢自衰小人罪彰利在為亂故莫夜有興兵之意九二不可啓兵端但勿恤之則其計不行象曰得中道也以九二得中故能盡決之道也九三壯于頄有凶君子夬夬獨行遇雨若濡有愠無咎象曰君子夬夬終無咎也三與上正應六在上頄也已應之壯于頄也衆陽決隂而已與之同凶道也君子處此當以義斷夬而又夬重絶之也獨往遇六六必與和既為所汚而能愠怒以絶之猶可無咎象曰君子夬夬終無咎也九四臀無膚其行次且牽羊悔亡聞言不信象曰其行次且位不當也聞言不信聰不眀也四與六同在君側位望已重無意除亂欲止則衆陽並進于下勢不得安故曰臀無膚欲往則六同事心不能斷故曰其行次且若能牽引羣陽以進則悔可亡然四不中正又居兊與六同體非能決者雖聞此言亦必不信象曰位不當也以所居之位不中聰不明也以耳聰目眀為冨貴利欲所蔽故終不能自決也自古大臣無意于決小人者皆其位望隆重而自懷顧惜之意九五莧陸夬夬中行無咎象曰中行無咎中未光也五君位當夬之時尚以一隂在上獨據尊位與衆陽之敵皆九五保祐之也莧陸至微物也蘋蘩蕰藻之菜尚可羞于王公莧陸匹夫之所不饜而今以薦玉食以喻小人不應至君側也為九五者決而又決決則可以居中履正而無咎矣故曰莧陸夬夬中行無咎象曰中未光也小人猶在上非九五之明德也上六無號終有凶象曰無號之凶終不可長也就爻位言之則以隂居尊位就名卦言之則陽而隂消矣決而至此不假號令亦知其有凶矣象曰終不可長也隂居夬終豈有復長之理卦雖五陽決一隂而五陽皆未善初不能決二未成決三與為應四與同體五有保佑之意以見小人為計之密君子受其欺而不知覺聖人于爻辭反覆設諭獨詳于他爻三四爻猶致意君子處此可以自謹巽下乾上姤姤女壯勿用取女彖曰姤遇也柔遇剛也勿用取女不可與長也天地相遇品物咸章也剛遇中正天下大行也姤之時義大矣哉姤遇也一隂決盡反而在下與五陽遇故曰姤繫辭曰作易者其有憂患乎聖人重卦至此密知後世有非常之變重卦至姤其憂患又有甚于此者卦初六一柔以漸而長既進而二又進而三未有咎也進而至四則有無魚之凶進而至五則又自天之禍及進而至上則始有上窮之吝而于卦辭則曰女壯勿用取女一隂尚微聖人已預言女壯而戒以勿取重卦至此其三代未有之變乎其知漢唐之女禍乎武王數商之罪曰牝雞司晨惟家之索然不過惟婦言是聽而已未至如後世之冠履易位也漢之吕氏猶曰與帝並興雖制政房闥而于大臣猶有所畏憚至唐武氏之變則矯假威福臨制天下使天下之人重迹寢息厥角稽首以聽命而不敢作為天地為之易位者數十載此三代以來所未前間也聖人逆知之而于姤卦見其義曰女壯勿用取女一隂在下方來之勢下體為巽巽為長女此女必壯勿取之可也蓋隂取初爻其位不正取之必有凶也彖姤遇也柔遇剛也柔下而與剛遇勿用取女不可與長也女子之道易以説人一為所牽則事去矣不冝與之長也然天地隂陽之遇不可絶也而况于人道乎咸之取女歸妹之歸媵此天地之大義也所謂剛遇中正者此也義又在一卦外故夫子彖辭中推廣言之曰姤之時義大矣哉象曰天下有風姤后以施命誥四方天之遇萬物以風而風行必出于天聖人體天風之象以出命而制命之權則必出于人主夫惟人主能自有其權而大臣奉行之則天下常治權不自立而或在姦臣或在外戚或在宦官或在女子而亂階成矣故曰后以施命誥四方誥命出于后則無姤之變初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅象曰繫于金柅柔道牽也初六一隂生而五陽在上止之柅所以止車也五爻皆剛金柅也然柔道常善扳援雖欲止之而已係于金柅矣幸其微能貞守之則吉與之往則見凶蓋一隂位不正包藏之意已不可禦豕隂類也豕雖羸其蹢躅不可忽也自此以往進至九五則始之變成矣故有蹢躅之戒象曰柔道牽也以柔道扳援故陽俱為所牽係也九二包有魚無咎不利賔象曰包有魚義不及賓也進而至二入而包之也魚隂類也故曰包有魚此位尚微未有害也故曰無咎賓與主敵體者也以微賤自守則可與主之敵體非所宜也故曰不利賓象曰義不及賓也以義分之貴賤等級不可踰越使之及賓則敵體矣然女子之道非能安義分者也九三臀無膚其行次且厲無大咎象曰其行次且行未牽也又進而三居下體之上矣然意在蹢躅非能安于三位也欲居則不安故臀無膚欲進則未可往故其行次且厲危也事已危矣猶未進上體故無咎象曰行未牽也所以次且而未進者以九五尚未為所牽也九四包無魚起凶象曰無魚之凶逺民也進而至四已居上體去五已逼不安隂類故曰包無魚其進至此包藏禍心非一日之積也起則變成矣故曰起凶象曰逺民也初爻民位至微者也扳援至此取初逺矣故曰逺民九五以杞包瓜含章有隕自天象曰九五含章中正也有隕自天志不舍命也進而至五五君位也豈柔道之所當乎瓜藤蔓之物也謂初六也杞髙木也謂九五也柔道扳援而至此皆自九五包之也其始相遇未始不中正故曰含章蓋隂道能含其美也然不應至此必有自天之禍漢唐之事冠履倒置天地易位宗社幾危而户庭躡血其變故蓋有不忍言矣故曰有隕自天象曰中正也姤之始遇固出中正義分猶存也至變故之成則心不安命矣蓋夙夜在公抱衾與禱女子之知命者也推原所以至者只緣不安命之故上九始其角吝無咎象曰姤其角上窮吝也及進而至上居姤之極物極則反故吝然無咎者姤道既吝則正道無咎蓋吕氏不誅則劉室不安武氏不滅則唐祚不復故曰吝無咎象曰上窮吝也坤下兊上萃萃亨王假有廟利見大人亨利貞用大牲吉利有攸往彖曰萃聚也順以説剛中而應故聚也王假有廟致孝亨也利見大人亨聚以正也用大牲吉利有攸往順天命也觀其所聚而天地萬物之情可見矣患難方興其卦為屯難興必散其卦為涣散則求聚其卦為萃萃而得主其卦為比萃者人情欲合各成聚落之時也卦四隂二陽以陽為主三應于上二爻皆隂非萃之善初應于四聚而得吉非萃之主二應于五五正君位成萃之功大略如此曰萃亨散而復聚則亨也宗廟者人心所係武王伐商載主而行髙帝初興立漢社稷皆以係人心也故曰王假有廟必得九五之位然後為萃之主故曰利見大人萃不以正其終必離故曰利貞天子祭天地皆用太牢君位既正方用大牲故曰大牲吉既用大牲萃道成矣故曰利有攸往彖曰萃聚也順以説剛中而應故聚也以二體言之下順而上説五剛得中下與二應得所聚也廟社人心所係所以假廟者示天下必有親也故曰致孝享大人萃之主見大人得萃之正故曰聚以正至用大牲則天命定矣如湯用元牡之類故曰順天命泛觀天地間物蜂有屯蟻有聚鴻雁之能羣蚊蚋之雜襲莫不羣分而自適皆其天理之不可改則萃之情見矣象曰澤上於地萃君子以除戎器戒不虞澤所以聚水水溢地上未得所歸人情涣而求聚之象也人情未一患故不測故除戎器以戒不虞初六有孚不終乃亂乃萃若號一握為笑勿恤往無咎象曰乃亂乃萃其志亂也初與四應以隂求陽宜相孚也四位不當終不成萃故曰有孚不終心不能定去就不決故曰乃亂乃萃萃而以理不約而合若嬰兒之號泣然雖崇物以事之其號泣自若也為父母者一握其手則為笑矣此見天理之萃故曰若號一握為笑四既無位進而萃五得萃之正勿恤而往可以無咎故曰勿恤往無咎象曰其志亂也六二引吉無咎孚乃利用禴象曰引吉無咎中未變也五為萃主六二為正應下連三隂相引而萃萃之吉也故曰引吉無咎禴祭之薄也心苟相孚不必備禮故曰孚乃利用禴象曰中未變也往而即孚其志一也六三萃如嗟如無攸利往無咎小吝象曰往無咎上巽也三應上六六既齎咨故萃而嗟如往而萃五則無咎始嗟終萃故小吝象曰往無咎上巽也互體為巽五居巽上三居巽下同體而萃故曰止巽九四大吉無咎象曰大吉無咎位不當也四以易居上體三隂下從故曰大吉不為萃主故止無咎以非君位終不成萃故象曰位不當也九五萃有位無咎匪孚元永貞悔亡象曰萃有位志未光也五得君位為萃之主故曰有位無咎涣而方萃人情未孚必元永貞然後悔亡蓋萃而得君其卦為比元亨比之道也萃而成比則悔亡矣故曰匪孚元永貞悔亡象曰志未光也謂有位而情未孚故未光也惟其如此故只成聚落上六齎咨涕洟無咎象曰齎咨涕洟未安上也五既正位六居五上失莘之時涕泣求五乃得無咎故曰齎咨涕洟無咎象曰未安上也謂所處不安故涕泣也西溪易説卷九
