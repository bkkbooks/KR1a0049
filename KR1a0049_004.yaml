body:
  text: 西谿易説卷四宋李過撰上經艮下坤上謙謙亨君子有終彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也坤上艮下山本髙也今在地下地髙于山謙而下人之義也湘卿云矯亢為行其運必窒中遜為行無敵不通謙所以亨也九三以勞謙為謙卦之主故君子有終謙道至難小人非不能勉强于日月然不能持久惟居子乃能終身行之天居上惟其下濟萬物故生生之道顯然可見是天道以謙而光明也地惟順下故其氣上騰而能交于天是地道以謙而上行也謙而亨天地之理也日盈則昃月盈則蝕天道盈虧而益謙也水流而不盈盈科而必行地道變盈而流謙也髙明之家鬼闞其室虚室生白吉祥必至鬼神害盈而福謙也自後者人先之自下者人髙之人道惡盈而好謙也尊者謙則愈光卑者謙則不可踰所以君子終始乎謙也象曰地中有山謙君子以裒多益寡稱物平施山合在地上今四圍地髙而山在其中猶人降尊而就卑之象也故為謙君子觀此則裒多益寡稱物平施論天下之勢有上下尊卑貴賤多寡至懸絶也至于謙則上有以待下尊有以降卑貴有以下賤多有以益寡而無適不平矣故裒多益寡稱物平施謙之事也初六謙謙君子用渉大川吉象曰謙謙君子卑以白牧也以六居下謙之至也故曰謙謙君子以謙為徳衆所共與用以濟難何往不吉二三四互體為坎坎居其前大川之象象曰卑以自牧也牧養也言君子處卑其自養之道當如此六二鳴謙貞吉象曰鳴謙貞吉中心得也初以謙自牧守已而謙也二鳴謙謙形于言也言者心之聲也卑辭遜語以為謙則易流于諂必出于中心之正則吉故曰鳴謙貞吉象曰中心得也非徒飾辭于外以為謙也二居互體為坎之下坎為有言謙之見于言也九三勞謙君子有終吉象曰勞謙君子萬民服也卦惟一陽居艮體之上處坤體之下地中之山三爻當之勞謙有功而謙也此爻居互體之中萬物勞乎坎故能勞謙君子有終此爻居艮之上萬物終乎艮故能有終正如周公有大勲勞于天下居三公之位而躬吐握之禮以下士也卦辭君子有終吉惟此爻盡之繫辭曰勞而不伐冇功而不徳厚之至也語以其功下人者也徳言盛禮言恭謙也者致恭以存其位者也象曰萬民服也天下惟謙乃可以服人之心倘或矜伐則争之者至矣六四无不利撝謙象曰无不利撝謙不違則也四居上體坤下坤天下之至順也四位柔以柔居之順之至也謙而至此指撝動作但見其無不順爾故曰无不利撝謙堯之允恭克讓舜之温恭允塞夫子之恭而安是也象曰不違則至此從容中道動容周旋皆中禮與道為一安得違曰不違則見謙之成熟處六五不富以其隣利用侵伐无不利象曰利用侵伐征不服也五君位以柔處之處君位而能謙也君有天下之富者也不有其富而以與其隣以大事小樂天者也正如湯事葛文王事昆夷是以天道為心而與物無競謙道之至者也以此事人而猶不服則征葛事昆夷非湯文之咎也故曰利用侵伐无不利象曰征不服也如六五之謙而猶不服然後可用侵伐也上六鳴謙利用行師征邑國象曰鳴謙志未得也可用行師征邑國也六五侵伐在六五侵伐固無慊然自以為無慊而侵伐便害謙體以侵伐非謙者之事也故上六又聲言謙之道以贊之曰以謙道行固無不利矣然不若退而自征邑國謂且宜自治未可便歸咎他人也正如舜征有苖舜之已徳固無慊然矣方命禹以徂征而益猶贊于禹曰滿招損謙受益時乃天道葢纔以己為無慊而以人有罪可伐便是自滿便害謙體便非天道禹聞益言而遂班師便為敷文徳卒之干羽舞而有苖格征伐果不用也故五爻則湯文用之上爻則舜禹用之象曰志未得也以上六之志不滿于征伐故又言曰可用行師征邑國也謂征伐固可以用不如自治也必有此二爻然後見謙道之志坤下震上豫豫利建侯行師彖曰豫剛應而志行順以動豫豫順以動故天地如之而况建侯行師乎天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉一陽在下體為謙一陽在上體為豫下體艮艮止也故為謙上體震震動也動則豫豫逸也卦一陽居四居大臣之位上下所由以取逸也人情莫不欲安也莫不欲逸也然宴安不可懐懐安必敗名豫固難處也曰利建侯行師建侯王者不自亨其逸與天下共有土也行師惟聖人然後能内外無患安而不忘危也六爻無非此意故彖以一卦之徳言之剛居四而上下應求者得所願與者無所疑志行也下體順上體動以順而動天地不能違而况建侯行師内不自逸外不忘危其得順動之體乎故古之明王立后王君公曰不惟逸豫惟以亂民夏諺曰吾王不豫吾何以助一遊一豫為諸侯度豫之建侯意葢如此曰詰爾戎兵周公以告成王曰張皇六師召公以命元子二公當周室盛治之時乃汲汲以兵為言豫之行師意葢如此天地惟以順動而不自己也故日月不過而四時不忒聖人惟以順動而不自逸也故刑罰清而民服葢樂民之樂者民亦樂其樂也刑罰安用哉以此觀之豫之時義大矣象曰雷出地奮豫先王以作樂崇徳殷薦之上帝以配祖考雷天地之樂也雷出地奮草木甲拆而百蟲啓蟄以豫之象也王者功成作樂天下安逸樂所宜作也歌頌功徳以薦上帝而配祖考聖人不敢自有其功謂凡所以致此者皆天命之佑祖宗積徳累仁之功非己之所能為也此不有其豫之意也夫惟如此然後可以長守其豫初六鳴豫凶象曰初六鳴豫志窮凶也當豫之世上下皆求豫于四四雖已應而已在下為先者所得故不得其平而鳴非能安者也故象曰志窮凶也六二介于石不終日貞吉象曰不終日貞吉以中正也二與五有君臣之分而九四居大臣之位為豫卦之主故豫必求四夫望風掃門以求富貴君子不屑然也二純坤體坤順也居互體艮之下艮止也四居互體坎之中坎險也二能順而止不肯行險以求四明知逸樂之不可為也故介然自守如石之不可轉曽不俟終日而止見㡬之敏也象曰以中正也以二處中也繫辭曰知幾其神乎君子上交不謟下交不凟其知㡬乎㡬者動之微吉之先見者也君子見㡬而作不俟終日易曰介于石不終日貞吉六三盱豫悔遲有悔象曰盱豫有悔位不當也三不迎上而迎四趦趄囁嚅以求豫者也夫以謟事人雖得富貴其終必敗故悔所以悔者見㡬不敏也故又曰遲有悔盱徐也趦趄囁嚅之貌九四由豫大有得勿疑朋盍簪象曰由豫大有得志大行也天下之求豫者皆由四由四而得豫故曰由豫大有得四以君之禄為天下之求士來者與之而無疑則士至矣朋類也士以類至皆峩峩然纓其冠矣故曰勿疑朋盍簪正如周公居大臣之位以禮下士凡執䞇還䞇而見者周公無敢驕吝也象曰志大行也言上下之志得也六五貞疾恒不死象曰六五貞疾乘剛也恒不死中未亡也以柔居尊位處豐享豫大之世易耽于逸樂者也然九四大臣六五之畏相也貞正也以九居四五病其制己以貞為疾也所頼者有九四之大臣故六五之君其中心之有常者猶得以不死葢人之有欲天理未嘗冺也能有所畏而為善以天理之常者不冺耳正如伊尹周公成就太甲成王為令主誠非能于太甲成王天性上有所增益也即是還得太甲成王本然之性在天理之外不容加毫末也象曰乗剛也為九四之剛所制也中未亡者以天理在中未嘗忘也上六冥豫成有渝无咎象曰冥豫在上何可長也上六以隂柔之資處豫之極顛冥乎逸豫而不知返也故曰冥豫然惡既成矣渝變也苟能變而從善亦可无咎葢為善為惡之機相去不隔蠅翼書曰吉人為善惟日不足凶人為不善亦惟日不足其不足之心則一也轉惡從善特一轉樞之力爾雖然以六處上無行健之徳非能自克也故象曰何可長也震下兑上隨隨元亨利貞无咎彖曰隨剛來而下柔動而説隨大亨貞无咎而天下隨時隨時之義大矣哉兑上震下上體説下體動動而悦隨人之義也元亨利貞无咎謂九五也以九居五為隨之主偹大亨正之體而上下五爻皆隨之故曰夭亨貞而天下隨時天下皆隨隨之義大矣然不能遽隨也必當其時之可彖辭所以貴于隨時也在六爻五為隨主上下皆當隨五然不容遽至五也初必隨二故出門交二二必隨三故係三小子三必隨四故係四丈夫皆有次苐終之九四合下三爻以上隨五故五孚于嘉以其不能遽隨故彖發隨時之義上六失隨而不隨者也故取拘繫象曰澤中有雷隨君子以嚮晦入宴息澤中有雷息雷也雷雲興則為雨既雨而止則雷息于澤既息而動則澤氣又隨之而升既升乎天則又决而為雨君子於此得隨時之義葢天下屈伸一理也動息一機也此時之屈乃所以為異日之伸今日之息乃所以為後日之動也故君子當嚮晦之時且須入宴息初九官有渝貞吉出門交有功象曰官有渝從正吉也出門交有功不失也古者官有定守祝不治庖而工不易技當隨之時天下從君初居震欲動以隨將離其官守而往也從君理之正也故吉然二三四在前時未得隨也出門交二隨二而進則有功矣象曰從正吉也謂從君正也曰不失者交二而終得五不失其所隨也六二係小子失丈夫象曰係小子弗兼與也隨之六爻以漸而隨不能越次故初隨二二隨三三隨四四合而隨五二雖五之應然未能隨五也且隨三小子三也丈夫初也隨三不隨初上進也象曰弗兼與也當舍初隨三也六三係丈夫失小子隨有求得利居貞象曰係丈夫志舍下也上隨九四係丈夫也下舍六二失小子也求四必得四故曰隨有求得當以正隨故曰利居貞以三位不中易于詭隨故有此戒象曰志舍下也言舍二也九四隨有獲貞凶有孚在道以明何咎象曰隨有獲其義凶也有孚在道明功也下三爻上隨而四得之故曰隨有獲然九五在上為隨之主豈容天下隨四以正言之凶也然四志在隨五非利人之已隨也五孚于嘉有孚在道之君也能明己志故无咎也象曰明功也率天下以隨五皆四之功也五終能明之九五孚于嘉吉象曰孚于嘉吉位正中也九五居君位得大亨正之體為隨之主天下之善皆歸之矣為九五者必有以誠服其心則吉矣故曰孚于嘉吉象曰位正中也以九五居正中之位而天下得所願矣上六拘繫之乃從維之王用亨于西山象曰拘繫之上窮也衆爻皆隨五而六在外失時而不隨者一夫不隨非隨之善故必拘繫又從維之不容其不隨也王九五也得上六則隨道亨矣六居兑上西山之象也象曰上窮也窮而後隨故取拘繫如藝祖皇帝遣將平諸僭偽必戒之曰㑹取㑹取他本無罪即是自家着他不得葢此意也巽下艮上蠱蠱元亨利渉大川先甲三日後甲三日彖曰蠱剛上而柔下巽而止蠱蠱元亨而天下治也利渉大川往有事也先甲三日後甲三日終則有始天行也蠱壊也于文皿蟲為蠱器蛀為蠱艮上巽下風落山物之蠱也卦自泰來自古壞亂之原多起于太平之世天下不常治治亂相因成毁相仍理之常也既蠱矣安得元亨葢天下之理不亂則不治不毁則不新君得幹蠱之臣父得幹蠱之子則蠱可亨矣然必曰元亨者就元處亨乃幹蠱之道也今器皿蠱壞有柸樸在取元存柸樸而修飾之則噐復新矣天下雖大弊極亂要之祖宗法度紀綱尚在但廢壊不修爾取猶存之法度紀綱一振而起之則天下復治矣故就元取亨乃治蠱之道也利渉大川不以既蠱而止其濟艱難可也先甲三日後甲三日天地之道終而復始出甲于甲奮軋于乙明炳于丙大盛于丁藏茂于戊埋死于已歛庚于庚息辛于辛懷任于壬陳揆于癸既陳揆于癸依然出甲于甲今曰先甲三日葢先甲三日而得辛曰後甲三日葢後甲三日而得丁治蠱之道不過就息辛中取得種子來陳揆而敷菑之依前出甲奮軋而大盛于丁矣此即蠱元亨之意也彖曰蠱剛上柔下卦自泰來初剛居上上柔反下物之傾撓皆以下柔故剛上柔下為蠱義巽順也艮止也順而止之治蠱之道也臣幹君子幹父全用不得剛全卦皆以順正為義蠱而亨之天下復治曰往有事求以濟蠱也書曰予惟往求朕攸濟曰往曰求乃有事之意聖人以義斷命不委于命一以人合天不委于天故曰往有事終則有始天行也未有終而不始者無終蠱之理也天道自如此象曰山下有風蠱君子以振民育徳風落山蠱之象也風落山則草木皆落實然生意已存于所落之實君子體此則振民育徳葢大弊極壞之世不過窮民流徙而賢者失職振而育之使流徙之窮民得所歸失職之賢者有所養則天下復治矣夫子曰謹權量審法度修廢官舉逸民天下歸心焉夫子處春秋之世不過如此廢官逸民乃治蠱之種子也初六幹父之蠱有子考无咎厲終吉象曰幹父之蠱意承考也全卦之義在順而止為臣子者得幹蠱之名而使君父受致蠱之咎非臣子之意也故必置君父于無過然後為治蠱之善此順止之義也初六當蠱之始事方弊壞而治之易為力曰幹父之蠱有子考无咎謂有幹蠱之子當先意承志使人不知其為考之咎也厲終吉始雖危然終吉也象曰意承考也謂以善繼志也如夫子稱孟莊子之孝然後盡幹蠱之道九二幹母之蠱不可貞象曰幹母之蠱得中道也二居内卦之中母之蠱也幹母之蠱尤當遜順不可貞固所謂見志不從又敬不違也象曰得中道也不至太過也九三幹父之蠱小有悔无大咎象曰幹父之蠱終无咎也三位剛又以九居之以剛居剛過乎剛也過乎剛非幹蠱之善故小有悔然意在幹蠱故无大咎正如章子之責善六四裕父之蠱往見吝象曰裕父之蠱往未得也四位柔以柔居柔過乎柔也又不足以幹蠱反能增益父之蠱而已故曰裕父之蠱往必有見吝故象曰往未得也六五幹父之蠱用譽象曰幹父用譽承以徳也五君父之位所致蠱者皆五為之也今以六居之柔而得中故盡幹蠱之善曰用譽者不惟使其考无咎又能揚名以顯其父母也象曰承以徳也以徳承父宜其名之彰也至此然後盡幹蠱之道也如有禹則鯀得與于郊有安世延年則張湯杜周得免于酷吏乃所謂以徳承考者也上九不事王侯髙尚其事象曰不事王侯志可則也九居上不事王侯不與幹蠱者也當天下弊壞之時君子所當用力豈容上九之髙尚葢下五爻皆有事則幹蠱有人矣故已可以長往有皋夔稷契則巢許可以去有太公閎散則夷齊可以去有蕭張信越則黄綺諸公可以去有冦鄧賈景則嚴陵可以去雖然非苟去也清風義概使人遐想千載而下所頼以激貪而起懦者則是或一道也故曰志可則也西谿易説卷四
