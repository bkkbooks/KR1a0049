body:
  text: 西溪易說卷一宋李過撰上經乾上乾下乾乾元亨利貞伏羲始畫八卦卦止三畫以三畫備三才之道既重為六十四則卦有六畫以六畫備三才之道繫辭所謂六畫而成卦蒸三才而兩之是也立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義自立道以來合下有兩故以六畫備三才之道乾天之理也未有天先有乾之理易有太極天地萬物在其中太極既判天就易中禀得剛健中正純粹精之德故曰乾伊川云天專言之則道也分而言之以形體謂之天以主宰謂之帝以功用謂之鬼以妙用謂之神以性情謂之乾性情以所禀言也四德所以見性六爻所以見情乾元亨利貞文王卦辭也總言一卦之體彖夫子作所以明文王之卦辭也一卦之義盡見於彖旁通於爻大象夫子作言二象之所以得為此卦也小象夫子作所以明文王之爻辭也乾坤二卦夫子說盡只緣先儒不明作卦體統千言萬緒只是私意學者即看彖象文言繫辭義理自見大抵元亨利貞乾之德天道不能易其序元始也其胚腪處也亨通也其發達處也利宜也其成遂處也貞固也其一成而不可變處也在時為春夏秋冬在卦為震離兊艮在人為仁義禮智在物則元者物之始亨者物之長利者物之成貞者物之終既終而化生意已寓元又在其中矣此天道之所以利循而無終窮也前輩謂事事物物上皆有元亨利貞信矣然非事事物物能有元亨利貞也當知乾道無乎不在彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧乾卦所次與諸卦特異者夫子存文王易以示人以見彖大小象文言皆夫子作今輒繫其下云大哉乾元萬物資始乃統天元也雲行雨施品物流形亨也大明終始六位時成時乘六龍以御天利也乾道變化各正性命保合太和貞也總言利貞萬物始乎一天道運行而元氣總攝之故曰萬物資始乃統天潤澤流布萬物發達故曰雲行雨施品物流形或潛或見或飛或躍各當其可以順天變至於天下萬物各全共禀賦之正一成而不可易則乾道偹矣故曰乃利貞首出庶物萬國咸寧乾君道也體乾以出道功用如此惟九五當之文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞遊氏曰道者天也道為萬物之奧故足以統天仁者人也仁為衆善之首故曰體仁足以長人猶之萬物蠢動於春而震為長子也大為之制經為三百曲為之防詳為三千要見歸于大中而已故曰嘉㑹足以合禮猶之萬物相見於夏而離為文明也義主於制刻而利不生於其間則不知先王之義勞之乃所以逸之故民至於忘其勞殺之乃所以生之故民至於忘其死蓋利之實行乎其中矣故曰利物足以和義猶之萬物凋悴於秋而悅言乎兊也事以智謀物以智創智而不貞則事不立貞者正而固也謀之不正則異議得以屈之守之不固則衆力得以傾之豈事之幹也故曰貞固足以幹事猶之萬物終藏於冬而成言乎艮也君子行此四德則乾道在我矣故曰乾元亨利貞此解甚善乾元者始而亨者也利貞者性情也乾始能以美利利天下不言所利大矣哉大哉乾乎剛健中正純粹精也六爻發揮旁通情也時乘六龍以御天也雲行雨施天下平也乾元者始而亨者也合元亨為一自元始中已有亨意利貞者性情也合利貞為一貞近性利近情情即性之動也雖然未離乎二也故又曰乾始能以美利利天下不言所利大矣哉是就元始中已能以美利利天下則利字已在元字中矣至於利盡萬物而天道又歸於不言之中則貞字又在元字中矣是合元亨利貞為一也當萬物歸根復命之時天道又泯於不言則不言所利貞體備矣只緣元者善之長已下分作四字說至此又合作一字看此夫子之易所以有功于後學大哉乾乎剛健中正純粹精也七字方能訓得乾字剛其德健其行也是體用剛則不屈健則不息中則不倚正則不偏純故不駁粹故不雜精故不粗非七字不足以盡乾六爻發揮旁通情也爻言其動也故曰旁通情時乘六龍以御天也乾之六爻終而復始所以運乎天也雲行雨施天下平也平均也惟雲行雨施之功無往而不均也再發前彖未盡之意象曰天行健君子以自强不息八卦有自然之象如天地雷風水火山澤之類聖人有以見天下之賾擬諸其形容而象其物宜是故謂之象所以明其得為是卦也乾為天故曰天行健他卦象皆指名獨此不言乾而言健蓋乾字大須是剛健巾正純粹精七字方能盡得乾就天行處觀之即是健而已未敢謂盡得乾也至健莫如乾周天三百六十五度四分度之一一日而一周非健則息矣君子體此自强不息所以法天行之健然天道無息惟聖人然後能配天必如堯之廣運舜之由行文王之純亦不已乃無息地位學者未敢言無息且自不息入故由不息以至無息自强又不息之功也乃其用力處於三四爻見之初九潛龍勿用象曰潛龍勿用陽在下也文言曰潛龍勿用下也潛龍勿用陽氣潛藏初九曰潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潛龍也君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子弗用也原缺九四或躍在淵無咎象曰或躍在淵進無咎也文言曰或躍在淵自試也或躍在淵乾道乃革九四或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎乃知四離下體而處上體之下德未至五然處三位之上故躍躍者未飛而習飛也聖人修德惟務曰進無巾問立得道理一止便退用力止此易得放下故曰進無咎躍字只訓進字躍則有上下有進退曰非為邪者志不在君位而在德也非離羣者身未在天而在淵也蓋九乾道一變故有此戒曰進無咎曰自試曰欲及時皆進修之功曰疑之故無咎君子之學惟自以為是則不復用力疑之一字乃進德之階此聖學之所以不自止也孔門之學多自疑中入樊遲問仁智子貢問政之類自今觀之如樊遲子貢之所疑皆後世之所不必疑者也推其如此所以為孔門之學九五飛龍在天利見大人象曰飛龍在天大人造也文言曰飛龍在天上治也飛龍在天乃位乎天德九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違况於人乎况於鬼神乎陽進至五剛而居中君德成矣乃當天位人心利見已在二矣况正九五之位乎故君德自二至五天地日月四時鬼神無一不合自天地鬼神且不能違而况於形氣之相感者乎天地間物同聲必相應同氣必相求水必流濕火必就燥雲必從龍風必從虎此天理不約而自符者聖人既作所以必萬物之咸覩也蓋天德之孚有不期然而然者是雖君德之終而天下明文非一日之積也聖人者天地萬物之主故一作於上而天地萬物皆得所翰飛戾天魚躍于淵凡在聖人道化之中皆得以見聖也故曰本乎天者親上本乎地者親下則各從其類也雖然君德終矣乾乾之功遽可已乎兢兢業業堯舜未嘗一日廢蓋聖學之始不免矜持中間正在用力至此則從容中道無一毫矯拂勉强之意堯之安安舜之由行文王之陟降夫子之不踰矩但見其與天運相與為無窮而已雖然此君德也堯舜禹湯文武有其事孔孟則有其理前輩言顔淵龍德而隱者也天下文明則還他夫子夫子惟不得邦家而已苟得邦家綏來動和皆乾道保合之功用也易即理也理之所在先天後天不能違也理在聖人是人先乎天也天不能違聖人理在天是人後乎天也聖人只得奉天天與聖人本無先後但一於理而已程氏曰鬼神者造化之迹南軒曰鬼神者二氣之良能皆善言鬼神者也最好看上九亢龍有悔象曰亢龍有悔盈不可久也文言曰亢龍有悔窮之災也亢龍有悔與時偕極上九曰亢龍有悔何謂也子曰貴而無位髙而無民聖人在下位而無輔是以動而有悔也知進而不知退知存而不知亡知得而不知喪其惟聖人乎知進退存亡而不失其正者其惟聖人乎五居中位過中則亢六陽已極物極必反故亢則有悔居五之上雖貴而無位取初逺雖髙而無民二非已應賢人無輔堯舜相禪所以髙乎千古者知進退存亡而不失其正者乎雖然必得其如九五大人之德然後可以去故堯必得舜然後堯可以去舜必得禹然後舜可以去孟子曰以天下與人易為天下得人難為天下得人聖人無窮已之仁也不然亢而知退特堯舜之細事爾用九見羣龍無首吉象曰用九天德不可為首也文言曰乾元用九天下治也乾元用九乃見天則乾坤二卦獨有用九用六二爻者以純陽純隂故也一陽生進而至六則亢而有悔然天道功成者退必有以變而通之故又言所以用九之道羣龍六陽也謂六陽並見則必退不為首則吉也蓋天道盈虛消息自如此曰天德不可為首曰天下治曰乃見天則則即理也理之至當而不可過故謂之則用九無首以見天則之不可過也然夫子又曰乾元用九者蓋四德之在六爻潛龍元也見龍亨也飛龍利也亢龍貞也天道至貞處又反歸於元故六陽之亢則必以元用之是反而歸於潛龍也此天道之所以相循而無窮也坤下坤丄坤坤元亨利牝馬之貞君子有攸往先迷後得主利西南得朋東北喪朋安貞吉未有地先有坤之理太極既判地就易中禀得柔順之理故曰坤乾至健坤至順地道也妻道也臣道也故坤卦六爻皆人臣之道坤四德與乾同而貞體異曰牝馬者取乾之配也乾為馬坤為牛不言牛而言牝馬象乾之配也牝馬能載而又能生育坤所以載萬物而資生也故為牝馬之貞陽唱而隂和男行而女隨此理也君子體之而有所行為先則迷為後則得主而利以隂道不為倡也西南隂位朋類也自巽至兊皆坤之類故往則得已之朋東北陽位自乾至震皆乾之類故往則喪已之朋坤體靜故安貞吉彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆含𢎞光大品物咸亨牝馬地類行地無疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地無疆至哉坤元萬物資生乾大坤亦至其大不敢與乾並故稱至以别乾萬物賦形於天必托地以生故曰萬物資生乃順承天萬物始於一乾知大始坤作成物謂坤元者順承天之理奉行乎天也此言坤元坤厚載物德合無疆至厚莫如地故能載物此其用處也以坤固有此德合乎地之無疆含𢎞光大品物咸亨萬物發生非坤之大不足以發生之不足以居之而物無所麗自坤道敷暢萬物盡在并包兼容之中而施生之理益顯故曰含𢎞光大品物咸亨此言坤之亨牝馬地類行地無疆柔順利貞君子攸行坤毋道也故牝馬地類地雖無疆牝馬之力足以行之故象焉柔順利貞坤體以柔順為利亦以柔順為貞牝馬惟柔順也是以能載能生育又能為乾之配故卦辭言利牝馬之貞彖辭亦總言柔順利貞也先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶既曰喪朋安得有慶蓋隂不從陽不能生育故女必從男臣必從君地必承天合其疇類從陽則有慶也夫子此意可以發文王未盡之藴安貞之吉應地無疆君子體坤之德安貞而不變所守應乎地德之無疆也乾德在不息坤德在無疆疆字有個體限極可久之德自不息中來可大之業自無疆中來文言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而時行坤道至柔且靜然不剛不方則何以載物而不移聖人恐剛字害坤體故曰動也剛動其發用處也坤體靜微有震動便為災變所以能安靜者以其德方故也惟方故止而靜乾以員轉坤以方止故曰共德方隂陽寒暑生殺榮悴一出於天而地一切聽命焉方其暖然為春也地亦與之為春也及其凄然為秋也地亦與之為秋也蓋順者坤之道也故承天而時行一切奉承於天而已象曰地勢坤君子以厚德載物地勢順下坤之象也君子不體順而體厚蓋勢不順下無以見地之厚愈下而地愈厚也所謂載華嶽而不重振河海而不泄河海之下猶有地焉方見其厚也故君子以厚德載物初六履霜堅氷至象曰履霜堅氷隂始凝也馴至其道至堅氷也文言曰積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅氷至蓋言順也六爻自二至五為坤之德初戒履霜終戒龍戰坤六爻純隂臣道也一隂之生其勢浸長積而至六則難理矣故於履霜之始而知其有堅氷之漸也古之大臣雖大有勳勞於天下而執德愈謙者蓋其智足以察此也勢至莾卓雖欲不為亂亦不可得矣故曰由辨之不早辨也六二直方大不習無不利象曰六二之動直以方也不習無不利地道光也文言曰直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也此中四爻為坤之德六五在坤為人臣之極位而事業所由以著見然坤之德則二爻已盡見之矣曰直方大不習無不利則全彖中所謂含𢎞光大與文言所謂柔而動剛靜而德方二皆偹其體蓋坤臣道也壯之所行即幼之所學達之所施即窮之所養堯舜君氏之學方其在下時藴蓄當素偹故坤德盡見於二而三四五則出而見於事業故三爻便從王事然未得位故無成四位雖尊而君民之心未孚故但括囊至五爻為人臣之極位而又得君則其可以有為矣故元吉此聖賢重乾卦之綱領也直方大三者坤之德然惟直方故能大象只言六二之動直以方也文言亦指言直方敬存於中共內自直程氏言主一之謂敬無適之謂一學者且須持敬勿忘勿助則其存養之道也人常能持此心如過獨木橋時節便見主一此心純一而無間則思慮所措焉往而不得其正集義在我則無是餒而所向莫吾挫矣敬義既立直方體偹而德不孤則左右逄原而德牲洪矣此直方所以為大也坤德既偹推而行之無往不利尚何疑焉不習不疑也地道之光故不疑也以此見之事業自然章明也六三含章可貞或從王事無成有終象曰含章可貞以時發也或從王事知光大也文言曰隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也三雖出從王事然未得位故但含其章而守貞將以待時而發也無成有終非見理之審者不能故曰知光大又曰地道無成而代有終者蓋隂道不居成功始終嵗功皆在乎陽隂特輔陽以有為爾故曰無成而代有終也六四括囊無咎無譽象曰括囊無咎慎不害也文言曰天地變化草木蕃天地閉賢人隱易曰括囊無咎蓋言謹也四居上體坤道一變六爻純隂天地不交而卦氣在千月乃閉塞成冬之時也雖處尊位而羣臣未相信故但括囊而毁譽不加則逺害之道也文言亦專以閉塞為義六五黃裳元吉象曰黃裳元吉文在中也文言曰居子黃中通理正位居體美在其中而暢於四支發於事業美之至也六五以柔居中在坤為人臣之極位進而至五則可以有為矣故爻辭但贊其事業之美黃中色裳身之章也言事業之美發見於外粲然有文由直方大之體蓄藴於巾者素偹故能如此象曰文在中也文字解裳字中字解黃字文言曰君子黃中通理解黃字正位居體解裳字美在其中又解黃字暢於四支發於事業又解裳字美之至也解元吉字言直方大之體通徹於中進而至五正大臣之位居柔中之體以其藴蓄發見乎外其事業設施非一日之積也蓋自二爻坤德已偹事業自當如此如周公處師保之位既成其君德而後制禮作樂以文太平之功也先儒謂黃中色裳下服五君位故有居中處下之戒然文王夫子無此意初上已戒而五又有戒是坤無德之可取也當從象與文言說上六龍戰于野其血𤣥黃象曰龍戰于野其道窮也文言曰隂疑於陽必戰為其嫌於無陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黃者天地之雜也天𤣥而地黃戰曰龍戰者隂疑於陽也嫌其非君故亦稱龍如新莽之即真是也血屬隂稱血者謂未離乎隂類也故稱血以别之雖然其血則離𤣥天色也黃地色也其血黃耶則嘗僣號其血𤣥耶實則篡奪之臣故曰𤣥黃者天地之雜也然君臣之分終不可得而亂天𤣥地黃千嵗之日自不相紊見得大弊極亂之後天地之定分終不可易若夫莽卓輩雖能為亂要之則是篡奪之臣故終之曰天𤣥而地黃用六利永貞象曰用六永終以大終也六柔道可以常守而不變故曰利永貞據陽爻用九隂爻用六天地生數也然合成數言之則九為天之極天下之理極則必變故曰用九無首六為地數之中天下之理惟中故可常故曰用六利永貞就爻言龍龍能變而鯉不能變故龍之鱗八十一九九之數也鯉之鱗三十六六六之數也此亦物理之自然者震下坎上屯屯元亨利貞勿用有攸往利建侯彖曰屯剛柔始交而難生動乎險中大亨貞雷雨之動滿盈天造草昧宜建侯而不寧屯難也天地交而雲雷興雲雷興而天地晦冥難作而未明之象也草木方萌拳曲而未伸亦為屯聖人謂作易者共有憂患乎者屯卦聖人憂後世之深矣就六爻觀之九五墮險中六二隂柔不足以濟難上六泣血而窮三即鹿而吝初以陽剛在下全卦彖辭盡屬在初四初應也求婚媾而吉聖人重易至此密知後世有非常之變湯武革命猶曰有國初九在下而得民其三代未之有變乎其知周秦之後紛紛乎匹夫起而覬非望前此未有也不知是何以為草昧之運雖然未起事也其在劉項縱觀之時乎何者九五之君位猶存也六二之去就未决也三猶有即鹿之意也初九可以得民尚盤桓而未往也此天地晦冥之時也卦辭曰屯元亨利貞勿用有攸往利建侯此章盡在初爻彖曰剛柔始交而難生動乎險中九五之君在險中也大亨貞大亨此難宜居正也雷雨之動滿盈天造草昧宜建侯而不寧造運也當此晦昧之運不建侯無以示天下之公其知秦之破壞封建乎曰不寧其知漢封建之患乎千萬世無窮之變盡見於易憂患之深未有如屯也象曰雲雷屯君子以經綸雲雷興而未雨難作未明之象君子經綸盡在此時當楚漢雌雄未决時天下大計盡在韓信蕭何留侯胸中當孫曹割據時天下大計盡在諸葛孔明胸中初九磐桓利居貞利建侯象曰雖磐桓志行正也以貴下賤大得民也磐桓勿用有攸往也利居貞大亨貞也利建侯宜建侯也屯難之世一陽在下衆隂所歸五猶正位未可遽往也故盤桓然有正天下之志也非示公無以一天下之心故利建侯是道陳吳楚漢皆用之象又贊之曰以貴下賤大得民也他時得民必在此爻六二屯如邅如乘馬班如匪冦婚媾女子貞不字十年乃字象曰六二之難乘剛也十年乃字反常也二應在五無濟難之才故欲進而不能進邅如復班如也不從初冦從五婚媾有是心也貞固自守不守於初然從為初所字也曰十年者互體坤坤數十二求五越坤卦而四應初有婚媾之吉遂牽連而從初也象曰六二之難乘剛也乘剛者乘初九之剛欲從五而掣肘於初也十年乃字反常者反正應而從初也六三即鹿無虞惟入于林中君子幾不如舍往吝象曰即鹿無虞以從禽也君子舍之往吝窮也三居下卦之上亦為衆所推故有逐鹿之志不自知其才不足上六己之應己泣血而窮故曰無虞在二隂之間故曰惟八于林中君子見幾不如無往也象曰往吝窮往則必窮也正如陳吳輩六四乘馬班如求婚媾往吉無不利象曰求而往明也四近五班如未知所向也正應在初初必求已以共事求婚媾也初必得必故往吉無不利象曰求而往明相知之深也正如蕭曹之從沛公也九五屯其膏小貞吉大貞凶象曰屯其膏施未光也五君位也初雖起事未至九五膏澤尚屯如萃卦人心求聚之時五為萃之主則曰萃有位渙卦人心渙散之時五為渙之主故曰渙王居此初爻為主畢竟處屯之數施澤未能光大如髙帝入關順民心作三章之約秦民亦大喜惟恐沛公不為秦王然未能遽洽猶須轉戰五六年而後定蓋其數如此當戰爭未定之時必有機會若當機㑹之小者守貞可也當機㑹之大而守貞則大功無緣能集故小貞則吉大貞則凶如當始興之時食共欲立六國後固不可也至固陵之㑹不割地則不足以致三將之命滎陽成臯之困深溝髙壘不與楚戰可也垓下之圍不一蹙之則不足以速項氏之亡象曰施未光也以所施未能光大也上六乘馬班如泣血漣如象曰泣血漣如何可長也雖髙而無位故窮而泣血惟項氏當之其辭與垓下之事合聖人重易止有一個推求藏往之理後世變故自然吻合坎下艮上䝉䝉亨匪我求童䝉童䝉求我初筮告再三潰瀆則不告利貞彖曰䝉山下有險險而止䝉䝉亨以亨行時中也匪我求童蒙童䝉求我志應也初筮告以剛中也再三瀆瀆則不告瀆䝉也䝉以養正聖功也以䝉繼屯只是反對序卦云屯者物之始生也物生必䝉故受之以䝉䝉者物之稚也人之初生天理渾融私意不作未知所向故曰䝉山下出泉泉之始出泥沙不混莫清如之性善之端也既出而混少加澄治元性自在猶之學焉將以反其初也本性之外未嘗加益曰聖與賢不過存得童䝉處在故孟子論性善之端必自孩提之童推之揚子雲謂天降生民崆峒顓䝉未害也必曰恣于情性聰明不開然後訓諸理則已失聖人論䝉之義也曰䝉者亨其發處也匪我求童䝉童䝉求我教人與受教之事也初筮告謂其始進則宜以善道告之再三瀆瀆則不告再筮三筮則天性已混未可遽告發䝉之道也五爻四爻三爻當之利貞貞正也能貞守得童䝉處在則本然之性見而無所偏倚矣彖以上體言山下有險遇險而止未知所向之象也䝉而亨善端之發也性情之發無有不善者就其發處推之無非天理也故曰以亨行時中也言就亨處行之無非時中之道也此正孟子所謂凡有四端於我者知皆擴而充之若火之始然泉之始達莫之能禦也曰時中者所謂君子之中庸君子之時中也告䝉在二而五求之曰匪我求童䝉童䝉求我教人者與受教者之事也故曰志應筮進也艮體在上一畫為山初進而五曰童䝉山下之泉也本性渾然宜告以剛中之道剛中謂二也再筮而困三筮而為不有躬之女其出已逺物欲混之矣故曰再三瀆瀆則不告勿娶而吝也何以不告䝉處已瀆也故曰瀆䝉也聖人之教人物欲之深者不遽告也啓發之機必遲於憤悱之後是亦教也存而養之䝉處常在略無偏倚作聖之功也釋卦辭利貞象曰山下出泉䝉君子以果行育德山下之泉水性之至清者䝉之象也當泉之始出而酌之冷然清也稍逺則必為沙泥所混德性也君子育德必貴所行之果稍放下則必為物所汨故果行所以育德也初六發䝉利用刑人用說桎梏以往吝象曰利用刑人以正法也以六處下小人之䝉也小人不畏威則不能寡罪故發小人之䝉當用刑聖人用刑一懲而百戒刑一人是脫衆人於桎梏桎梏且不犯無刑可也帝王之世不能不正法具而不試者以此道也雖然發䝉之道如此初應在四四困而不發初六才不能發執此道以往亦吝蓋四以困而吝也象曰以正法也九二包䝉吉納婦吉子克家象曰子克家剛柔接也二以陽居中而五以童䝉求之告䝉者也言告䝉之道包䝉告人者之量納婦受告者之禮聖人教人不擇才也柴愚參魯師辟由唁皆有以成就之此天地生物之心也故曰包䝉吉然其至也非致敬以冇禮則不受也必如納婦然六禮不偹是苟道也右以贄見之禮來聖人未嘗無誨也故曰納婦吉二以臣告君子而克家也五盡納婦之禮二有包䝉之量君臣志應故曰剛柔接也伊尹之於成湯周公之於成王用此道也六三勿用取女見金夫不有躬無攸利象曰勿用取女行不順也三居互體坤之下坤為女三居其下女子之䝉女以六居三其位不中九居上為已正應金夫也三見金夫不能冇其躬以從之女子之無知也故勿用取女象曰行不順也以其不待媒妁之言是苟合也男先下女則順也六四困䝉吝象曰困䝉之吝獨逺實也二陽告䝉者也六四困乎二隂之間而不能從陽困而不學者也故吝象曰獨逺實也陽為實也六五童䝉吉象曰童䝉之吉順以巽也山下出泉六五當之正童䝉也然五君位在乾卦大人居之大人與天地合德何取乎童䝉哉此正孟子所謂大人者不失其赤子之心者也聖人所以為聖者無他止全得童䝉處在便是聖人彖言䝉以養正聖功也蓋謂此故曰童䝉吉象曰順以巽者言順言巽蓋性分上不容加毫末循性而行全是天理子思於是言率性之謂道上九擊䝉不利為冦利禦冦象曰利用禦冦上下順也上應在三三女子之象也不有躬而來踰垣穴隙冦道也而已應之則利為冦也故必擊去之是禦冦也象曰上下順也只緣三行不順已擊而去然後自上求下則其行順矣故曰利用禦冦上下順也乾下坎上需需有孚光亨貞吉利涉大川彖曰需須也險在前也剛健而不陷其義不困窮矣需有孚光亨貞吉位乎天位以正中也利涉大川往有功也需須也需求也亦須待也坎險在前三陽進而遇險不可陷也當少需以待之其卦為需此義先儒盡發之而全卦大意則未之見序卦云需飲食之道也全卦只說飲食事聖人曷為屑屑於飲食哉夫飲食人之大事也君臣之交賔主之歡室家之慶兄弟之和樂鄰里之往來皆飲食也烏可忽哉六爻五為飲食之主三陽在下賢者也進而求之然儉在前未可遽進也故名卦為需卦辭有孚光亨貞吉謂九五也利涉大川謂下三陽也彖曰需須也險在前也有求於上而過險乾體剛健中有所主也能不犯險以求之義存於中故不困窮也然以九居五為飲食之主有孚光亨而貞吉者也飲食則有相孚之意不自有其飲食將光明而亨大之下之求上與正則吉也曰位乎天位以正中也聖人惟知此位為天位非已之所得私故必與賢者共天職也必與賢者食天祿也賢者得食則天下獲所願矣利涉大川往有功也遇險而需濟則有功也象曰雲上于天需君子以飲食宴樂雲上于天將欲雨也萬物皆有望潤澤之意求飲食于上之象也君子體此必推其飲食與天下共宴樂之不以為己私也古之人有行之者文王是也鹿鳴以宴嘉賔四牡以宴使臣棠棣以燕兄弟伐木以燕朋友菁莪以樂育才南有嘉魚以樂與賢非自宴樂也初九需于郊利用恆無咎象曰需于郊不犯難行也利用恆無咎未失常也三陽求五而遇險未可遽進故需于郊于沙于泥初在下去險尚逺故曰郊以常道自守則無咎象曰不犯難行者以剛健而能不犯未失恆者不失其所守也世之求爵祿而喪失其所守者多矣九二需于沙小有言終吉象曰需于沙衍在中也雖小有言以吉終也二處險近又近在沙矣五已之應求而不得則必有言五居坎中坎為小有言所謂民之失德乾餱以愆者也古之君臣固有以微罪去者燔肉酒醴之類是也然九五之君與天下共飲食者也故終吉象曰衍在中也和緩以待之也雖小有言以吉終也九三需于泥致冦至象曰需于泥災在外也自我致冦敬慎不敗也三已近險故需于泥四在君側抑已不得進有求而遇冦自取之也象曰災在外者四居外卦也敬謹不敗者以剛健而能自反也六四需于血出自穴象曰需于血順以聽也三陽方進已是隂柔處君之側先得飲食者也然陽進必爭豈容一隂柔之才據尊位以妨賢路者故傷而見血當出穴以避之象曰順以聽者退避之辭也九五需于酒食貞吉象曰酒食貞吉以中正也五居坎坎為酒食處君位為天下飲食之主天下之求飲食者皆求於五五能以中正以天祿與賢者共之貞而吉也故曰以中正也上六入于穴有不速之客三人來敬之終吉象曰不速之客來敬之終吉雖不當位未大失也二隂近君先得飲食者也而上六以隂柔之才處尊位得祿以自奉故曰入于穴三陽方進得食在後有不平之意故不速而來上六不可與爭也故敬之則終吉雖然三陽之來皆賢者也為飲食而來非能自重者也故聖人特筆以貶之曰不速而來則其來也為無據曰敬之終吉則其得食也為可賤夫飲食之人人賤之充此而不反則墦間厭足之道也君子觀此則于飲食之道可以自知所處象曰雖不當位未大失也亦不罪上六也西溪易說卷一
