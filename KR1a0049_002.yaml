body:
  text: 西溪易説卷二宋李過撰上經坎下乾上訟訟有孚窒惕中吉終凶利見大人不利涉大川彖曰訟上剛下險險而健訟訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也上剛下險險而健訟以健遇險內險外健皆所以為訟也若健而不險則不生訟險而不健則不能訟也險而又健是以訟也卦辭訟有孚既訟矣安得有孚哉夫人之生與萬物同一體也私欲固蔽動與物敵兩不相下則成訟却于私意方熾之時天理亦自在故曰訟有孚今人之訟曲直未嘗不自知也既自知則有孚矣天理本明也有所窒而訟既訟必惕惕自危也所以危者勝負未可知也自危而終止則吉終其訟則凶苟終其訟負者固凶而勝者亦凶蓋以訟而勝所喪已多矣彖剛來而得中也自需卦反剛居二五皆得中也故能窒惕中吉訟不可成雖勝亦凶也利見大人九五為聽訟之主天下所以中也不利涉大川入于淵也求濟其訟其患愈深也象曰天與水違行訟君子以作事謀始天一生水其本同也然其終也天道左旋而百川東注違行而訟之象也君子以作事謀始夫人之訟皆始合而終競始之不謹終必致訟故君子必于始謀之初六不永所事小有言終吉象曰不永所事訟不可長也雖小有言其辨明也初居訟之始以柔處下其訟不長方訟之始而能止也坎為小有言故不免訟與四正應四即命渝故不成訟而終吉也象曰其辨明也以已與四本無他故終必辨明九二不克訟歸而逋其邑人三百戶無眚象曰不克訟歸逋竄也自下訟上患至掇也二居坎中恃險而訟五以臣訟君冝不克也君臣之分豈有纎毫鏬隙升降揖遜少不如意則明法而罪人矣而况於訟乎既不克訟則歸而逋其邑險故能奉身以竄不可復事君也九五中正之主雖罪人不獲其詿誤者當與自新邑人三百户非其眚也所謂纎厥渠魁脅從罔治是也患至掇傷九二之自禍六三食舊德貞厲終吉或從王事無成象曰食舊德從上吉也舊德舊事也三與上正應本有舊事三處險上險極故食其舊事而訟食如左氏不食其言之食然三體柔又處危位故能自危而守貞是以中吉夫明者爭之府三居互體雜之中明見致爭之由在于居其成功也故從王事而無成惟能自克則訟已者不期而釋矣象曰從上吉者不與上訟而從三則吉也九四不克訟復即命淪安貞吉象曰復即命渝安貞不失也四與初訟而近五九五元吉之主能弭天下之訟者也故四求決而自不成訟復即命渝自反而就命變其始訟之意以為事而正理依然不失也正如虞芮之爭至文王之境而善心油然以生相遜而去也曰安貞不失即本然天理未嘗喪九五訟元吉象曰訟元吉以中正也九五處中位以聽天下之訟然古人不貴於聽訟而貴於無訟今也五為聽訟之主而合衆議觀之初不永其訟二不克訟三貞厲而吉四即命而渝上得服而褫皆不成訟是天下無訟也此九五之君所以得元吉也上九或錫之鞶帶終朝三褫之象曰以訟受服亦不足敬也上與三訟而三遜功故上九勝而受服然知其不足敬也故不待終朝而三禠之九健極其始也以剛健之資而勇於訟其終也以剛健之資而勇于義惟勇于義故不待終朝而三褫坎下坤上師師貞大人吉無咎彖曰師衆也貞正也能以衆正可以王矣剛中而應行險而順以此毒天下而民從之吉又何咎矣序卦云訟必有衆起故受之以師師之興必有所爭也為卦坤上坎下以二體言之地中有水聚水也為衆聚之象用兵行師所以聚大衆也以二卦之義言之內險外順險道而以順行之師之義也以爻而言一陽為衆隂之主統衆之象也比以一陽為衆隂主而在上君之象也師以一陽為衆隂主而在下將帥之象也卦辭師貞丈人吉無咎貞正也王者之兵直是行一不義殺一不辜而得天下不為故曰能以衆正可以王矣丈人謂九二以剛中之才當主帥之任也互體有震二居震初震為長子丈人之象六五為遣將之主故又有長子帥師弟子輿尸之戒聖人之兵以順動然猶曰毒天下見得用兵終不是好事雖以順動亦不免一個毒字此聖人特筆以示戒象曰地中有水師君子以容民畜衆地中有水澤水也水在澤中則聚而不散師所以聚衆也師敗則潰也君子觀此則當容保其民而使衆得所養古人之兵起于鄉遂民皆兵也平時不恤其民老弱轉死而不顧一日有事則求其為上用者難矣初六師出以律否臧凶象曰師出以律失律凶也初行師之始律法制也行師且當明一個法制也湯武用兵不免撫衆五步六步七步六伐七伐皆不可亂周公司馬法坐作進退皆有常莭魯侯撫師馬牛臣妾戒以勿逐以其亂部分後不可以為師也故失律雖善亦凶觀漢李廣可見九二在師中吉無咎王三錫命象曰在師中吉承天寵也王三錫命懷萬邦也坤為衆二以一陽居下卦之中為衆所主主帥之象古人遣將君為之推轂曰閫外之事將軍主之故軍中之事主帥得專也故曰在師中吉王者之兵不在多殺錫命至三謹之至也象曰承天寵也師中之事主帥得專則衆知有將而不知有君矣必曰承天寵也奉君命而行使三軍之衆知命出于君也曰懷萬邦者聖人用兵不得已多殺非其心也故三錫之意只在綏懷藝祖遣將必戒以謹毋殺人如曹彬等下諸國未嘗妄戮一人正所謂王三錫命懷萬邦也六三師或輿尸凶象曰師或輿尸大無功也二帥師三以隂柔居二之上是輿尸之象輿衆也尸主也任將必專而衆以主之則自相節制安能成功後世用兵多敗皆緣宦者監軍而節制不一之故六四師左次無咎象曰左次無咎未失常也六四居外卦師已失出量敵而後進慮勝而後會人命所係不失為過謹也上體坤坤以順動故左次無咎前世用兵趨小利而敗者多六五田有禽利執言無咎長子帥師弟子輿尸貞凶象曰長子帥師以中行也弟子輿尸使不當也五居君位為師之主故言出師遣將之道坤以順動奉辭伐罪之兵也故曰田有禽利執言兵以去害田而有禽害民之稼故宜獵取之執言奉辭也後世用兵起于私意若秦皇漢武皆窮山林以索禽獸也非田有禽也任將授師之道當以長子長子謂二也弟子輿尸謂三也自古任將不專而致敗者如晉荀林父邲之戰唐郭子儀之敗也上六大君有命開國承家小人勿用象曰大君冇命以正功也小人勿用必亂邦也師歸而賞功也開國言分封承家言襲爵夫有功而賞必分封襲爵以至有土則行師之始小人斷不可用小人有功而不賞則非報本之意賞則必亂邦是去一患而生一患也先儒只言漢韓彭不當封不知王者用兵如韓彭輩合下不用用而有功安得不賞故象曰小人勿用必亂邦也文王卦辭專言丈人吉於此又有開國承家之戒此義微矣皆先儒所略坤下坎上比比吉原筮元永貞無咎不寧方來後夫凶彖曰比吉也比輔也下順從也原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也一陽居五五隂輔之其卦為比天下之衆不能相一也奉一人而戴之俯首聽命于其下將以求一日之安也曰比吉比而得主則吉矣原始也筮進也元善也永久也貞正也始進而求比當備此三體然後無咎蓋人之求比當比于善不當比于惡當比于久不當比于暫當比于正不當比于邪比之不苟如此也不寧方來求比者以不能自相保之故也有為之主則同趨大安之域矣舜巡方嶽羣后畢朝禹會塗山玊帛萬國皆來求比寧者也後夫凶五為比主上下皆應比而求比不速故宜取凶六爻九五得元永貞之體故彖曰以剛中也五隂皆應不寧方來也故曰上下應也後夫凶謂上六也無首後夫也故彖曰其道窮也正如漢之田橫真人既作而已翔海島將何為也前輩謂如髙帝不可事則橫將誰事終于自絶窮可知矣象曰地上有水比先王以建萬國親諸侯地上有水流水也必有所歸江漢萬折朝宗于海天下比君之象也聖人不自有其天下封建萬國而使之小大相比則親諸侯乃所以親民也初六有孚比之無咎有孚盈缶終來有他吉象曰比之初六有他吉也六爻皆要比五初與五最逺四已應也上比于五近而得比初未能比五有援在四故先比四四居坎體坎為有孚故曰有孚比之無咎言比四而得四也五居坎中缶之象也初因四比五比而相信有孚盈缶也始也比四終焉比五終來冇它吉也正如韓信陳平輩因蕭何魏無知而得髙帝也六二比之自內貞吉象曰比之自內不自失也二居內卦之中與五為君臣正應不獨已求五而五亦求二中心相應而比也他爻以隂而外比于陽已以正應而內相比得比之正也故曰比之自內貞吉象曰不自失也正道相應由內以比不自失也汲汲而求比非君子自重之道也乃自失也後世如子房事髙帝方可謂之不自失六三比之匪人象曰比之匪人不亦傷乎衆皆比五三係于上上六無首後夫也而三比之比之匪人也象曰不亦傷乎深可憫也客五百人從田橫以死其義可重也其愚可哀也六四外比之貞吉象曰外比于賢以從上也四應在初舍內比外得正而吉也九五之賢在已之上衆所同比故象曰外比于賢以從上也九五顯比王用三驅失前禽邑人不誡吉象曰顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也以九居五處君位為比之主上下皆應之王者無私比皇極一敷偏陂不立天下皆近光之民也故曰顯比王者之於民聽其自歸來者不拒往者不追也若田獵然禮止三驅前禽不逐也然聖人雖無心于晉天下而天下自不能釋然於聖人故攸徂之民室家胥慶王師所至玄黃以迎有不待告語而自孚者王者之事也故曰邑人不誡吉象曰顯比之吉位正中也以所比者無偏陂之私也舍逆取順失前禽也不強天下以從之也邑人不誡上使中也其使下也以心感也故不用誡上六比之無首凶象曰比之無首無所終也衆皆比五已獨居後後夫之凶也首先也無首不能為先也象曰無所終也言其身將無所措也正如田橫乾下巽上小畜小畜亨密雲不雨自我西郊彖曰小畜柔得位而上下應之曰小畜健而巽剛中而志行乃亨密雲不雨尚往也自我西郊施未行也畜止也小畜大畜皆以止健為義小畜臣畜君也大畜君畜民也以臣畜君畜道之小者以小而畜大也上巽下健順而止之畜君之道也以隂居四處五陽之間五剛為一柔所畜也四大臣位上畜九五而乾體在已之下剛健為四所止也卦辭曰小畜亨密雲不雨自我西郊臣之畜君其畜固難畜而亨則畜道成矣可以必亨者以柔得位而上下應之受畜於四故亨隂陽和則為雨然須陽唱而隂和則為雨可必隂唱而陽和亦可以雨然陽不遽和也俗人占雨謂朝看東南暮看西北朝屬陽故須陽暮屬隂故須隂東南陽方也西北隂方也今以臣畜君隂唱也自西郊而往也故但密雲而不成雨然至暮而雨則是唱者急而和者緩喻臣畜君之難也然終必成雨則畜道成矣故卦辭言不雨畜未成也上九言既雨畜道成也彖言施未行未成畜也言尚往不以未成畜而止也參酌而觀之然後聖人之意可見矣象曰風行天上小畜君子以懿文德撓萬物莫疾乎風風者天之所以止萬物者也今不行于下而行于上是自下止上臣止君之象也然風卦有形其撓物也吹噓而披拂之有柔行巽入之意臣之畜君全用不得剛須雍容和緩乃告君之體故曰君子以懿文德看文字又看懿字全是柔畜之意龍逄比干非不忠終非盛世事初九復自道何其咎吉象曰復自道其義吉也畜君之道畜之于始則易畜之于終則難當健之初而止之其反道也易故曰復自道何其咎吉象曰其義吉也正之于始義當吉也九二牽復吉象曰牽復在中亦不自失也二居健之中畜之之道已不如初之易須用力牽挽而復然必進諌而納君于善亦畜道之美所以能復者以二居中故也故象曰云云九三輿説輻夫妻反目象曰夫妻反目不能正室也三而止則難矣故必説輻毁其車而使之不得行又不從也則夫妻反目君臣將不相保也蓋引裾折檻而不從則繼之以死也象曰不能正室蓋不能正之於始也至反目則末如之何矣六四有孚血去惕出無咎象曰有孚惕出上合志也四以柔居大臣之位上畜九五之剛固難畜也必君臣相信而後志行故曰有孚血去惕出有孚相信之深也血傷也所傷既去無説輻反目之嫌也出發也惕懼也使其惕懼之心兢兢而發以復於道則君臣無咎矣象曰上合志合九五之志也九五有孚攣如富以其鄰象曰有孚攣如不獨富也五冇孚與四相從攣如固結之深受畜于四也陽為富四已之鄰也不有其富尚以厚其鄰尊敬之至也如太甲成王之敬伊尹周公也象曰不獨富也言能謙恭待下不有其富也上九既雨既處尚德載婦貞厲月幾望君子征凶象曰既雨既處德積載也君子征凶有所疑也密雲不雨畜未成也既雨既處畜道成矣處止也載成也以六四有懿德而成畜道也雖然臣之于君猶婦之于夫也貞守此而不變則危月幾望則與日敵人臣挾畜君之功以居上位勢將敵君矣非保身之道也故曰君子征凶於此而更征則凶也故太甲成王既悔過而自悟而伊尹周公已有歸告之志矣象曰有所疑者蓋欲其保終吉也兊下乾上履履虎尾不嘻人亨彖曰履柔履剛也説而應乎乾是以履虎尾不嘻人亨剛中正履帝位而不疚光明也序卦物畜然後有禮故受之以履履禮也天上澤下上下之分尊卑之等禮之所由起也履行也制行莫如禮動容周旋皆中禮盛德之至也惟聖人然後可以言人倫之至曰履虎尾不嘻人亨虎西方之獸也兊西方也有虎象虎尾在三而五陽履之履虎尾之象也履虎尾蹈危機也人惟履患難而不為患難所傷然後為履道之亨此古人制行必以禮喜怒哀樂有常節尊卑貴賤有常級飲食起居有常處耳目手足習熟乎此無敢過而不及也則異時死生利害之變卒然遇之若平時虞舜歌南風文王演周易雍容暇逸恐懼不足以纍其心此特踐形之至者能之而學者由禮以入也平時耳目聲色之娛不足以動念則異時死生利害之變不足以易其所守履虎尾而不嘻然後可以見踐履之熟狼跋之几舄陳蔡之絃歌至生死交變乎前而此心不亂其必有道矣彖曰履柔履剛也六爻一柔履五剛也剛不足以制天下之剛惟柔足以制之虎尾在三而五爻皆剛非履之善也故必以柔履説而應乎乾兊説體也乾純剛也純剛非履之善須用説體以應之然後得剛柔之中是以履虎尾不嘻人亨故初素履二坦履四訴履上九視履皆柔履也皆用説應乾也剛中正履帝位而不疚光明也五君位也君位須用剛履然後不疚而光明蓋患難在三初二四上爻履患難者也當用柔履五君位人君去天下之患難者也不當言履患難故五爻曰夬履夬決也用剛一決去天下之患難也此文王盡發在三爻曰眇能視跛能履謂諸爻言也即彖所謂柔履剛説而應乎乾也武人為于大君謂五爻言也即彖所謂剛中履帝位而不疚光明者也以虎尾在三故文王於三爻發其義夫子又就彖中詳言之學者以彖觀三爻以三爻質上下五爻則履卦之義明矣象曰上天下澤履君子以辨上下定民志上天下澤禮之所由起君子辨上下定民志先王觀象制禮以節人心名教等級升降揖遜皆有常節所以習人于死生利害之變也民志既定然後可以履患難守魯之義絃歌如故壞宅之變絲竹不絶此無他志定故也初九素履往無咎象曰素履之往獨行願也虎尾在三而上下五剛皆履之初處下卦之下虎尾在下體之上人之涉世舉足皆危機也惟能素其位而行則各安其當然之分而不陷危機故素富貴行乎富貴素貧賤行乎貧賤素患難行乎患難以此而往何咎之有象曰獨行願也蓋所願者在我人惟所願乎外故蹈危機而不自知也九二履道坦坦幽人貞吉象曰幽人貞吉中不自亂也虎尾在三而二近之危機在前非可履也當求坦道以履所謂腳踏實地也當如幽人守貞則吉二得中故能守貞象曰中不自亂謂此六三眇能視跛能履履虎尾嘻人凶武人為于大君象曰眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君志剛也虎尾在三此位乃危機之所在也凡履此者必如眇者之視然後謂之能視必如跛者之履然後謂之能履象曰不足有明不足與行蓋眇者惟不足于明故其視必審跛者惟不足于行故其動必謹若自以為有餘則必猖狂而妄動曰履虎尾嘻人凶此機不當履則必為所傷自此以上為初二四上爻言也曰素履坦履訴履視履皆致審致謹之意武人為于大君為五爻言也大君之位當用武不如是不足以去天下之患難故五曰夬履夬決也視天下患難所在而以剛決也象曰志剛也去天下之患難必有自強之志而後可如漢之桓靈唐之敬穆豈足以去天下之患難正緣虎尾在三故為諸爻發義九四履虎尾訴訴終吉象曰訴訴終吉志行也虎尾在下而四在上是履虎尾者也訴訴畏懼貌有畏懼之志則不至于輕舉妄動以蹈此危機也故終吉象曰志行也蓋畏懼乃所以行其志也如孟施舍之畏三軍不勝乃猶勝也顔子之犯而不校乃所以為大勇也九五夬履貞厲象曰夬履貞厲位正當也九五君位夬決也視天下患難之所在或在權臣或在宦官或在女子或在小人或在夷狄五威福之權在已一決而去之可也區區而守貞不發則必危故曰貞厲象曰位正當也以其所居之位正當故可以用夬履上九視履考祥其旋元吉象曰元吉在上大有慶也上九處履之終回視吾之所履六爻皆得履之當則可以考祥降祥在天不必考之于天即視吾之所履永言配命自求多福使吾之動容皆中禮則為盛德之至而天人之意可合矣故曰其旋元吉至此履道亨矣象曰大有慶也夫禍福無門惟人所召古人不求福于天而求福于已盡易之道則可以酬酢可以佑神矣夫子曰我祭則受福又曰吾之禱久矣此豈可辦于臨事之頃哉其平時陟降固與鬼神同其吉凶矣履之有慶當以是觀西溪易説卷二
