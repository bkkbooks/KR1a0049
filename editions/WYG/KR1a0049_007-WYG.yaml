body:
  text: 西谿易説卷七宋李過撰下經艮下兑上咸咸亨利貞取女吉彖曰咸感也柔上而剛下二氣感應以相與止而説男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣上經首乾坤下經首咸恒序卦云有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯咸􅁪者夫婦之道也咸言夫婦之感怕言夫婦之正感道莫感于夫婦故男下女為咸之義然咸感也不曰感而曰咸謂感人之道不可以有心也易无思也无為也寂然不動感而遂通天下之故有心于求感非易之道也故去其心而名卦以咸咸皆也无心于感者无所不感也大而天地隂陽之交小而啁啾牝壮之好天機所動不約自隨聖人洗心退藏萬物酬酢相代乎吾前所存者神所過者化此心雖不隨于物而天下萬物卒不能外聖人之心則得所感矣曰咸亨感而亨者也利貞感以正也取女吉人道之感莫大于夫婦兊上艮下男下女取女之義也彖咸感也柔上而剛下卦自否来否天地不交也今六爻一柔上居上六上九一剛下居九三是天地之氣交也故上體成兊下體成艮艮為少男兊為少女艮止而兊説故曰二氣感應以相與止而説男下女是以亨利貞取女吉也泛觀天地萬物機者自動籟者自鳴同聲必相應同氣必相求莫不有自然之感聖人之治天下感應之道亦若是而已矣故曰觀其所感而天地萬物之情可見矣象曰山上有澤咸君子以虛受人澤本在山下而山上澤之澤之氣通乎山也山澤通氣自然之感以虛受人天下之理惟至虚者為能受苟先者以安乎其中雖投之不入矣初六咸其拇象曰咸其拇志在外也金卦六又為人象初為拇二為腓三為股四為心五為脢六輔頰舌惟四得貞吉餘爻皆不善盖三爻為足足欲動而感五為脢以胸感上為口以言感皆非感之善四守貞無心于感者也故于四爻發眀感人之道初居最下拇大指也應在四足往而拇隨以拇而感未能感也象曰志在外言在應四也六二咸其腓凶居吉象曰雖凶吉順不害也二居拇上足之肚也行而感則凶順而居則吉設両端以聴其自擇也象曰順不害也言能順則不害也九三咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也三下體之上股足之上也拇而腓從股以動者也三位又不正舉股而動以隨人其感亦勞矣守此吝道也象曰咸其股亦不知處也志在隨人所執下也九四貞吉悔亡憧憧往來朋從爾思象曰貞吉悔亡未感害也憧憧往來未光大也四處心位有心于感則害咸體故不言心曰貞吉悔亡守貞不動則得咸之吉而悔亡矣萬物往來于吾前苟此心憧憧然與之為往來是以思感也以思而感則思之所不及者不能感矣但朋從而已象曰未感害也貞而不感未有害也以思而感則未光大也繫辭子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮日往則月來月往則日來日月相推而眀生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者屈也來者信也屈信相感而利生焉尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇徳也過此以往未之或知也窮神知化徳之盛也九五咸其脢无悔象曰咸其脢志末也脢心至輔之下人之胸也以胸感人怛然忘懐可以无悔矣然有胸无心又感道之病蓋此心又不可無所主也故象曰志末也又説四以心感則曰悔亡是有悔而亡也五以胸感則曰无悔是无復有悔也則胸感為善矣知胸感為感之善則知心感為感之末故象曰志末也上六咸其輔頰舌象曰咸其輔頰舌滕口説也上以口舌感人其感人也末矣合咸卦六爻觀之辭皆未善四得貞吉又有憧憧往來之戒然則感道安在聖人故曰易无思也无為也寂然不動感而遂通天下之故非天下之至誠其就能與于此夫惟盡誠者然後能感所以六爻皆未善以見感道之難巽下震上恒恒亨无咎利貞利有攸往彖曰恒久也剛上而柔下雷風相與巽而動剛柔皆應恒恒亨无咎利貞久于其道也天地之道恒久而不已也利有攸往終則有始也日月得天而能久照四時變化而能久成聖人久于其道而天下化成觀其所恒而天地萬物之情可見矣恒久也天下之理可以常久而不變者以其正也卦震上㢲下咸男下女夫婦之始今也男上女下男外女内為夫婦之正道之可常者惟其正而已曰恒亨利貞无咎道之恒者可以通行而无咎也利貞利乎正也正則可恒矣利有攸往乃所以為恒也往則不息不息則久天地之道不過如此子思得此而言中庸盖中者正也庸者常也惟中故可恒恒則不息不息則悠久悠久則無疆其此之謂歟彖曰恒久也剛上而柔下雷風相與巽而動剛柔皆應恒而就卦取恒義也卦自泰來泰天地之交也今初九一剛上居九四六四一柔下居初六故上體為震下體為巽震為長男巽為長女男上而女下男女定位也其位既定然後二象相與剛動于外柔㢲于内上下二體剛柔皆相應所以為恒也恒亨無咎利貞久于其道也天地之道恒久而不已也利有攸往終則有始也天地之道所以恒久者在于不已利有攸往不已之事也曰終則有始盖天地之道終始往來相循于无窮所以為恒也所存者益神所過者常化貞无咎所存者神之謂也利有攸往所過者化之謂也此終則有始之意也日月得天而能久照四時變化而能久成聖人久于其道而天下化成日月四時天地所以為常也故以其化而見其恒久于其道聖人所以體其常也故以其常而見其化泛觀天地日月之往來陰陽之代謝百穀草木之榮悴與夫生民之日用飲食其相循于无窮者皆常之功用也故曰天生萬物之情可見矣象曰雷風恒君子以立不易方震為雷巽為風天下之至震動者莫如此二者雖聖人至此亦當祗畏故迅雷烈風必變盖衆人當風雷震動之時則必倉皇自失改其常度與平居暇日全相背也惟徳至于舜然後能弗迷是舜能有恒故處雷風震動之時視之如平日也于此之時視之如平日然後見胸中之有常故君子于此當立不易方若做過這事確爾如是初不因人作輟也初六浚恒貞凶无攸利象曰浚恒之凶始求深也浚深也人情物理深必有漸初處恒之始遽以深為常既凶而且无所利也人道之交如君臣相交夫婦相與朋友相際其始皆未可深也由淺而深其深必久始而求深其壊必遽象曰始求深也賈誼劉蕡皆始求深者也九二悔亡象曰九二悔亡能久中也以乆居二剛柔得中可恒之道也故悔亡象曰九二悔亡能久中也以剛柔得中故可久也子思言中庸盖本諸此惟中故可常也然九二所以得剛柔之中者九剛也二柔也剛柔兩用所以為中也中庸曰舜執兩端用其中于民盖立道以來合下有兩立天之道曰隂與陽立地之道曰柔與剛皆兩也執兩所以用中執一則非中也二之得中其謂是歟九三不恒其徳或承之羞貞吝象曰不恒其徳无所容也以剛居剛而位不中是不恒其徳則羞辱或承之矣以此而不變吝也象曰无所容也為衆所羞則无所容其身矣子曰不得中行而與之必也狂狷乎中行恒徳之人也狂狷過與不及者也恒卦六爻惟二與五以中行而有常故二悔亡而五恒其徳貞初與四不及中三與上又過中皆不恒其徳者也故初浚恒凶三不恒而羞四田无禽上振恒凶也九四田无禽象曰乆非其位安得禽也上體五得中四位不中田所以從禽也然亦必以正正所謂範我馳驅詭遇之禽雖若丘陵君子不取也故曰田無禽以此而田未必无禽然猶无禽也象曰久非其位盖君子之恒者也惟正而已所謂立天下之正位是也況非其位而可久乎所以无禽也六五恒其徳貞婦人吉夫子凶象曰婦人貞吉從一而終也夫子制義從婦凶也五得中能恒其徳者故曰恒其徳貞卦男上女下五雖男位而以六為常二雖女位而以九為常以五之柔下從二之剛夫柔而婦剛非可恒也故曰婦人吉謂貞于柔婦人則吉也夫子貞于柔凶之道也故象曰婦人貞吉従一而終也夫子制義従婦凶也謂従婦人之道也上六振恒凶象曰振恒在上大无功也處震之終震動也位又不正以妄動為常凶道也故象曰振恒在上大无功也合恒卦六爻觀之辭亦未善初三四上皆凶二五雖得中以夫子制義言之又失剛柔之正然則恒道安在聖人故曰中庸之為徳其至矣乎民鮮能久矣久于中亦聖人事也夫惟聖人然後能體恒所以六爻皆未善以見常道之難艮下乾上遯遯亨小利貞彖曰遯亨遯而亨也剛得位而應與時行也小利貞浸而長也遯之時義大矣哉一隂生姤二隂生遯隂長而陽遯也小人漸長則君子當見㡬而去所謂隱居以求其志行義以達其道曰遯亨雖遯也乃所以為亨然二隂漸進猶未盛也勢尚可為君子皆全身而去非所望也聖賢處亂世當亂形未見正當維持危行遯言以漸而正之不害為遯也故曰小利貞春秋戰國之時人道絶矣而孔孟猶不去盖聖賢無不可為之時如曰天下有道不與易也聖人正欲易亂世如沮溺輩則无如之何也但以隂陽二氣觀之一隂生午二隂生未陽冝遯矣而勢熖特盛畢竞還他成許多生物之功然後已全身逺害特遯之細事也彖曰遯亨遯而亨也言遯乃所以亨也剛當位而應與時行也二隂雖長九五以剛居君位六二居中而五應之君臣之情未睽也烏可遽去哉當觀時而動也小利貞浸而長也謂隂長以漸尚可貞也遯之時義大矣哉謂非止為苟去也卦中六爻惟上九肥遯五為嘉遯之主下四爻皆可以去可以无去者也象曰天下有山遯君子以逺小人不惡而嚴天至髙也天下便見山極髙之山所謂泰山巖巖魯邦所瞻者是也世不亂无以見君子小人方長君子為天下所屬望正當巍巍自立使小人不可得而依附則不能為己害矣不惡而嚴乃逺小人之道也初六遯尾厲勿用有攸往象曰遯尾之厲不往何災也初居遯之始位最微尾在後之物也象既遯矣已獨在後見㡬不敏也必為小人所害故厲然己處下不繫成敗可以去可以無去者也故勿用有攸往象曰不往何災與其遯而危不若不遯之无災也古之人有仕亂世而不去者多矣位卑位也六二執之用黄牛之革莫之勝説象曰執用黄牛固志也二居中九五之君剛當位而應己君臣之情甚厚也故二爻特不言遯是可以无遯也所當固守其志不為小人所亂黄牛之革言其自固所謂危行也莫之勝説言其避禍所謂言遜也危行以自固遜言以避禍雍容于羣小之間而使國勢猶有所倚則六二之為也象曰固志也九三係遯有疾厲畜臣妾吉象曰係遯之厲有疾憊也畜臣妾吉不可大事也三與下二隂同體為小人所抜係不得遯也自古小人之進皆君子引援之力其引援不知其害己也故曰係遯有疾厲然小人何世無之不宜引致髙位以臣妾畜之則吉矣非可使在人上象曰有疾憊也謂小人拔係必為己害也不可大事也小人大用則必亂九四好遯君子吉小人否象曰君子好遯小人否也四離下體而居上无所牽係見㡬而去得遂其志願而遯也故曰好遯君子得遯則君子之道伸矣世皆小人則人心離而生亂則小人必為天下戮實小人之否也故一君子在小人之間猶為小人之福君子去則小人危矣九五嘉遯貞吉象曰嘉遯貞吉以正志也以陽剛之君而居中所謂陽當位者也己為遯之主使小人得進而君子棄去誰之咎也必不得已當致禮以褒􅃂之以示崇尚之意故曰嘉遯如鳴騶入谷鶴書赴隴物色丘園皆所以嘉其遯也使其肯来歟尚足以共國使其不肯来歟亦清風義槩又賴以激貪而起懦故爻曰貞吉象曰以正志也上九肥遯无不利象曰肥遯无不利无所疑也處遯之上在一卦之外髙飛逺舉翩然長往本无心于用世以遯為肥者子雲所謂山雌之肥是也非如下四爻意在得時行道遇世不可為而後遯者也之人也飄然物外憂患之所不加故曰无所疑也乾下震上大壯大壯利貞彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣四陽盛長陽為大大者壯也利貞陽壯而正也陽生至四隂凝始退陽氣方正正故利也彖曰大壯大者壯也剛以動故壯大壯利貞大者正也正大而天地之情可見矣大者正也陽為大陽進至四陽壯也下體剛上體動以剛而動故名卦以壯也貞正也大壯利貞陽進至四陽氣始正也陽正則萬物發生生物之心天地之真情也故曰天地之情可見矣全卦六爻以剛動為義凡人之生所禀不同而血氣之剛為難制故君子必以理義制之四陽方壯不可禦也猶人血氣之盛故六爻皆以進為戒以貞為吉惟四爻陽正以正而動君子之道則曰壯于大輿之輹象曰雷在天上大壯君子以非禮弗履程氏曰雷震于天上而壯也君子觀其壯之象以行其壯君子之大壯者莫若克己復禮古人云自勝之謂强中庸于和而不流中立而不倚皆曰强哉矯赴湯火蹈白刄一勇之决者可能也至于克己復禮則非君子之大壯不可能也故云非禮弗履初九壯于趾征凶有孚象曰壯于趾其孚窮也初陽方壯其心常動趾所以行也以剛而動未必中理征而得凶既凶而窮天理乃復故曰征凶有孚象曰其孚窮也頼乎困窮而天理復還也所謂困于心衡于慮而後得操心危慮患深而後達者也九二貞吉象曰九二貞吉以中也剛而得中能禮者也以理勝氣守中而吉象曰九二貞吉以中也九三小人用壯君子用罔貞厲羝羊觸藩羸其角象曰小人用壯君子罔也三以剛居剛位不中正小人處此必用其壯君子則忘其壯理義與血氣之别也貞守其剛而不變則厲羝羊喜觸之物三勇于進四一陽在上止之觸而不勝至羸其角小人動乎血氣自取橈敗之象也三居剛極故設此戒九四貞吉悔亡藩决不羸壯于大輿之輹象曰藩决不羸尚往也陽進至四陽氣正矣壯而得正吉且悔亡二隂在上其藩已决可无羸角之患輹所以行也以此而行莫之能禦矣象曰尚往也陽壯至四而得正故可往也與下體異六五喪牛于易无悔象曰喪牛于易位不當也一隂在五四陽並進非己之能有五陽生則為夬一隂必决非可久居故羣陽之進非一隂能主喪之而去略無芥葉則无悔猶君子並進不容小人更據尊位所宜退聴以避賢路然後可免也象曰位不當也謂陽進此則决矣以隂居之故不當也上六羝羊觸藩不能退不能遂无攸利艱則吉象曰不能退不能遂不詳也艱則吉咎不長也陽壯至六則成純乾其陽必亢亢則不知進退存亡故曰不能退不能遂无攸利也艱則吉謂知進退存亡之理而自守則吉盖亢而能用故也象曰不詳也謂不眀消息之理也曰咎不長者以陽為君子君子知艱故咎不長然上體六陽進此為義故六五一爻當以夬卦五爻觀上六一爻當以乾卦上爻觀坤下離上晉晉康侯用錫馬蕃庶晝日三接彖曰晉進也眀出地上順而麗乎大眀柔進而上行是以康侯用錫馬蕃庶晝日三接也晉眀也進也眀體在上坤進而上行諸侯覲王王錫之殊禮而其數有加也故卦辭止云康侯用錫馬蕃庶晝日三接彖曰晉進也眀出地上順而麗乎大眀離居坤上大眀之世也六五以柔順之道麗乎君位也柔進而上行三為諸侯之位下卦純柔體自進至三方得諸侯之位又進至五方得受錫故五為晉之主三為康侯之位進而上行五接以禮是康侯用此卦而錫馬蕃庶晝日三接也象曰眀出地上晉君子以自昭明徳日出地上大眀之主在上也居南面以聴天下諸侯北面而朝之晉之事也古者分茅胙土以象賢徳君子必自昭眀徳然可可以受王命初六晉如摧如貞吉罔孚裕无咎象曰晉如摧如獨行正也裕无咎未受命也卦之三爻為康侯之位初在下未得位晉如欲上進也摧如又退折也未可上進貞守則吉也故曰晉如摧如貞吉罔孚徳未孚于衆也退而自裕以修徳則无咎象曰獨行正也獨行吾之正也裕无咎未受命也諸侯必受命于天子以未受命故未可進也六二晉如愁如貞吉受茲介福于其王母象曰受茲介福以中正也二與五分雖君臣然非諸侯之位欲進如又愁如愁如未得所願也亦未可進守貞則吉六五以柔居君位是以母道王天下也二應在五進而至五則受錫矣故曰受兹介福于其王母言受兹介福必進至王母之所今尚居二未可受福也象曰以中正也以進而至五然後得中正也六三衆允悔亡象曰衆允之志上行也三正康侯之位退而至三可以進矣初之罔孚衆未允也二之愁如猶有悔也三居上位徳孚于衆而衆允進徳所願而悔亡故曰衆允悔亡如此則可以受錫于王矣象曰衆允之志上行也謂上進于五也九四晉如鼫鼠貞厲象曰鼫鼠貞厲位不當也四近卿士之位也古之諸侯有入為王卿士者二進覲五而至四苟有覬覦卿士之心則覲王之心已不純故以鼫鼠為戒鼫鼠貪物也如周人将畀虢公政鄭伯失卿士之位而怨周既交惡又交質其終也帥師取成周之麥又取成周之禾是鼫鼠也故曰晉如鼫鼠至此固當守而以危懼自戒則将敬以受錫矣故曰貞厲象曰位不當也謂此位非諸侯之所當覬也六五悔亡失得勿恤往吉无不利象曰失得勿恤往有慶也進而至五進于王所矣君臣交際享禮命宥得其所願悔既亡矣雖然惟知覲君而已錫禮之得與否勿憂也錫馬之多三接之勤繼此而至矣故曰失得勿恤往吉无不利象曰往有慶也謂勿恤而往則受殊禮而有慶也上九晉其角維用伐邑厲吉无咎貞吝象曰維用伐邑道未光也角極也進而至五已受錫矣又進而上諸侯受錫之極則命為方伯錫以斧鉞使得専征伐諸侯有不庭者則奉王命以討之故曰晉其角維用伐邑然専征大事也必謹奉王命則吉而无咎故曰厲吉无咎然極治之時為二伯者率東方諸侯入應門左率西方諸侯入應門右安有不庭而尚勞征伐哉至于維用伐邑則亦吝矣况可恒哉故曰貞吝象曰道未光也必無事征伐則方伯之職舉而道光矣西谿易説卷七
