body:
  text: 西谿易説易類提要臣等謹案西谿易説十二卷宋李過撰過字季辨興化人董真卿周易㑹通稱此書有過自序在慶元戊午謂㡬二十年而成此本佚去其序而書中亦多闕文葢傳抄訛脱又非真卿所見之舊矣其書首為序説一卷分上下經依文講解而不及繫辭以下馮椅易學稱其多所發明而議其以毛漸三墳為信又多割裂經文如乾卦初爻初九潛龍勿用以下即接以象曰潛龍勿用陽在下也又接以文言曰潛龍勿用下也潛龍勿用陽氣潛藏初九潛龍勿用何謂也至是以君子勿用也汨亂顛倒殆不可訓亦大為胡一桂所譏其論爻辭為文王作謂先儒以西山等字指文王者為鑿而説明夷一卦以上三爻為箕子事下三爻為文王事則仍不免自亂其例蓋過晚而喪明𠖇心黙索不能與師友相訂正意所獨造或不免毅然自為収視返聴用心刻摯亦往往發先儒所未發其亂經之罪與詁經之功固約畧可以相當也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀西谿易説原序六經中惟大易一書可見聖人之心葢自秦人焚滅先王典籍後漢興逐漸收拾雖能畧備如詩書二禮春秋皆不免有散失牴牾惟易以卜筮獨存故大易一書不經秦火為聖人全書學者欲見文王孔子之心當於此書求之易即理也理在物先故有是理然後有是物無是理則無是物未有天地萬物先有天地萬物之理所謂道在太極之先者是也於未見氣之前元有此易之理故繫辭曰易有太極是太極困易而有也太極既判然後有天地有萬物即得依此理故未有天地是理隠於無形既有天地是理行乎天地隂陽君臣民物事理之間未嘗一日廢也是理也天不能秘然後河圖出聖人不敢私然後八卦畫天不能不以此理示人故寓其數於河圖雖然河圖不苟出也有聖人出然後河圖出聖人之心與天合得此理於未兆之先不敢以為己私也於是因河圖而畫卦自夫八卦既畫始有言語文字之可傳故未畫之先易存乎理既畫之後則易存乎書前輩所謂畫前元有易是也聖人既畫八卦因强名之曰易易者以變易為言也繫辭曰易之為書也不可逺其為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要惟變所適又曰剛柔相推變在其中矣繫辭焉而命之動在其中矣又曰化而裁之之謂變推而行之之謂道又曰非天下之至變其孰能與於此葢是理也與天地相為變通而未嘗有所止窮也古文日月為易亦取往來不窮之意先儒言重卦不一王弼以為伏羲重鄭元以為神農重孫盛以為夏禹重司馬遷以為文王重陸徳明以為伏羲畫八卦困而重之為六十四文王作卦辭周公作爻辭據諸儒紛紛之説特未定者以未曽見三皇易與夏商易也葢自伏羲而下厯代各自有易已有六十四卦先儒未之知也繫辭中所載聖人制器取象十三卦自伏羲神農黄帝堯舜氏已有取諸益取諸睽取諸隨取諸渙之類先儒以謂伏羲只畫八卦卦未重而聖人能取其象者葢己然之理存乎天地之間聖人得此理於未兆之先故也然亦未免為率爾之談也葢亦未嘗見三皇易與夏商易故也先儒謂伏羲作網罟取離不外八純卦神農而下方取重卦以證伏羲所畫止八卦不知伏羲作書契代結繩之政已取諸夬矣安知其所畫止八卦哉據山海經伏羲得河圖夏后因之曰連山黄帝得河圖商人因之曰歸藏列山氏得河圖周人因之曰周易是河圖不特出於伏羲氏之世也夫子曰河不出圖吾已矣夫是有聖人出則河圖必出也故伏羲黄帝列山氏皆得河圖而作易然神農氏制器尚象見於繫辭甚明今所載乃遺神農氏而著列山氏未知所據周禮太卜掌三易一曰連山二曰歸藏三曰周易杜子春云連山伏羲易歸藏黄帝易鄭元易贊及易論云夏曰連山商曰歸藏周曰周易釋云連山者象山之出雲連連不絶歸藏者萬物莫不歸藏於地中周易者言易道周普無所不偹如此則杜子春之言與山海經合而鄭元所釋連山易歸蔵易周易之義又皆無據恐未足慿也按世譜羣書神農一曰連山氏亦曰列山氏黄帝一曰歸藏氏既連山歸藏並是代號而神農氏號連山與列山則山海經所載不應序在黄帝之後既是曰連山又不應易名不取連山而反取乾坤要之諸儒之説所以紛紛不定者只縁不見三皇易與夏商易耳據本朝元豐中毛漸奉使京西至唐州得三墳書於民家墳皆古文有曰山墳氣墳形墳葢山墳為天皇伏羲氏連山易氣墳為人皇神農氏歸藏易形墳為地皇黄帝氏乾坤易其經卦皆八毎卦之下皆有七卦遂為八八六十四山墳爻卦大象曰崇山君伏山臣列山民兼山物潛山隂連山陽藏山兵疊山象八卦其崇山君下則有君臣相君民官君物龍之類七卦氣墳爻卦大象曰天氣歸地氣藏木氣生風氣動火氣長水氣育山氣止金氣殺八卦其氣歸下則有歸藏定位歸生寃歸動乗舟之類七卦形墳爻卦大象曰乾形天坤形地陽形日隂形月王形山水形川雨形雲風形氣八卦其乾形天下有地天降氣日天中道月天夜明之類七卦如此則三墳者三皇易也已有連山歸藏乾坤之名卦亦已有六十四曰君臣民物隂陽兵象歸蔵生動長育止殺天地日月山川雲氣者即乾坤震巽坎離艮兊之别名也其君臣相歸蔵定位地天降氣等卦即六十四卦之别名也今以毛漸所得三墳易質之諸儒所載皆互相得失山海經載伏羲黄帝氏得河圖而列山氏似失之贅杜子春謂連山伏羲黄帝歸蔵而不著夏商文幾鹵莾世譜以列山連山為神農代號與山海經所次又失先後之序鄭氏所釋三易之義固可以牽合然以三墳卦名考之如崇山君伏山臣豈有象山出雲連連不絶之意如天氣為歸地氣為藏豈有專取歸藏於地之意至於周易而稱周因代以顯周而已文王演易雖在商末自武王革命之後周之子孫所世守以為卜筮之書與三易並藏故稱周以别餘代亦猶周書周禮之立名耳其所謂周普之義果安在哉今約諸儒之説當至三墳毛漸所得之書而後定葢伏羲神農黄帝各有易其卦已重為六十四夏商周易名特循三皇之舊耳夏后氏連山易不可得而見商人歸藏易今行于世者其經卦有八重卦已有六千四經卦八謂坎為犖犖者勞也以萬物勞乎坎也謂震為釐釐者理也以帝出乎震萬物所始條理者也餘六卦同又其餘六十四卦名與周卦名同者三之二曰屯蒙訟師比畜履次序大畧亦同卦名不同者如謂需為傉小畜為小毒畜大畜為大毒畜臨為林禍之類如此則文王重易止因商易之舊今以周易質之歸蔵不特卦名用商卦辭亦用商如屯之屯膏師之帥師漸之取女歸妹之承筐明夷之垂其翼皆因商易舊文則六十四卦不在文王時重自伏羲以來至于夏商其卦已重矣方知繋辭所載取象十三卦皆當時所有之易也故曰先儒未曾見三皇夏商易所以紛紛之説特未定據文王卦名用商卦辭亦用商則文王所以重之易重個甚麽葢商易但有卦辭而無六爻如屯卦但曰屯不言某上某下為屯蒙卦但曰蒙不言某上某下為蒙此惟文王之心與湯之心脗合然後能逆推得坎上震下為屯艮上坎下為蒙之數既二卦相重便有六畫因六畫之剛柔以推一卦之變于是繫辭焉以斷其吉㐫而謂之爻葢文王所重重易六爻也易爻既重於是合天地隂陽君臣民物事理之會前乎千百世之已往後乎千百世之未來其無窮之變盡總括於三百八十四爻而無遺矣故易自伏羲而始歴夏商至文王而大備云文王之易雖備然其理尚隠也越五百載而夫子生其潛心於文王非一日也於是盡得文王之心於韋編三絶之後始作彖象文王繫辭等以明文王之易曰彖者所以明文王之卦辭也曰大象者所以明二象之得為此卦也曰小象者所以明爻辭也曰文言者所以明彖辭爻辭未盡意也曰繫辭者所以反覆易道無窮之秘也聖人有功於文王之易者非一使當時無夫子彖象文言等後世學者欲求文王之易信難矣文中子曰成我者夫子也通于夫子受罔極之恩見得聖人有功於後學與天地相為無窮也故曰易至文王而偹至夫子而顯然既有文王孔子之易矣自孔子而下二千年來傳易者凡幾家竟未有得文王孔子之心者故易至夫子而顯至先儒而晦夫子之心惟其盡合文王之心也故能贊易如曰文王既没文不在兹乎見得文王未嘗没毎謂揚子雲作太𤣥以擬易亦必有所見如法言曰春木之芚兮㨙我手之鶉兮去之五百載其人若存兮以此觀之子雲必有所得三易首卦先儒議論不同薛氏註歸藏以為商易首坤自立道以來序合如此引繫辭曰立天之道曰隂與陽皆先隂而後陽立地之道曰柔與剛皆先柔而後剛則商易首坤為得先隂後陽先柔後剛之義然只言商易首坤可也至連山首艮則其説窮矣易鈔云有天地然後有萬物夏易首艮是物先乎天地也夏易所以不傳天尊地卑乾坤之定位也商易首坤是地尊乎天也商易所以不傳惟周易首乾後坤次六十四卦為得天尊地卑有天地然後有萬物之義此夏商易所以不傳而周易獨傳也其説固善然亦未免為率爾之談以文王之道傳於禹湯若謂夏商之易不及周是禹湯之聖不及文王安在其為相傳哉如以夏商之易為失義理而不傳又大不可夫子故曰我欲觀夏道是故之杞不足證也吾得夏時焉我欲觀商道是故之宋不足證也吾得坤乾焉坤乾商易也苟失義理而不傳則夫子曷為於此而觀道哉不知夏商周易首卦不同蓋寓三統之義夏商周所建之正不同夏后氏建寅以正月為嵗首為人統天地二十四位艮連於寅萬物終乎艮又始乎艮也夏正建寅艮連於寅只得首艮商人建丑以十二月為嵗首取丑未之衝為地統坤為地商用地統只得首坤周人建子以十一月為嵗首為天統乾為天周用天統只得首乾只縁所建之正不同故于易之首卦各見其義先儒謂文王重易周公作爻辭余謂周公無預於易文王在羡里中重易周公或未生就使既生必在穉齒豈能預文王之易則為子雲家之童烏也聖人不知此聖人者出各自擔當一件事如伏羲畫卦夏禹叙疇文王重易夫子六經周公禮樂各自擔當一件事不曾攙匙亂筯又文王在縲囚中重易周公豈得預爻辭果爾則周公同在囚也必不如此先儒以周公為易爻辭引左傳韓宣子適魯見易象春秋曰吾乃今知周公之徳與周之所以王為周公與爻辭之據不知宣子之歎葢歎魯也他國不存易象春秋而魯獨存者魯周公後也故周之典禮在焉如必以宣子之言為證則當時所見易象與春秋並謂周公預易象可也然則亦預魯春秋乎即此可見然先儒言周公作爻辭者以爻辭中有王用亨于西山王用亨于岐山語為文王亨王業事故不敢謂文王自言遂以為周公作余謂文王事商之心天地鬼神實臨之豈容有亨王業于岐西之意若以為周公作尤不可夫子去文王五百嵗尚能明文王之心曰三分天下有其二以服事殷周之徳可謂至徳也已矣周公為子而不明其父之心以為文王有亨王業之意尚得為達孝也哉王用亨于西山自是隨卦之王王用亨于岐山自是升卦之王何闗文王若必以王為文王則王用三驅王假有家亦文王耶岐山西山固周山也以普天之下莫非王土言之則皆商之疆理也豈容必盡指為周也哉以文王重易正使有亨王業之意豈宜自言其事且如夫子作春秋夾谷之㑹夫子實攝相事斥萊人誅侏儒使齊人惶懼侵地復歸皆夫子之功而春秋所載只曰夏公㑹齊侯於夾谷公至自夾谷齊侯來歸鄆讙龜隂田若使無他傳記所載則後世安知其事出于夫子聖人不欲自表如此曾謂文王乃自言亨王業之意於易哉春秋定十年春王正月及齊平夏公㑹云云先儒説易遇西字盡指為文王事如西山西隣西郊皆曰文王事也其至西南得朋亦曰文王事此皆言易之弊初何闗於文王如謂東隣不如西隣為紂不如文王果有此義豈聖人所謂明哲保身之道哉韓文公羑里操曰臣罪當誅兮天王聖明此真得見文王之心也文王豈怨紂哉然夫子繫辭又曰作易者其有憂患乎具當殷之末世文王與紂之時何耶夫子此言葢為明夷卦發也文王事只見於明夷文王重易至於晉明夷之事有感焉晉卦明主在上而康侯修朝覲之禮於王有不可得者此文王之所遇也故於明夷卦言已之事且不敢明言之婉其辭而託諸箕子夫子贊易得其心知其不止箕子事也文王事亦在焉故于彖中别言之曰内文明而外柔順以蒙大難文王以之内難而能正其志箕子以之則文王實用此卦也故就六爻分之上三爻為箕子事下三爻為文王事於二爻象曰六二之吉順以巽也分明顯出文王名字以示人也葢順則文王事也文王出羑里之難全是順天理以聖人心迹明白如此先儒説易未有能知之者反以岐山西山為文王事豈不負文王孔子云先儒言易有改竄易本文者如漸卦二爻鴻漸于陸上爻亦鴻漸于陸先儒謂自初爻鴻漸于干以次而進至上爻當漸于天不應又漸于陸遂改陸為逵曰逵雲衢也不知大易一書不經秦火本無牴牾安可改竄鴻漸之所以有取于易者正以上爻鴻漸于陸者見鴻之徳先儒未能知也又如擊辭能研諸侯之慮皆以為羡侯之二字不知易文又安得有羡此自王弼作明爻有能悦諸心能研諸慮語故諸儒循習之而不察夫子立言之意據繫辭本文論乾坤易簡之道繼以能悦諸心能研諸侯之慮定天下之吉㐫成天下之亹亹者葢聖人之易即此心之㣲推而至于大而有國又大而有天下皆不能外是理也故以諸侯代有國字以成文云耳安得為羡耶又先儒説易有釋解不行處則曰占辭也如漸之夫征不復睽之載鬼一車之類皆𨽻之占辭殊不知三百八十四爻皆占辭也豈特解釋不行處便為占辭聖人之易惟其盡天地隂陽君臣民物事理之㑹宻行乎幽明之間可以酬酢可以佑神故君子將有為也將有行也問焉而以言其受命也如嚮故雖占辭亦皆天理近世言易者又盡以三百八十四爻併卦辭盡歸之占辭曰如此而有此占然易固卜筮之書亦不止卜筮之書夫子固曰易有君子之道四以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占然則卜筮者易道之一端也曰尚其辭尚其變尚其象豈止為卜筮設哉近世學易者則曰夫子五十而後學易則亦未可以遽言也不知五十以前皆潛心文王之日月也曰云爾者葢五十以後始盡得文王之心於是始作彖象文言繫辭等曰無大過者謂無大過差於文王之心也聖人不敢自謂盡得文王之心故曰無大過遜辭也三墳山墳天皇伏羲氏連山易爻卦大象崇山君云云伏山臣云云列山民云云兼山物云云潛山隂云云連山陽云云藏山兵云云疊山象云云傳崇山君崇其髙君之象也云云伏山臣潛伏其山臣之象也云云列山民山有行列民之象也云云兼山物髙下相兼物之象也云云潛山隂潛其山隂之象也云云連山陽山之相連如陽氣也云云藏山兵藏岡地内兵之象也云云疊山象疊疊其山如天衆也云云氣墳人皇神農氏歸藏易爻辭大象天氣歸云云地氣藏云六木氣生云云風氣歸六云火氣長云云水氣育云云山氣止云云金氣殺云云傳天氣歸聖人以禮下賢智云云地氣藏聖人以藏智於國云云木氣生聖人以行仁政云云風氣動聖人以宣號令云云火氣長聖人以明長民云云水氣育聖人以教民育財云云山氣止聖人以安萬國云云金氣殺聖人以順天殺物云云形墳地皇軒轅氏乾坤易爻卦大象乾形天云云坤形地六云陽形日云云隂形月云云土形山云云水形川云云雨形雲云云風形氣云云傳乾形天聖人以仰觀天象云云坤形地聖人以辨方隅云云陽形日聖人以繼明照下云云隂形月聖人以命相代政云云土形山聖人以正名岳鎮云云水形川聖人以議法無弊六云雨形雲聖人以雲瑞紀官云云風形氣聖人以决治亂云云據三墳卦毎下有七卦皆以上卦下一字相連取名如山墳爻卦大象之崇山君下有君臣相君民官君物龍之類七卦餘凖此氣墳爻卦大象之天氣歸下有歸藏定位歸生寃歸動乘舟之類七卦餘凖此惟形墳一篇六十四卦皆將上卦下一字於第二字取名如乾形天下卦云地天降氣日天中道月天夜明之類七卦皆以此取名與前二墳不同撮其大畧記之以見一書之義商歸藏易歸藏初經初乾其争言云云初坤榮榮之革云云初艮徼徼鳴狐云云初兊其言語敦云云初犖為慶身不動云云初離離監監云云初釐燂若雷之聲云云初巽有鳥將至而垂翼云云歸蔵齊母經曰舊言之擇新言之念乾屯蒙溽訟師比小赤畜履泰否同人大有佷釐大過頥困井革鼎旅豐小過林禍觀萃稱僕復毋亡大毒畜瞿散家人節奐蹇荔貟誠欽􅁪規夜巽兊離犖兼分歸妹漸晉明夷岑􅨡未濟周易經卦上經乾坤屯蒙需訟帥比小畜履泰否同人大有謙豫隨蠱臨觀噬嗑賁剥復无妄大畜頥大過坎離下經咸􅁪遯大壯晉明夷家人睽蹇解損益夬姤萃升困井革鼎震艮漸歸妹豐旅巽兊渙節巾孚小過既濟未濟西谿易説原序
