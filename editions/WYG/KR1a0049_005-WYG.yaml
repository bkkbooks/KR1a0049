body:
  text: 西谿易説卷五宋李過撰上經兑下坤上臨臨元亨利貞至于八月有凶彖曰臨剛浸而長説而順剛中而應大亨以正天之道也至于八月有凶消不久也二陽生卦乃為臨臨君臨之道也陽生于二何以為君道也當㸔乾卦二爻見龍在田天下已有利見大人之意葢二雖非君位君徳已施普而天下已文明此二陽生所以為君臨之道也二爻曰咸臨君位在五而感道已在二故也故曰臨臨元亨利貞一陽生復二陽生臨剛浸而長也徳説而順二剛得中天下感應陽道大亨而正天運方來理之必盛也至于八月有凶隂陽之道消長不窮二陽方生聖人已為之戒防患之早也葢二陽生臨三陽生泰四陽生壯五陽生夬六陽純乾一隂生姤二隂生遯三隂生否四隂生觀是八月也二陽已消而在上矣臨卦二陽生方來之勢也觀卦二陽消已去之勢也聖人于陽氣方生之時預為陽氣已消之戒故彖曰消不久也聖人之慮逺矣象曰澤上有地臨君子以教思无窮容保民无疆澤所以聚水也澤水更有地儘有可容處臨下之道當以寛王者必有容天下之量故君子體臨之象教思必无窮保民必无疆也教思无窮體兑之説保民无疆體坤之厚初九咸臨貞吉象曰咸臨貞吉志行正也初九一陽初生已有感意臨人之道善意方萌已感之矣感人以善臨之正也故曰咸臨貞吉象曰云云九二咸臨吉无不利象曰咸臨吉无不利未順命也二陽生地上天下文明矣故曰咸臨吉无不利象曰未順命也既曰吉无不利何故未順命葢二陽方生天下已感五正君位方能制命順命在五而感道在二感人之道當感之于未順命之先猶之乾為飛龍在五而二已利見也故曰未順命也六三甘臨无攸利既憂之无咎象曰甘臨位不當也既憂之咎不長也三居兌上説體兑為口舌以甘言臨人者也故无攸利然三爻多憂故言語不足以感人而危之可无咎象曰位不當也言所居不正也既憂之咎不長也既憂其非則得所以臨人之道矣故咎不長六四至臨无咎象曰至臨无咎位當也卦之至于八月有凶數月至八四隂生而二陽消正此爻故曰至臨知患之至而能豫防之臨道之善也故无咎象曰位當也謂四隂之生正當此位也六五知臨大君之宜吉象曰大君之宜行中之謂也五君位君道利明不利幽故知臨為得宜然臨人之道必以寛簡何至于用知五純坤體含𢎞光大之君也故惟寛大之君然後可以用知否則苛察矣故曰知臨大君之宜吉言寛大之君則宜用知而吉也象曰行中之謂也言中則不至于過也上六敦臨吉无咎象曰敦臨之吉志在内也上六居坤之極澤上有地即此爻也故曰敦臨言其徳厚无疆也故吉无咎象曰志在内也言志在保民其中足以有容也坤下巽上觀觀盥而不薦有孚顒若彖曰大觀在上順而巽中正以觀天下觀盥而不薦有孚顒若下觀而化也觀天之神道而四時不忒聖人以神道設教而天下服矣二陽在上為四隂所觀天下觀化于上之象也陽尊君位以臨四隂履順而巽居中履正以觀天下故五為觀之主大觀在上者也四隂在下觀化于下者也在上則為君子之觀在下則為小人之觀君子為人所觀者也小人觀于人者也曰觀盥而不薦冇孚顒若顒仰望也下仰化于上要以誠感人之薦鬼神也當盥手而執匕鬯之時誠意專一至薦食之後誠意少衰故化人之道當觀于方盥之時而不觀于既薦之後也天五方之民異性而千里百里不同風俗然聖人設教自有不疾而速不行而至者觀感之機不待家喻而户曉也意誠于此而民孚于彼要之吾身自有本也故曰觀天之神道而四時不忒聖人以神道設教而天下服是則大觀之君所為也象曰風行地上觀先王以省方觀民設教風行地上无逺近髙下莫不旁周而徧及聖人所以為省方之禮以觀民俗而設教化也初六童觀小人无咎君子吝象曰初六童觀小人道也以柔居最下去二陽逺非能觀者童子之觀也卦以上體為觀之善故君子處此則吝小人觀于人者也其道固如此也六二闚觀利女貞象曰闚觀女貞亦可醜也以柔居内卦之中處下體而不能上進簾視壁聽女子之觀也六三觀我生進退象曰觀我生進退未失道也三處上體近然未離乎下進則為君子之觀退則同小人之觀但觀其所取也象曰未失道也處下卦之上去闚童觀為有間矣進退尚未决故未失道也六四觀國之光利用賔于王象曰觀國之光尚賔也四居羣隂之上進居上體而切近九五諸侯賔于天子觀光于上國之象也庭實旅百奉之以玊帛禮之至也進得所觀而受殊禮也處觀之善者也九五觀我生君子无咎象曰觀我生觀民也五大觀在上居中履正以觀天下為觀之主君子之觀也一人之身天下風俗之所係笑顰以下皆觀感之樞機也故不必觀化于天下而常觀化于己觀我生而无咎則天下无咎矣象曰觀我生觀民也觀我生乃所以觀民也葢君民無二本也上九觀其生君子无咎象曰觀其生志未平也五觀我生矣上又觀其生者合己與物而觀之也是亦君子之觀故无咎然以卦中六爻觀之初六童觀小人之觀也非觀之善二曰闚觀女子之觀也非觀之善三曰進退去就特未决也亦非觀之善已以賢徳在上為天下之觀而下體皆未善是天下未能觀化道徳未能一風俗未能同也故象曰志未平也震下離上噬嗑噬嗑亨利用獄彖曰頥中有物曰噬嗑噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也噬齧也嗑合也彖謂頥中有物曰噬嗑頥中四隂上下二陽如人之頥頷焉今噬嗑九四一陽梗其中是頥中為物所梗頥中有物必噬而嗑之乃亨通也故卦名噬嗑震下離上震為雷離為電天地生萬物有為造化之梗者必用雷電以擊摶之聖人之治天下有為萬民之梗者必用刑獄以斷制之故噬嗑所以去頥中之梗者雷電所以去天地之梗刑獄所以去天下之梗也卦辭曰利用獄言有小人為天下之梗者宜用刑獄以去之也六爻只言用獄之道彖頥中有物曰噬嗑噬嗑而亨言噬而嗑乃亨也剛柔分六爻剛與柔等也動而明震體動而離體明也雷電合而章雷之擊物必與電合然後成章也人之頥中自有雷電齒剛而舌柔雷之擊摶必與電合齒之噬嗑必與舌俱然後成章也柔得中而上行謂六五得中而居上以柔居五雖不當位然後得治獄之道也葢聖人用刑出不得已以柔治獄聖人之仁也此義見在五爻象曰雷電噬嗑先王以明罰勑法天地去萬物之梗必以雷電猶去頥中之梗必以噬嗑先王體之有小人之梗必用刑獄故體離之照以明罰體震之威以勑法初九屨校滅趾无咎象曰屨校滅趾不行也六爻皆説用獄初為惡之始上為惡之終中四爻同頥中之物六爻節目如此初最下小人之為惡者也為惡之始姑少懲之以屨校而滅其趾令不得行而聽其改過也故因滅趾而无咎周禮坐之圜土納之嘉石乃其義也繫辭曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾无咎六二噬膚滅鼻无咎象曰噬膚滅鼻乘剛也以六爻之位言之五君位也為治獄之主四大臣位也為治獄之卿又其下也為治獄之吏頥中之物最大乾胏是乾胏乾肉之冇骨者最難噬也六二體柔以噬膚之道噬之自傷其鼻然亦无咎也治獄者也故咎不在己象曰乘剛也謂九四剛物也已以柔道乘而噬也故傷也六三噬腊肉遇毒小吝无咎象曰遇毒位不當也六三體亦柔見二之傷也以噬腊肉之道噬之亦遇其毒葢不虞乾胏之有骨也遂為所毒雖小吝亦无咎意在去惡已則何咎象曰位不當也以三體柔也九四噬乾胏得金矢利艱貞吉象曰利艱貞吉未光也頥中之梗正在此爻九四近君治獄之卿也諸爻以柔噬九四獨以剛噬乾胏乾肉之有骨者此小人難噬正如乾胏而九四體剛以噬乾胏之道噬之遂得其情故曰噬乾胏得金矢古者司冦以兩劑禁民獄入鈎金然後聽之既得其情則得鈎金以兩造禁民訟入束矢然後聽之既得其情則得束矢曰得金矢謂得其情也然不敢以為能也宜以艱貞之道自守則吉象曰未光也葢刑期于無刑治獄者之職也今猶有小人之梗非治獄之善也古人治獄如得其情則哀矜而勿喜葢謂此也六五噬乾肉得黄金貞厲无咎象曰貞厲无咎得當也六五君位所謂柔得中而上行者也九四噬嗑既得其情矣以獄之成告于六五五柔主也依前以噬乾肉之道噬之乾肉無骨者也葢以柔噬之也于是不忍用刑者曰得黄金用贖刑也古者金作贖刑如吕刑五刑之贖皆有罰以千鍰為差是也九四以剛噬六五以柔噬以剛噬者冇司執法之公以柔噬者人君不忍之仁也然猶貞厲則无咎貞厲謹懼也正如穆王訓夏贖刑刑既輕矣猶曰朕言多懼是也象曰得當也言以柔用獄得用獄之當也者得聖人一個慈祥惻怛之心更無窮也上九何校滅耳凶象曰何校滅耳聰不明也九處卦之終小人為惡之大者也故滅其耳繫辭曰善不積不足以成名惡不積不足以滅身小人以小善為无益而弗為也以小惡為无傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶離下艮丄賁賁亨小利有攸往彖曰賁亨柔來而文剛故亨分剛上而文柔故小利有攸往天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下賁飾也以文為飾物相合則必有文人道無本不立無文不行君臣之交賔主之歡父子兄弟夫婦之好皆當有文以相接禮儀三百威儀三千非徒為是繁縟有本者固如是也卦自泰變隂陽往來交錯而成文曰賁亨小利有攸往止得從彖解曰柔來而文剛故亨上體本坤上六一柔下來文二成離離為文明故亨下體本乾九二以剛往而文上成艮艮止也故小利有攸往剛柔往來交錯成文此天文也如日月之晝夜隂陽之寒暑百榖草木之榮枮皆相錯而後成文此自然之文也故曰天文以六爻之象言也以人道言之則離義取明艮義取止文明以止人文也六爻之義上下貴相文五居君位以上文下吉而有喜是文明以亨也初二三四臣位也以下文上則不可遽進文明以止也小利有攸往之義也此人事故曰人文也賁亨屬五爻小利有攸往屬下四爻葢君以禮遇臣君臣會遇無往不亨士之在下自文其身以待上求非其禮物之至則不輕售安可以驟進哉皆不往而止以上來成離下往成艮為義也曰觀乎天文以察時變觀乎人文以化成天下日月星辰往來運行天文也而時變繫焉君臣父子夫婦朋友相接之禮人文也而教化繫焉人文既偹則天下化成矣象曰山下有火賁君子以明庶政无敢折獄山下有火野燒之火也焚薙榛棘然後草木敷暢物得其賁所以為文君子體此以明庶政无敢折獄禮樂明備百度修舉所以飾國也獄貴情實无所用文故不敢以文折獄初九賁其趾舍車而徒象曰舍車而徒義弗乘也下四爻皆取自文其身不遽往為義初居最下趾之象也趾所以行自賁其所行也所樂在我无用乘人之車也故寜舍之而徒也象曰義弗乘也以義為重前車後乘繋馬千駟不足貴也六二賁其須象曰賁其須與上興也二居中離體文明道徳積中達于面目所謂仁義禮智根于心其生色粹然見于面者也其所賁與初爻賁其一體者異矣象曰與上興也言五自上而求賁則可與興起然不先往也九三賁如濡如永貞吉象曰永貞之吉終莫之陵也濡潤澤也文明之極其徳之盛足以潤其身也故賁如又濡如清明在躬志氣如神者也又與賁其須者異矣然亦未可進也故曰永貞吉象曰終莫之陵也言終當大用也六四賁如皤如自馬翰如匪冦婚媾象曰六四當位疑也匪冦婚媾終无尤也四在三上賁盛于三蓄徳老成可為典型者也故曰賁如皤如華髪黄耉之象也自馬翰如其馬亦㓗白班翰而不進不輕屈于人所謂皎皎白駒在彼空谷者也匪冦婚媾非禮而來皆冦我者之人也安可以冦得哉婚媾則往矣言偹禮也正如黄綺諸公不肯為嫚罵折及吕澤之聘幣至羽翼翻然而起矣葢自賁其趾以至蓄徳老成是惟无用用則邦家有光矣然六五束帛已戔戔然而來天下將被潤澤矣象曰當位疑也言不輕往也曰終无尤也言出處之節無一毫瑕尤也六五賁于丘園束帛戔戔吝終吉象曰六五之吉有喜也有老成之人在下而五欲求之必得所以賁之之道禮物不可輕也故束帛戔戔然至于丘園之下將庶㡬其賁我乎上下相賁文明而亨此其時也雖然我何以聘幣為哉三至然後翻然故始未免吝終則吉象曰六五之吉冇喜也其肯來賁喜可知也上九白賁无咎象曰白賁无咎上得志也至五爻相賁文之極也物極則反故上九處賁之極又反而歸于白賁以質為貴也所謂甘受和白受采繪事後素是也曰白賁者所以反禮之本者也象曰上得志也謂得其本然之志也易道履貴素履賁尚白賁皆貴質之義又説上九處卦之上而无位剛上而止自潔其身非六五束帛之能賁也箕潁之流烟霞泉石自是一種人物是以白為賁者也有道之世如是白賁者多矣象曰上得志也得遂其素志也坤下艮上剥剥不利有攸往彖曰剥剥也柔變剛也不利有攸往小人長也順而止之觀象也君子尚消息盈虚天行也隂陽消長天之理也一隂生姤積而至五陽將盡矣其卦為剥五隂剥一陽衆小人剥君子之象也雖然剥不盡則不復碩果不食生意已在其中矣此天運之所以不窮也曰不利有攸往君子處剥不宜往也彖曰剥剥也柔變剛也五柔變一剛也不利有攸往小人長也小人長君子當順受也順而止之觀象也坤體順艮體止順而止之處小人之道也自古小人之禍皆成于君子之争葢争則小人必勝也君子尚消息盈虚天行也消息盈虚天運之自然也有善必有惡有君子必有小人其天地隂陽之數歟象曰山附于地剥上以厚下安宅山夷而附于地剥象也然山雖夷其下愈厚其土依然在也小人之剥法度壞亂君子徳澤猶在人心未冺民心不摇則天道可囬矣厚下安宅所以固人心也初六剥牀以足蔑貞凶象曰剥牀以足以滅下也自下剥上君子在上處牀也小人自下剥之漸而毁也初且剥足意在蔑正也象曰以蔑下也六二剥牀以辨蔑貞凶象曰剥牀以辨未有與也二隂生剥至辨也亦蔑貞凶象曰未有與也言黨猶未盛且剥辨也六三剥之无咎象曰剥之无咎失上下也聖人未嘗不開小人為善之門一陽在上君子也三與上正應已小人也處羣小人之中自異而應上聖人許之曰剥之无咎象曰失上下也言失上下四隂而應上九也六四剥牀以膚凶象曰剥牀以膚切近災也四隂生牀剥盡而及膚矣是君子之身已被其傷矣故曰切近災也不言蔑貞者蓋四隂生小人之道已盛而為君子者猶不能見幾而去則非蔑貞之罪也六五貫魚以宫人􅃂无不利象曰以宫人􅃂終无尤也五隂在下牽連而進如貫魚然自古小人之亂皆由人主委以大兵大權故其勢得以害君子若以閹人掃除之職主之則无不宜矣五為君位故言所以待小人之道上九碩果不食君子得輿小人剥廬象曰君子得輿民所載也小人剥廬終不可用也剥而至此陽將盡矣剥盡則復陽未嘗絶也人之食果以漸而剥必留一碩大者不剥其所以不剥而食者留以為種子此大者剥下生意已存於不食之中故剥卦頼乎此陽剥盡遂反為復以喻君子之不可盡剥也君子得輿小人剥廬在下而載其上小人之事一陽在上衆隂自下載之有君子得輿之象廬居上而庇其下君子之事一陽在上而衆隂自下剥之有小人剥廬之象初剥牀之足剥之不已則剥其辨又剥之不已則剥其膚至剥之極則剥及于廬是自剥其廬也蓋一君子在上小人猶得所庇君子盡去則小人无托身之所矣象曰君子得輿民所載也小人剥廬終不可用也蓋小人極盛然後君子為民所属望禍亂既極然後知小人之不可用也震下坤上復復亨出入无疾朋來无咎反復其道七日來復利有攸徃彖曰復亨剛反動而以順行是以出入无疾朋來无咎反復其道七日來復天行也利有攸徃剛長也復其見天地之心乎序卦物不可以終盡剥窮上反下故受之以復物无剥盡之理故剥極則復來隂極則陽生陽剥於上而復生於下窮上而反下也卦一陽生五隂之下隂極而陽復也陽君子之道陽消極而復反君子之道消極而復長也故為反善之義曰復亨陽道長矣是以亨也陽長而出隂消而入順消息盈虛之理无相疾害一陽方動衆陽從之以類而升何咎之有反復其道七日來復謂消長之道反復迭至陽之消至七日而來復姤陽之始消者也七變而成復故云七日謂七更也陽進則隂退君子道長小人道消故利有攸徃彖剛反動而以順行陽反於下下體為震震動也上體為坤坤順也陽動於下上體皆坤以順而長也是以无疾曰七日來復天行也蓋隂陽消長天運自然也曰利有攸徃剛長也一陽來復以漸而長是君子道長也復其見天地之心乎一陽生於下乃天地生物之心也夫窮冬積隂之時天地幾於无生意矣而陽氣已動於黄泉之下猶之人焉方其物欲之深也幾於无天理矣而性善之端要不可泯也必有時而發就其發處而觀之則天地之心見矣程氏曰先儒以静見天地之心蓋不知動乃見天地之心非知道者孰能識之象曰雷在地中復先王以至日閉闗商旅不行后不省方陽氣相搏而成雷雷以十月閉蟄十一月一陽生陽氣已動於地下是雷已動而未發雷動於地陽復於下之象也雷動於冬而春發聲陽復於冬而春發生雖其氣尚㣲先王以至日閉闗商旅不行后不省方恐其踐履陽氣也聖人輔相天地之道也初九不逺復无祗悔元吉象曰不逺之復以修身也一陽在下天地之心性善之端也故六爻以復善為義初復之始始而知復知善未逺不逺復也故不至悔而元吉象曰以修身也學者宜以此修身也繫辭曰君子知㣲知彰萬夫之望子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復无祗悔元吉六二休復吉象曰休復之吉以下仁也休善也二取初近從善而復也故吉象曰以下仁也仁人心也善端之發莫切於仁初復於仁而二下之也六三頻復厲无咎象曰頻復之厲義无咎也三不正而位危又取初逺屢失而屢復也屢失故厲屢復故无咎過而復之也六四中行獨復象曰中行獨復以從道也四處五隂之中取初雖逺而獨與初應以道自復者也初曰以修身二曰以下仁四曰以從道蓋修身以道修身以仁无二理也六五敦復无悔象曰敦復无悔中以自考也五居上體純坤天性之至厚者也雖取初逺而以性復中以自考言反求於己不因人而復也上六迷復凶有災眚用行師終有大敗以其國君凶至於十年不克征象曰迷復之凶反君道也上取初逺物欲之深迷而不知復者也妄動固有災眚好大喜功敗而不悟至於十年不克征其秦皇漢武之所為乎故象曰反君道也震下乾上无妄无妄元亨利貞其匪正有眚不利有攸往彖曰无妄剛自外來而為主於内動而徤剛中而應大亨以正天之命也其匪正有眚不利有攸往无妄之往何之矣天命不祐行矣哉程氏曰无妄序卦復則不妄矣故受之以无妄復者反於道也既復於道則合於正理而无妄故復之後受之以无妄也為卦乾上震下震動也動以天為无妄動以人欲則妄矣无妄聖人可也學者未敢言无妄且自不妄入也故由不妄以至无妄所謂自明而誠也如司馬温公教學者以誠又未敢言无妄且自不妄語入是又略下教人也曰无妄元亨利貞大亨以正无妄之理也初二四五爻得之其匪正有眚不利有攸往其處不正則妄矣故有災𤯝而不利有攸往三與上當之彖曰剛自外來而為主於内一陽自卦之外来居内卦之下變坤為震遂成无妄蓋无妄實理也天地人同就太虛中禀得天地得之以為天地人得之以為人非有附麗而來也與他卦之變不同故曰自外來故初爻為无妄之主而六爻惟初得吉蓋初動之始无一毫私意全无妄之體者也動而健剛中而應震動而乾健五剛得中二隂又得中而相應无妄之義也大亨以正天之命也无妄誠也誠者天之道也元亨利貞天徳之全也无妄則與天為一而天徳純全故曰天之命也子思於中庸首篇便曰天命之謂性蓋本諸此其匪正有眚不利有攸往无妄之往何之矣天命不祐行矣哉此釋上卦辭也言无妄之往何往而不可若有眚則天命不祐何行哉言有眚則不利有攸往也象曰天下雷行物與无妄先王以茂對時育萬物天下雷行萬物肅然而聽命其心至一也天與萬物未嘗相誤故曰物與无妄聖人充此心勿忘勿助茂對時育萬物全是順天理初九无妄往吉象曰无妄之往得志也一陽自外來居无妄之初成卦由之動以應乾其動以天无妄之至也故往吉象曰得志也以理而動无往不可其心泰然矣六二不耕穫不菑畬則利有攸往象曰不耕穫未富也无妄誠也實理也盡人物之性於己也有一毫求得於外心便害无妄之體耕而穫菑畬求得於外也必无耕穫菑畬之心然後可以有所往二以隂居隂雖得中然未實也中未實則必外求因有此戒故象曰未富也樊遲之學稼許子之並耕皆耕穫菑畬者也六三无妄之災或繋之牛行人之得邑人之災象曰行人得牛邑人災也以六居三其位不正處動之極動而得災然无妄得災非已致也不言悔吝蓋无妄而災眚至皆吾進徳之騐也有一毫咎人之心則妄矣九四可貞无咎象曰可貞无咎固有之也九四心位也咸卦可見本然之心无一毫之妄也存得本然之心則天理見矣故曰可貞无咎言此心可貞守之而无咎也象曰固有之也言此心固有非外鑠我也九五无妄之疾勿藥有喜象曰无妄之藥不可試也五居乾體而得中純乎天理而與天為一者也必至此而後可以言命无妄不宜疾也而得疾則天也故可以勿藥而有喜如子疾病子路請禱子曰丘之禱久矣伯牛有疾子曰亡之命矣夫如夫子伯牛之得疾然後謂之无妄之疾聖賢平時陟降无非對越上帝時也疾何用禱哉妄而得疾藥亦无及矣故象曰无妄之藥不可試也上九无妄行有眚无攸利象曰无妄之行窮之災也處卦之終其位不正所謂匪正有眚者也西谿易説卷五
