body:
  text: 西谿易説卷三宋李過撰上經乾下坤上泰泰小往大來吉亨彖曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也内陽而外隂内健而外順内君子而外小人君子道長小人道消也論天地之位則乾上而坤下論天地之交則天氣必下降地氣必上騰天地之氣交然後生萬物故論天地之交則必乾下而坤上是天地之氣交也其卦為泰三陽在内三隂在外陽為君子隂為小人治世則君子在内小人在外也内健而外順内剛而外柔又君子之道也盖小人之道色厲而外荏與君子相反故泰卦為君子道長之義曰小往大來吉亨小者往而居外謂隂消也大者來而居内謂陽長也隂消陽長君子之道吉者亨也然太平之功固難居六爻反復言所以處太平之道彖辭義甚明象曰天地交泰后以財成天地之道輔相天地之宜以左右民天地交而生萬物必聖人財成輔相之而後可天地之力有不及必聖人財成之如穿牛絡馬之類天地之道有當然必聖人輔相之如春耕夏耘之類天人之際本和同然不能以詔乎民民不能以授于天聖人財成輔相之功所以左右乎民也初九拔茅茹以其彚征吉象曰拔茅征吉志在外也時泰則賢者可以引類而進志在外應五也九二包荒用馮河不遐遺朋亡得尚于中行象曰得尚于中行以光大也九二臣位當泰之世君子在内而小人在外為大臣者必得所以處君子小人之道君子固當用小人亦不可使之失所也包荒用馮河用君子之道也用賢之道貴廣當明時不可有棄才一智一能皆得自効馮河之勇者亦得用也不遐遺朋亡處小人之道也遐逺也小人逺而在外不當冇厭棄之意疾惡太甚則小人之怨生矣朋亡善惡不可立黨黨立則相傾而亂生此皆鈞軸天下者之任也故于九二言之得尚于中行言鈞軸天下者能如此然後可以上任六五之責也象曰以光大也正所謂如有一个臣斷斷兮無他技其心休休焉其如有容焉以保我子孫黎民也前世朋黨之禍皆起于君子不善處小人之故九三无平不陂无往不復艱貞无咎勿恤其孚于食有福象曰无往不復天地際也三居下體之上上下之交否泰相反之際也三陽既極隂道將反聖人預為之戒曰无平不陂无往不復天下之理無常安平而不險陂者謂無常泰也無常往往而不返者謂隂當復也君子處此當知致治之艱難而謹之則吉雖然小人將復否之憂也吾君臣相信之深无隙之可投則小人何所容其姦君臣相孚則于食有福也前世小人乗間多起于君臣不相信象曰天地際也此言泰否之交也六四翩翩不富以其隣不戒以孚象曰翩翩不富皆失實也不戒以孚中心願也以卦之内外言之陽内而隂外以卦之上下言之陽下而隂上是小人猶在上也將使之不有其孚以其隣翩翩而下退聽以避賢者路則必有感服其心而後可非告戒所能令也故治世君子必有以服小人之心而使之自不為亂非必盡去其黨也象曰中心願也言小人之服當自出小人之心然後可也司馬温公處元祐間事正坐此六五帝乙歸妹以祉元吉象曰以祉元吉中以行願也五泰之主也天地交則為泰君臣交則為泰君臣交際莫大于歸妹古者王姬下嫁諸侯五歸妹而二尚主父際之盛以祉元吉祉福也言錫福于二也象曰中以行願也言君臣之交出于中心之誠也上六城復于隍勿用師自邑告命貞吝象曰城復于隍其命亂也泰極則否理所必至城復于隍矣濬隍之土以築城今城之土又復于隍弊壊之象也太平之禍多起用兵當此之時何暇逺畧退治吾國可也故曰勿用行師自邑告命若貞守初意則吝象曰其命亂也言否將至也坤下乾上否否之匪人不利君子貞大往小來彖曰否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下无邦也内隂而外陽内柔而外剛内小人而外君子小人道長君子道消也否泰之反彖辭皆與泰反乾上坤下是天地不交不生萬物閉塞而成冬之時也小人居内君子居外是小人道長君子道消又内柔而外剛内健而外順皆小人之道曰否之匪人天下不幸至于大弊極壊而非人為之咎則天數也然後可以言否不然禍亂自已致而歸咎于天命則非隂陽消長自然之理故曰否之匪人言非由人致也葢禍亂出于天修人事以應之天命尚可囬出于人則不可逭矣不利君子貞小人道長故不利君子之正也彖辭天下无邦葢大亂之世下陵上替不復能事君象曰天地不交否君子以儉徳避難不可榮以禄居子處亂世之道也初六拔茅茹以其彚征吉亨象曰拔茅貞吉志在君也時既否君子引其類而退則吉既否矣安得亨然必曰亨者无終否之理君子所性盛行不加窮居不損衆人以為否君子未嘗不亨也象曰志在君也君子雖退心未嘗一日不在君所謂中心藏之何日忘之是也六二包承小人吉大人否亨象曰大人否亨不亂羣也當否之時小人在内君子皆奉身而退則國何所倚九五能休否之君二得其應君臣之情猶孚也故包承而不去夫包承於羣小之間小人固吉大人固否然實則亨也他時所頼抗羣小而君子之道復還者皆今日不去之力也象曰不亂羣也處羣小之間而不為所亂大人之事也王文正公用此爻六曰包羞象曰包羞位不當也三不中正處尊位而不去苟禄者也故曰漢張禹孔光五代馮道其流也若為貧而仕抱闗撃柝可也安用據上位哉故象曰包羞位不當也九四有命无咎疇離祉象曰有命无咎志行也此天道之一變也易為君子慮不為小人謀天道一變三陽將復君子之道復還矣謂君子曰天命未艾无我尤也天將福吾類矣葢為君子喜也象曰志行也君子將得行其志也九五休否大人吉其亡其亡繋于苞桑象曰大人之吉位正當也九五陽剛之徳能休否者也大人否於二至此吉可知矣雖然三隂猶在内小人未盡去位也不可以不謹故曰其亡其亡繫于苞桑如其以身托于苞桑然桑柔脆之木也方苞之桑又柔脆之甚危之至也常若危亡之在旦夕也古之人主禍難纔平而安意肆志若唐徳宗憲宗者多矣繫辭曰危者安其位者也亡者保具存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑上九傾否先否後喜象曰否終則傾何可長也物極必反故上九傾否否則泰來矣泰極則否否極則喜豈有長否之理反危為安易治為亂必有陽剛之才而後能也故否之上九則能傾否屯之上六則不能變屯也離下乾上同人同人于野亨利渉大川利君子貞彖曰同人柔得位得中而應乎乾曰同人同人曰同人于野亨利渉大川乾行也文明以健中正而應君子正也惟君子為能通天下之志天理一而已矣无往而不同也天下之人所禀各異等倫則相絶也然其中有不約而同者即天理之一也目有同視耳有同聽至于心獨無所同然乎此同人所以名卦也然其理甚隠卦體一隂在二五陽皆欲同也是舉天下皆知子都之姣者也人心至一處也然非五陽之同皆能同也六爻有正應之同二五以正應而同上下四陽皆退聽其始之欲同者天理之同也其終之退聽者亦天理之同也此聖人設同人之義也卦辭云同人于野亨无往而不同此理也利渉大川同舟遇風波胡越共濟此可以見同也利君子貞君子一理同是正同也彖曰柔得位得中而應乎乾曰同人柔居二而得中上應乾體之九五得正應之同故曰同人也曰同人于亨野利渉大川乾行也在野而同共舟而同天理不約而同故曰乾行也文明以健中正而應君子正也以一隂在二五陽之所欲同也然一隂雖五陽所欲同也非正應之同終不能同下體文明上體剛健中之以二為文明之中五為剛健之中剛柔正應君子之正同也惟以正同則天下无往而不合向之欲同者莫不退聽也故曰唯君子為能通天下之志以六爻言之初出門遇二而同三伏戎近二而同四乘墉望二而同上處郊逺二而同此非正應而同終不克同也故上止无咎三不敢與四不敢攻上志未得終也五克衆陽而遇二二去其宗而同五二爻相遇蘭臭交契誠發乎中達于面目先之以泣而繼之以喜也葢其同也以正而衆陽之所同退聽也故繫辭贊之曰二人同心其利斷金同心之言其臭如蘭天理顯矣象曰天與火同人君子以類族辨物天在上火炎上氣類之同是同人之象也君子觀此則類族辨物萬物之上同乎一氣然而羣分而類聚君子于天下有大同之理然須有個差等内外親疎小大逺近雖差不同所以有至同也不然便是墨子之愛故貴于類族而辨物初九同人于門无咎象曰出門同人又誰咎也一隂在二衆陽所欲同也初近之出門而相遇故曰同人于門相遇而同又誰咎也六二同人于宗吝象曰同人于宗吝道也衆陽皆欲同二二未應五與下體同同于宗也然非正故吝九三伏戎于莽升其髙陵三嵗不興象曰伏戎于莽敵剛也三嵗不興安行也三欲同二而懼五故伏戎于草莽又升其髙陵以窺伺然正理不容故三嵗不敢興三取五隔三爻故曰三嵗象曰敵剛也剛謂五也三嵗不興安行也知其非是退而順理也九四乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也四欲同二而隔九三故乘九三之墉然義弗克攻也故從義而吉象曰困而反則也困憊而反乎天理也則天理之不可踰越者也觀三四二爻見天理在人不可冺没九五同人先號咷而後笑大師克相遇象曰同人之先以中直也大師相遇言相克也五與二同本正應也為三四所間二又與下體同故必欲用大師以先下三陽然後得與二相遇凡人久濶而會面未有不垂泣者其中心之誠不約而然也故先號咷而後笑可以見同心之至諸陽不能同二而終與五同此君子以理同也同之正也象曰以中直也中心達于而目而號咷繫辭曰君子之道或出或處或嘿或語二人同心其利斷金同心之言其臭如蘭上九同人于郊无悔象曰同人于郊志未得也二居内而九在郊逺而不得同也然本非已應何悔之有象曰志未得也言未得遂其所同之志也乾下離上大有大有元亨彖曰大有柔得尊位大中而上下應之曰大有其徳剛健而文明應乎天而時行是以元亨大有盛大富有之時也離上乾下曰當中天物无不照柔當君位五陽皆歸陽為富天下之富皆歸五富有四海之象也卦辭云大有元亨天下富有亨通之時也彖曰柔得尊位大中而上下應之曰大有謂上下五陽皆歸君也柔居五持盈守成之主也乾下離上其徳剛健而文明六爻皆善天命祐之應乎天而時行也是以元亨他卦如泰如豫如豐如既濟皆言治世事也而六爻之變皆未盡善唯大有六爻皆善故卦無它辭但曰元亨夫子彖辭推原所以元亨之意以二體有剛健文明之徳故動而皆善六爻並吉善處大有以得天祐是以元亨也象曰火在天上大有君子以遏惡揚善順天休命天上有火日火也離日當天萬物皆相見之時盛多之象也當太平之世倖門易啓一小人用則足以虧大有之功故君子體離照之象遏惡揚善以順天休命葢天意生賢所以佑大有之君也而遏惡揚善所以順承天之休命也開元太平之盛罷張相李而亂階已成非天不相唐唐之君無以受天命也初九无交害匪咎艱則无咎象曰大有初九无交害也人君一心攻之者甚衆既居大有之始好惡未萌衆説雜然以投皆害人主之心術者也投而中則大有之志荒矣故於初爻便戒之无交害不交其害則投者去矣故匪咎然好大喜功人主易有此也惟思念祖宗所以致此之艱難則不敢輕試矣故曰艱則无咎象曰大有初九无交害也言當察之於初也正如武帝承文景富庶之後開邊禮神祥瑞萬物皆足以中其欲則虚耗之形見矣九二大車以載有攸往无咎象曰大車以載積中不敗也九二以陽剛之才居臣位能任矢下之重五為正應能推誠而尚賢君臣相與以濟大有攸往而无咎也象曰積中不敗也言克負荷大有之責也九三公用亨于天子小人弗克象曰公用亨于天子小人害也三居下卦之上諸侯之位也大有之世衆陽皆歸五三而歸五諸侯覲王之象也諸侯以其國之富貢于天子也故曰公用亨于天子若小人處此則多歛巧取以逄人主之欲矣故曰小人弗克後世日進月進皆小人之逄君者也而民亦困矣故象曰小人害也九四匪其彭无咎象曰匪其彭无咎明辨晳也四陽歸五其富極矣纔有其富侈心便生故曰匪其彭彭大也不自有其大則无咎也象曰明辨晳也明見盛大之不可居故不敢有其富也四居離體故其見明六五厥孚交如威如吉象曰厥孚交如信以發志也威如之吉易而无備也五以柔居尊位處大有之世而居中得大中之體者也衆陽歸已天下之富皆歸君六五何以處之以誠信之道受之可也故曰厥孚交如威如然太平之世禍患皆起于無虞故必威如而後吉纔易玩則無備也故詰戎兵董正治官皆守成之世所當講也上九自天祐之吉无不利象曰大有上吉自天祐也合大有一卦六爻皆善初无交害二大以載三用亨于天子四匪其彭五厥孚交如善處大有者也宜其得天祐故于上爻特贊之曰自天祐之吉無不利總一卦而言之非止謂上九也繋辭曰天之所助者順也人之所助者信也履信思乎順以尚賢也是以自天祐之吉無不利言五履信四思順二與三皆賢得上交于五也如此而後可以得天人之助西谿易説卷三
