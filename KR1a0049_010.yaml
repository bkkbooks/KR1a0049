body:
  text: 西谿易説卷十宋李過撰下經巽下坤上升升元亨用見大人勿恤南征吉象曰柔以時升巽而順剛中而應是以大亨用見大人勿恤有慶也南征吉志行也坤上巽下木生地中自下升上之義古之賢者升進于上其道不一有自司徒命卿論秀而升者自司徒升之司樂樂正升之司馬司馬升之王所有自侯方嵗貢而升者天子則試之射宫中多者得與于祭有自三年大比因賢能之書而升者天子拜受登于天府古者進升之道大畧如此其條目纎悉見于周官之職掌與王制所載而其義則隠于易之升蓋木之升也其勾末萌甲未拆之時枝柯幹葉皆備于未升之時及其得地故其升也莫能禦猶賢者方其未進也道徳蓄蓄皆當素備故一出而名實遂孚矣卦辭升元亨君子之升大亨之道也用見大人勿恤大人九五也升而至五則見君矣宜無愛也自巽至坤皆離位也故南征吉象曰柔以時升謂初六柔自下而升九二剛得中六五在上為己之應是以大亨也得見大人則有慶矣故无憂也卦屬南方離明萬物相見木道至此其志乃行故曰南征吉志行也象曰地中生木升君子以順徳積小以髙大地中生木以漸而升君子之升不能遽進也體二象之順積小以髙大蓋坤以順為徳巽亦以順為徳也古人進身自有次第不容躐等初六允升大吉象曰允升大吉上合志也允信也初在下猶其未升也須誠實充足然後進而大吉故賢者之未升必其行懋于家徳信于鄉然後可以論進此自卿大夫而升命鄉論秀而升皆自下推澤而進也象曰上合志也謂上合六五之志也九二孚乃利用禴无咎象曰九二之孚有喜也進而至二五為正應潜徳之孚於君矣故宜用禴不必其禮文之備也此不由三道而升自以徳孚于君是以為不次之升如傅説之于髙宗以夢而升是也太公之于文王以卜而升是也象曰有喜也君臣相孚故有喜也九三升虚邑象曰升虛邑无所疑也又進至三三諸侯之位邑國也進而至此則一國皆推其善士矣又何疑焉此自侯國而升也故曰升虚邑象曰无所疑也謂徳孚于邑國可以无疑也六四王用享於岐山吉无咎象曰王用享于岐山順事也四卿位至此所謂升之司馬將論以進于王也王即六五也岐山西山也此互體兊之上故曰岐山言六五之王將論定而官之是享于岐山也象曰順事也進而至此既得卦體故曰順事六五貞吉升階象曰貞吉升階大得志也至此則進于天子之階矣或升之王或試之射宫或登之天府皆所謂升階也則升道亨矣故曰貞吉象曰大得志也升而至階得志可知也上六寘升利于不息之貞象曰寘升在上消不富也處升之極知進而不知退則顛寘乎利達者也君子知進退存亡故宜貞守貞守乃所以不息也猶如木升之極必歸根復命雖華實剥落而生生之意又寓于其中矣所謂利不息之貞也象曰㝠升在上消不富也升極則反其道消矣以柔居之故曰不富坎下兖上困困亨貞大人吉无咎有言不信彖曰困剛揜也險以説困而不失其所亨其惟君子乎貞大人吉以剛中也有言不信尚口乃窮也困剛揜也三陽處三隂之間陽為隂所揜是君子為小人所困也然困而亨蓋惟君子為能處困身處困而道未嘗不亨也貞大人吉謂九五也九五謂困之主舉小人而去之則君子之道亨而得貞吉矣有言不信君子處困正當自守難以口舌辨也彖困剛揜也剛為隂所揜也卦坎險而兊說險難而以説處之困而不失其所亨用此道也此惟君子能之被兵于匡宋絶糧于陳蔡而道未嘗少貶皆聖人事也九五以剛居中能困亨者也故曰以剛中也處困之時遜言以避禍故尚口乃窮也六爻之義聖人却有深意據君子為小人所困陽爻為君子隂爻為小人則陽爻當困而隂爻當吉然聖人設義初為隂爻困于株木三為隂爻困于疾藜上為隂爻困于葛藟三隂爻皆凶九二雖困乃朱紱方來九四雖囦其終反吉九五雖困乃徐有說三陽爻反吉以見小人之困君子君子終不可困而小人實自困也自古小人之困君子未有不自敗者聖人設此義以防民而後世小人猶有無忌憚者象曰澤无水困君子以致命遂志君子處困之道固如此初六臀困于株木入于幽谷三嵗不覿象曰入于幽谷幽不明也初與四為正應四君子也今有困君子之意故為九四所絶四處互體巽巽為木初欲托庇于其下已不能矣故困于株木自處坎之下坎北方幽都也故曰入于幽谷越三爻而求九四不能覿言為君子所棄也象曰幽不明也九二困于酒食朱紱方來利用享祀征凶无咎象曰困于酒食中有慶也二處坎中坎為酒食上下為同體二隂所困所困特飲食言所困之者小也朱紱君之服謂九五也詩曰朱紱斯皇室家君王言九五將以同徳來相求也故曰方來君臣同徳則可以受福故利用享祀然處二隂之中未可徃也故征㓙其困終亨故无咎象曰中有慶也見得君子未嘗困六三困于石㨿于蒺藜入于其宫不見其妻㓙象曰㨿于蒺藜乗剛也入于其宫不見其妻不祥也三隂爻本欲困君子今乃麗于二陽之間反為君子所困前遇九四困于石也退遇九二據于蒺藜也上六已應也已困于葛藟是不見其妻也象曰乗剛也謂乗九二之剛也不見其妻不祥也繫辭子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見乎九四來徐徐困于金車吝有終象曰來徐徐志在下也雖不當位有與也三陽以同徳相光几二在下陷乎二隂之間未能即來也故來徐徐上體兊為金下體坎為輪是金車也金車可以行處困之時未得行也雖吝然終必相求故有終象曰來徐徐志在下也謂九二也雖不當位有與也四爻所處之位雖不當然君子以同徳相求故有與前輩謂小人無黨蓋小人以利合終必相傾君子以理合終必相與九五劓刖困于赤紱乃徐有説利用祭祀象曰劓刖志未得也乃徐有說以中直也利用祭祀受福也五以陽剛處君位乃使小人得以困君子是誰之咎也五威福之權在已不過去上下之小人則君子亨矣劓刖也者用劓刑以劓在上之小人謂上六也用刖刑以刖在下之小人謂三與初也赤紱臣服詩曰彼其之子三百赤紱謂九二也上下小人既去則向者所困之赤紱乃徐徐而來以同徳而相説也君臣同徳則必受福故利用祭祀象以君子未得志而施刑故曰志未得也九二居中而相應故曰以中直也祭必受福故曰受福也上六困于葛藟于臲卼曰動悔有悔征吉象曰困于葛藟未當也動悔有悔吉行也小人扳援而據上位猶葛藟也然小人不宜在上故臲卼不安九五之君有施刑之志聖人故戒之曰動必悔不容幸免也必有悔而徃則吉謂小人無故困君子不獲罪而去則終必有僇辱之禍故曰動悔有悔吉行也謂小人能有悔而去是小人之福也是以吉行也巽下坎上井井改邑不改井无䘮无得徃來井井汔至亦未繘井羸其瓶凶彖曰巽乎水而上水井井養而不窮也改邑不改井乃以剛中也汔至亦未繘井未有功也羸其瓶是以凶也巽下坎上木上有水為井木井幹也轆轤之榦也汲井者必登于木榦之上上水下木汲之象也邑人所居其中有井都邑有遷徙而井常不移故曰改邑不改井无䘮无得徃來井井湘卿云利物而不費无䘮也功成而不居无得也來而汲則不拒汲而去則不追人有徃來而井之為井常自若也汲至則亦未繘井汔水涸也繘綆當水涸而至則未施綆而汲汲則羸其瓶蓋井水既涸則无以受瓶也故凶彖巽乎水而上水井此汲井之義也汲者以器巽乎水然後汲而上井道以出為功故曰上水井井養而不窮此言井之徳養物之功更无窮極惟有井之徳所以酌而不匱也邑可改而井不可改者以二五剛得中惟中有定守所以不隨世變移也當水涸而至未能有功是以有羸其瓶之凶也見在二爻象曰木上有水井君子以勞民勸相勞民勸相則恩意浹洽猶井之澤也七月之詩九功之歌沐浴膏澤而歌詠勞苦皆古人勸相之事也初六井泥不食舊井無禽象曰井泥不食下也舊井无禽時舎也井卦六爻剛領最好初井泥二井谷皆廢井也三井渫則渫初之泥四井甃則甃二之谷泥既渫谷既甃則井道全矣故五爻井冽而泉寒上爻則收而勿幕功用始及物而井道大成矣初六處最下故為井泥井水貴清而泥濁之宜其不食故井廢而舊禽亦不徃焉謂失井之道為時所棄也故象曰時舎也九二井谷射鮒甕敝漏象曰井谷射鮒无與也二居初之上而體則巽下是井湮而為谷也井既為谷其水必涸但鮒蟇相射而已于此施綆甕必敝漏蓋无以受甕也即彖所謂羸其瓶是也象曰无與也謂二所以為谷者以无與也四為之甃則有與矣九三井渫不食為我心惻可用汲王明並受其福象曰井渫不食行惻也求王明受福也三言井渫渫初之泥也所謂浚井也井泥雖浚人猶未食故至者心惻然以井澤未能及物也雖然亦可用汲矣猶之人也己徳既治有明王在上汲而進之則天下蒙福矣象曰行惻也言行者見之惻然也求王明受福也六四井甃无咎象曰井甃无咎修井也四井甃甃二之谷也所謂修井也谷既甃則井之體全矣象曰修井也初與二爻在下體為井之地故初井泥二井谷三與四居人位必盡人事故三井渫而四井甃以人事言也五與上則得之天矣是以三才之位取義也九五井洌寒泉食象曰寒泉之食中正也井至五爻初泥已浚二谷已修井道己全則井冽而泉寒為時所食所謂養而不窮徃來井井皆在此爻象曰中正也上六井收勿幕有孚元吉象曰元吉在上大成也五爻井冽可食上爻水已在木上綆汲而水出功用及物矣幕所以葢井也井功貴出无用幕也澤既及物故曰有孚井道大成故曰元吉象曰元吉在上大成也離下兊上革革己日乃孚元亨利貞悔亡彖曰革水火相息二女同居其志不相得曰革已日乃孚革而信之文明以説大亨以正革而當其悔乃亡天地革而四時成湯武革命順乎天而應乎人革之時義大矣哉澤上火下澤所以瀦水也水涸而火居焉非常之變也其卦為革唐虞禪夏后殷周繼聖人以天下世其子然不能必後世子孫之皆賢也有聖人起而易置之是其心也聖人不忍天下之塗炭乃身負犯上之名以合天人之心此天地之大變也而其事見于革文王三分天下有其二以服事商其事見于明夷文王非不能革也時未當革聖人不敢先時而當革聖人不敢後聖人不能違時能不失時而已文王晦其事于爻夫子發其秘于彖學者即彖以觀爻則革之義著矣曰革已日乃孚時既當革則信于心而革之雖聖人不敢私也利貞革以正也有湯武之志則可無湯武之志則亂也悔亡聖人舉事必得萬全事已而孚安得有悔彖義甚明象曰澤中有火革君子以治厯明時澤而有火澤之變也治厯明時所以察時之變初九鞏用黄牛之革象曰鞏用黄牛不可以有為也居革之下未嘗革也則固守臣節而不敢以妄動牛革堅牣之至言而此自固也時未可革湯武未嘗一日有无君之心也象曰不可以有為也六二已日乃革之征吉无咎象曰己日革之行有嘉也以臣革君自此而徃已日時已至也時既當革則徃而得吉且无咎也湯以七十里文王以百里天應人順湯武不敢辭徂征而壺漿迎仗鉞而元黄至是惟无徃徃則无敵于天下矣象曰行有嘉也九三征㓙貞厲革言三就有孚象曰革言三就又何之矣三處疑地聖人以身任天下之變雖欲无革不容无革曰征㓙貞厲進退皆危機也故言必三復既信而後行之升陑之師必在伊尹五就之後而孟津之後亦遲于三年觀兵之餘皆革言三就之餘也象曰又何之矣三就之後何徃不可九四悔亡有孚改命吉象曰改命之吉信志也四處下卦之上乾道乃革之位也變夏為商變商為周時之既至聖人不能却其來悔既亡衆既孚則改命而吉矣象曰信志也湯武之革湯武之心固自信天下之心亦无不信蓋非利也為匹夫匹婦復仇也九五大人虎變未占有孚象曰大人虎變其文炳也五正君位聖人既作萬物咸覩天下皆利見也然攸徂之民室家胥慶于未來蘇之前孟津之師八百國不期而自至天下之孚不在于既占之後也故曰大人虎變未占有孚象曰其文炳也上六君子豹變小人革面征㓙居貞吉象曰君子豹變其文蔚也小人革面順以從君也至此天下咸革矣君子自奮以副㧞擢小人洗濯以聴新政然征伐非聖人之得已也事已則歸馬放牛載槖弓矢示不復用蓋既革之後不可復征也故于既革之終戒以征㓙居貞吉象曰君子豹變其文蔚也小人革面順以從君也巽下離上鼎鼎元吉亨彖曰鼎象也以木巽火亨餁也聖人亨以享上帝而大亨以養聖賢巽而耳目聰明柔進而上行得中而應乎剛是以元亨鼎鼎象也全卦有鼎象初為鼎足二三四為鼎實五為鼎耳上為鼎鉉巽木離火以木巽火又鼎之用也故名卦以鼎大抵聖人制器皆有個自然之象昔禹平水土九牧貢金於是象物以鑄鼎示人知所避厯代傳之以為寳器武王克商遷九鼎于洛邑武王宅洛定鼎郟鄏卜世三十卜年八百及周之衰楚子問鼎周人假設以對以為在徳不在鼎秦漢而下鼎己淪亡武帝得寳鼎于汾隂薦告宗廟作為詩歌見于史冊然則鼎者國家之重器也聖人重易巽下離上已有其象故曰鼎鼎重器也主器必長子故曰元得鼎則昌失鼎則亡故曰吉用以享上帝養聖賢可以通于神明矣故曰亨彖曰鼎象也言卦有其象也以木巽火亨飪之義也亨以享上帝大亨以養聖賢皆鼎之用也下體巽上體離離為目為文明五為鼎耳故曰巽而耳目聰明六五一柔進居君位下應九二之剛此蓋鼎實在二鼎耳在五二五相應鼎道已全故曰得中而應乎剛是以元亨象曰木上有火鼎君子以正位凝命正位凝命主器者之事也離麗乎上所以正位巽申乎下所以凝命初六鼎顛趾利出否得妾以其子无咎象曰鼎顛趾未悖也利出否以從貴也以全卦之象言之初為趾二三四為實五為耳上為鉉全體一鼎象也分上下體之象而觀之則上下體為二鼎上體之鼎有耳而无足故九四云鼎折足下體之鼎有足而无耳故九三云鼎耳革六爻皆是取取象故彖縂言之曰鼎象也初為鼎足趾足也鼎有三足今二而已蓋顛傾也傾則見其二而已顛趾則傾鼎以出穢否穢也出穢以納新也取新之義也凡人納妾多出于夷俘賤𨽻但以其子之可貴豈計其所出之卑汚也亦棄穢取新之義也子以主器故于鼎之初言之如是則雖顛趾而无咎矣象曰未悖也言趾非直顛也以出穢而顛是故鼎道未悖利出否以從貴也妾以子貴故也九二鼎有實我仇有疾不我能即吉象曰鼎有實慎所之也我仇有疾終无尤也二為鼎實以剛居中有實之象也五二之匹也五為鼎耳麗乎上體不能下接有相疾之象然耳麗鼎上若圯而下則鼎虧矣雖不我即然終吉也象曰慎所之也耳麗乎上二為鼎實不能上徃故曰慎所之賴乎二不上徃五不下接而鼎道全故終无尢九三鼎耳革其行塞雉膏不食方雨虧悔終吉象曰鼎耳革失其義也三在下體之上分上下體言之有足而无耳耳革則不能舉以行而其行塞離為上為雉鼎既无耳雉无所立故不下食觀髙宗彤日雉升鼎耳而嗚今鼎耳既革宜其不食也若與上體合隂陽相合而鼎體全而悔散矣故曰方雨虧悔終吉象曰失其義也言耳革則失鼎之義也九四鼎折足覆公餗其形渥㓙象曰覆公餗信如何也四居上體之下分上下體而言之有耳而无足足既折其餗必覆不勝鼎之任也故慙靦見乎色而其形渥然象曰信如何也繫辭曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也六五鼎黄耳金鉉利貞象曰鼎黃耳中以為實也五鼎耳也鼎之舉動在耳五為鼎主位得中黄中色也故曰黄耳鉉所以舉鼎而行九居上金鉉也五必得上鼎體乃全未與上合利在乎貞蓋未可行也象曰中以為實也以黄取中義上九鼎玉鉉大吉无不利象曰玉鉉在上剛柔節也上鼎之鉉玉和物也鼎道貴和得玉鉉則隂陽和也而鼎之功成矣鉉一也五取金鉉上取玉鉉金以剛為義玉以和為義五體柔故以剛為貴上體剛故以和為貴離上為火而鉉居之金畏火而玉不畏火故成鼎之功以玉為貴也鼎之功成則享帝養賢而鼎道亨矣故大吉无不利象曰剛柔節也言隂陽和而得剛柔之節也西谿易說卷十
