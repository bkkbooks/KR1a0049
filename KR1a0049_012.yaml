body:
  text: 西溪易說卷十二宋李過撰下經兊下兊上兊兊亨利貞彖曰兊說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉兊說也上之使下下之事上非相說則不相得然有君子之說有小人之說君子易事而難說以理義而說也小人難事而易說以勢利而說也陽為君子隂為小人卦中六爻陽爻吉而隂爻凶君子小人之說固不同也兊亨說而亨也說則上下之情通利貞說以正也彖說之大民勸矣哉夫天地萬物不說則不能以相得而况乎君與民哉豳風七月皇華四牡為之歌咏其辛勤勞苦皆古者勸民之大略也象曰麗澤兊君子以朋友講習朋友講習所以求理義之說初九和兊吉象曰和兊之吉行未疑也處下而說易於同流而合汚不同之謂和有栁下惠之志然後可以言和兊象曰行未疑也所謂夷逸而不怨厄窮而不憫皆行未疑之事也九二孚兊吉悔亡象曰孚兊之吉信志也二應五君臣同德而相說孚兊之吉也象曰信志也六三來兊凶象曰來兊之凶位不當也以六居三工與六應小人之相說也小人易說故來則說九四商兊未寧介疾有喜象曰九四之喜有慶也四與初同德而說于三隂故去就不决商議而未寧若介然疾三之隂而說初之剛則有喜象曰有慶也九五孚于剝有厲象曰孚于剝位正當也五與二相孚而上六說之小人之說君將以剝君子也九五剛中之君當以嚴厲待之則得逺小人之道故曰有厲象曰孚于剝位正當也上六引兊象曰上六引兊未光也上與三應而相說小人之說也小人相濡沫兒女之常事也不言吉凶象曰上六引兊未光也坎下㢲上渙涣亨王假有廟利涉大川利貞彖曰涣亨剛來而不窮柔得位乎外而上同王假有廟王乃在中也利涉大川乘木有功也涣散而未得所萃之時也九五為涣之主涣而欲萃必萃于五卦爻皆歸五涣亨涣有亨之理王假有廟宗廟人心所係有廟則人心定矣利涉大川上下共濟則涣而萃矣彖曰剛來而不窮卦自否來九四一剛來居九二與五為同德之應相與以濟涣柔得乎外而上同六二一柔上居六四得大臣之位而上同于五九五為涣主所以成涣之功者以此二爻一為近臣一為正應之臣故也王假有廟王乃在中也在中謂九五也卦中㢲木居坎上有舟可以濟難故曰利涉大川乘木有功也象曰風行水上渙先王以亨于帝立廟亨帝立廟則涣之主定矣初六用拯馬壯吉象曰初六之吉順也當涣之時人必求主五為涣主初居最下非壯馬則不能逺征故極馬壯吉象曰初六之吉順也九二涣奔其杌悔亡象曰涣奔其杌得願也二與五應而又同德奔五則登五之杌謂設杌以待其來也如信往而登壇良往而帷幄皆奔其杌之謂也象曰涣奔其機得願也六三涣其躬無悔象曰渙其躬志在外也三與上應而上無位不若自身拔而歸五故曰涣其躬無悔如信布等棄楚而歸漢也象曰涣其躬志在外也六四涣其羣元吉涣有丘匪夷所思象曰涣其羣元吉光大也六四近五任五腹心之寄羣集天下之才以為五用故涣其羣元吉丘者物之所聚凡一智一能收拾無遺如丘之聚物又當脫略邊幅不可有等夷之思則人才萃而九五之初濟矣漢之蕭何唐之元齡皆當此任不然則才人之歸無所受也象曰涣其羣元吉光大也居此位者非光大之臣不可所謂其心休休其如有容者也然後可以受天下之才九五涣汗其大號涣王居無咎象曰王居無咎正位也五為涣主濟涣之功既正君位則大告天下令出如汗可出不可反故曰涣汗其大號涣王居即王者之居也象曰王居無咎正位也上九涣其血去逖出無咎象曰涣其洫逺害也九居卦上涣功成而論賞也當渙之時患難相同未必心契功成居賞則君疑而邪念起矣當此之時髙飛逺引不以爵邑為事如子房之長往則無良弓走狗之禍矣故曰涣其血去逖出無咎象曰涣其血逺害也蓋若臣以涣而合非有堂陛之素必不能相終凡此皆逺害之道也兊下坎上節節亨苦節不可貞彖曰節亨剛柔分而剛得中苦節不可貞其道窮也說以行險當位以節中正以通天地節而四時成節以制度不傷財不害民天下之物莫不有節節則也理之不可過者也天下之財有限而人主之欲無窮聖人立為中正之制凡衣服飲食器用之具多寡之數尺寸之度皆有常則而不可過故儉為聖人之微然儉不中節則于禮無取茅茨土階卑宫菲食聖人躬行之然而各當其可墨子之治喪必尚儉晏子豚肩不掩豆以為禮又非可以通行而强衆聖人節天下以禮禮者制中之禮非可太過而不及曰節亨節所以通也聖人不强人所不能節而極為苦節非可常之道也故曰苦節不可貞彖以二卦言之可以見節之義六爻剛與柔分而二五剛皆得中所以無太過不及而可以通行者也如苦節則失之太過而極不能强制故其道窮也下體說上體險人心險于山川其欲至難節也非其中心之樂則不能說以行險是以能節也六爻九五居中為節之主剛當其位節以中正得節天下之道故曰當位以節中正以通天地之道亦莫不有節也隂陽寒暑之運未嘗有過然後四時相推而成嵗聖人觀天地之節為天下立一定之制凡貴賤等級衣服器用皆有常則以其所入供其所出與天下共由之而君民無有餘不足之患故周人以千八百國之財奉千八國之君而天下常冨秦人以千八百國之財奉一人之身而天下常貧由制度之立與不立故也故曰節以制度不傷財不害民象曰澤上有水節君子以制數度議德行澤所以節水今澤上猶有水未歸隄防也必思隄防之功所謂川有防器有範見禮教之至制數度節以外也議德行節于內也德必稱位則不窮天下以奉一已之欲初九不出户庭無咎象曰不出户庭知通塞也處下居節之始人心與物交則為物所引傷財害民皆由此生能謹密而不出則無咎矣故曰不出户庭無咎象曰知通塞也當其在下可以無出非終無出也二爻則出矣故曰知通塞九二不出門庭凶象曰不出門庭凶失時極也時行時止所謂時中也初在下不出户庭可也二不出門庭則非時中之道矣處顔子時閉户可也處禹稷時則以被髮纓冠為中矣象曰失時極也極中也所謂時中之道也六三不節若則嗟若無咎象曰不節之嗟又誰咎也三柔體位不當不能節者也窮則必嗟嗟則反乎節故無咎武帝三十年兵禍漢幾危矣輪臺一悔尚足為國故不節之嗟聖人許之象曰不節之嗟又誰咎也六四安節亨象曰安節之亨承上道也四大臣之位古者王后之用有司不敢㑹大臣得以九式而撙節之然不可太過也以萬乘之尊使其自奉無以異于閭閻之匹夫則其心必不安故曰安節吉使君心安于節則吉也象曰承上道也節君之道如此也九五甘節吉往有尚象曰甘節之吉居位中也處君位而能節必其心之樂惡衣菲食弋綈革寫必其所樂之不存者彼自以為甘也以此而往吉莫大矣故曰甘節吉往有尚象曰居位中也以所居位中當以節者也上六苦節貞凶悔亡象曰苦節貞凶其道窮也處節之極節之苦也不可貞之道也然苦節而凶必無傷財害民之弊故悔亡象曰苦節貞凶其道窮也兊下㢲上中孚中孚豚魚吉利涉大川利貞彖曰中孚柔在內而剛得中說而㢲孚乃化邦也豚魚吉信及豚魚也利涉大川乘木舟虛也中孚以利貞乃應乎天也湘卿云孚卵也羽物之卵化也外實中虛節之象也卵之致用則中故曰中孚仁及草木言草木難仁也誠動金石言金石難誠也信及豚魚言豚魚難信也草木金石豚魚天也天則真君臣父子兄弟夫婦朋友人也人則情聖人與天同德任真不任情故信及豚魚然後為吉中孚六畫有舟之象故利涉大川彖柔在內而剛得中二柔居三四柔雖在內二五以剛得中下體說而上體㢲以理用相孚五為中孚之主化邦之道亦由是也故曰孚乃化邦也豚魚難信也信及豚魚信之至也六爻中虛有舟象焉上體為木故曰乘木舟虛也人心之乎出于天理之正則無往而不孚矣故曰中孚以利貞乃應乎天也卯化之孚全是天理六爻初言人心之孚三與四取舟義二與五與上言卯化之道象曰澤上有風中孚君子以議獄緩死澤水平得風便成濤其感至易定而能應之象也議獄緩死哀矜惻怛出于至誠皆可以見中孚初九虞吉有它不燕象曰初九虞吉志未變也虞祭也葬反而虞所謂其去也如慕其反也如疑此心純乎親也有它不燕所謂食㫖不甘聞樂不樂也可以見中孚故于初爻言之曰志未變也言其純一而未變也能常存此心如有它不燕時則中孚之理具矣九二鳴鶴在隂其子和之我有好爵吾與爾靡之象曰其子和之中心願也孚羽物之卵化者惟卵化可以見中孚卵化之物啐啄同時鶴鳴于隂子和于卵母子未相知也而啐啄已相應此純乎天理而不容以人參也相孚之道莫切于此人之相孚形體雖有爾我之異而天爵之同處不約而合故曰我有好爵吾與靡之象曰中心願也繫辭子曰君子居其室出其言善則千之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎六三得敵或鼓或罷或泣或歌象曰或鼓或罷位不當也中孚有舟象三四二隂處舟之中位皆不正不能相孚同舟而遇風波胡越可以共濟心苟二三則舟中之人皆敵國三與四不孚而敵故曰得敵或鼓或罷或泣或歌方其敵則鼓而泣敵已則罷而歌小人喜怒無常之態象曰位不當也言所居之位不正故小人之情態自見六四月幾望馬匹亡無咎象曰馬匹亡絶類上也四隂在上體近五望也匹敵也二隂同類而敵四能不與三比亡其匹而獨處則無咎象曰馬匹亡絶類上也三已之類絶之而居上也九五有孚攣如無咎象曰有孚攣如位正當也五與二相孚鶴鳴在二而子和在五相孚也以天攣如卵化之物方其拳然之時已有孚感之意然後可以言天理之孚故以攣如言之象曰位正當也言所之位正故其中以孚也上九翰音登于天貞凶象曰翰音登于天何可長也說闕艮下震上小過小過亨利貞可小事不可大事飛鳥遺之音不宜上宜下大吉彖曰小過小者過而亨也過以利貞與時行也柔得中是以小事吉也剛失位而不中是以不可大事也有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也小過隂過乎陽也二陽失位而不中隂得位而中故為小過小過亨小者過而亨也小人之道不可過也過安得亨蓋雖小道必有可觀惟致逺則恐泥故君子弗由言必信行必果雖非大人之事而言行信謹又非始學之可忽故小道亦有時而亨也利貞隂不可長利乎貞也亦不可常貞故彖曰與時行也所謂大德不踰間小德出入可也柔得中可小事也剛失中不可大事也卦有飛鳥之象上體飛而下下體飛而上飛鳥遺之音謂上六也六極而亢有遺墜之音初飛而上六飛而下飛上者逆飛下者順隂道不可令居上故卦言不宜上宜下彖言上逆而下順也象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉雷在天則為雨雷而在山則不成雨隂過之象也君子行過乎恭喪過乎哀用過乎儉小而過者也若大德則不踰間初六飛鳥以凶象曰飛鳥以凶不可如何也卦有飛鳥之象初飛而上隂不宜上故象曰不可如何也六二過其祖遇其妣不及其君遇其臣無咎象曰不及其君臣不可過也三二之父四二之祖過其祖而遇六是遇妣也五君位陽不居之不及其君也而公在焉是遇其臣也然以二遇五同為隂過故無咎象曰不及其君臣不可過也九三弗過防之從或戕之凶象曰從或戕之凶如何也三居下卦二隂過而陽不過三必防之若從之則被其戕而凶也象曰從或戕之凶如何也九四無咎弗過遇之往厲必戒勿用永貞象曰弗過遇之位不當也往厲必戒終不可長也四居上體二隂過而四不過然隂得位而在已上與之遇則可以免害往見小人危道也必加謹戒然從權則可非可用以為常也故勿用永貞象曰勿過遇之位不當也往厲必戒終不可長也四與三同弗過而三以防小人為義四以遇小人為義者蓋三處二隂之上小人在己下可得而防也四處二隂之下小人在己上不可得而防也故必往遇六五密雲不雨自我西郊公弋取彼在穴象曰密雲不雨己上也五君位而隂居之隂唱則不成雨君子失位此非隂所宜據也欲不得于君子一隂猶據上能就穴弋而取之以自納則猶可也臣爵極于公故言公象曰密雲不雨己上也上六弗遇過之飛鳥離之凶是謂災眚象曰弗遇過之已亢也四與二遇而六不遇六過而上也故曰弗遇過之五有弋己之意己巳麗六五之弋據髙不下災至而凶矣故曰飛鳥離之凶象曰弗遇過之已亢也言柔不當亢而在上也離下坎上既濟既濟亨小利貞初吉終亂彖曰既濟亨小者亨也利貞剛柔正而位當也初吉柔得中也終止則亂其道窮也既濟時之既濟也水在火上水火之功成火在水上水火之情睽既濟未濟之别也古人洪濟艱難不敢自止所謂若涉淵水豫惟往求朕攸濟必往必來安得不濟全卦有狐象以正體互體皆為坎離坎離水火也狐能水火故有狐象老狐能濟者也少狐不能濟者也既濟以九居初老狐也濡尾而曳輪未濟以六居初少狐也濡尾而不往既濟未濟合在初爻故既濟初曳輪三伐國五成既濟之功未濟二曳輪四伐國六成未濟之功大抵又遇陽則能濟遇隂則不能濟爻之陰陽相間全係初一爻曰既濟亨既濟則亨也又曰小利貞彖中解作小者亨也利貞剛柔正而位當也蓋老狐能濟者也能濟則以濟為常少狐不能濟者也不能濟則以濟為喜老狐既濟則少狐亦隨之而濟老狐以濟為常安其亨者也少孤以濟為喜有其亨者也苟有其亨則不能保既濟之功故既亨之後則小者當利貞以小者有其亨故也剛柔正而位當則成功可保矣至上六爻以柔居終反成濡首之害是不能貞小之驗也禹與稷濟盡天下之饑溺而不自矜伐齊桓公才服江黃便有震矜之色者無他此緣伯者之器小故耳故文王卦辭曰既濟亨小利貞聖人之彖辭曰小者亨也蓋惟小者有其亨故當利貞初吉曳輪而吉也終亂濡首而亂也不難于初而難于終所貴乎利貞彖既濟亨小者亨也小者有其亨也利貞剛柔正而位當也剛柔位正故能保既濟之功也初吉柔得中也初之所以吉者以初九曳輪而二柔終猶得中終止則亂其道窮也象曰水在火上既濟君子以思患而預防之水在火上水火之功成既濟之象也思患預防在既濟之後安而不忘危也四爻見之初九曳其輪濡其尾無咎象曰曳其輪義無咎也六爻陽善陰不善二戒喪茀四戒衣袽六戒濡首皆陰居之初善曳輪三善伐國五善受福皆陽居之福濟事在剛不在柔也初以陽居濟之始剛而能濟者也曳輪而往雖濡尾不恤也故能成既濟之功象曰曳其輪義無咎也六二婦喪其茀勿逐七日得象曰七日得以中道也以六居二婦道也濟而喪茀茀車蔽也勿逐而往越次得五濟道成矣坎數七故曰勿逐七日得謂不可喪茀而不往也象曰七日得以中道也謂柔得中猶可濟也九三髙宗伐鬼方三年克之小人勿用象曰三年克之憊也三居既濟之中以陽居陽用力以濟者也如髙宗伐鬼方三年而後克之不以師老而止也位在三故曰三年然三代之兵不用小人蓋無所用小人也象曰三年克之憊也三年而後克兵力亦憊矣苟有小人間其中是乎一亂而生一亂也聖人此意甚微學者冝思之六四繻有衣袽終日戒象曰終日戒有所疑也三既克國以六處四安必忘危衣袽所以基舟漏也治平之世罅漏易生故必思患而預防之終日之間無時而不戒所以保成功也象曰終日戒有所疑也九五東鄰殺牛不如西鄰之禴祭實受其福象曰東鄰殺牛不如西鄰之時也實受其福吉大來也五為既濟之主三既伐國矣夫人處功成治定之後必生侈心古之聖人其成功也必制為四時之定祭外此皆徼福者也故于五爻有殺牛之戒禴則四時之定祭也後世人主邊境才無事則禱祠之事起漢唐英主皆所不免且如髙宗中興之賢君伐國之後黷于祭祀有所不免以來鼎雉之變祖已作戒見于書者可驗也故聖人于此卦三爻取髙宗伐國五爻以祭祀言之其為後世慮者深矣故象曰不如西鄰之時也以禴者四時之定祭也外此而殺牛皆諂也上六濡其首厲象曰濡其首厲何可久也以六居上非能守既濟之功者也所謂終止則亂者也故濡首而且危治亂無常惟人所召既濟之終亂形已兆所以成未濟也象曰濡其首厲何可久也坎下離上未濟未濟亨小狐汔濟濡其尾無攸利彖曰未濟亨柔得中也小狐汔濟未出中也濡其尾無攸利不續終也雖不當位剛柔應也火在水上水火之情睽故成未濟以六居初濡尾而不能曳輪故不成濟然卦有三陽曳輪伐國無異于既濟但初爻得陰故曳輪不在初而在二伐國不在三而在四飲酒不在五而在六故未濟不如既濟之初既濟不如未濟之終陰陽之自然也曰未濟亨未濟而求所以濟也小狐汔濟汔水涸也狐之老者能濟故未涸而亦濟既濟之初濡尾而曳輪是也狐之小者不能濟必待涸而後濟未濟之初濡尾而不曳輪是也以六居初小狐也小狐汔濟所以成未濟也濡其尾無攸利皆指初六彖未濟亨柔得中也以六居五柔得中能資衆陽以共濟故未濟而亨也小狐汔濟未出中也如既濟柔處二而得中雖婦道亦濟也未濟柔居五而能出中故謂小狐汔濟也濡其尾無攸利也不續終也以濡尾曳輪非可繼之道也雖初位不當然六爻剛柔皆相應以六五柔主資九二陽剛之大臣故二曳輪而四伐國未濟之功成矣故曰雖不當位剛柔應也象曰火在水上未濟君子以思辨物居方火在水上水火不相射則各從其類當未濟之時紀綱多壞亂辨物居方君子急務蓋平亂之道要在夫紀綱定初六濡其尾吝象曰濡其尾亦不知極也以柔居未濟之初非能濟者故濡尾而吝卦所謂小狐汔濟者也象曰亦不知極也極終也濡尾不往莫知所終即彖所謂不續終也九二曳其輪貞吉象曰九二貞吉中以行正也二陽剛得中健而能濟有應在五可以成未濟之功故初不曳輪而二曳輪得正而吉也象曰九二貞吉中以行正也六三未濟征凶利涉大川象曰未濟征凶位不當也以六居三處坎之極非能濟者以未濟而征凶也涉坎則利矣故曰利陟大川象曰未濟征凶位不當也九四貞吉悔亡震用伐鬼方三年有賞于大國象曰貞吉悔亡志行也涉坎居之以九居之未濟而能濟者也故曰貞吉悔亡當伐國之任用此以伐鬼方可三年而克克則行賞于大國行賞在上九興師在九四四勝任故并言之象曰貞吉悔亡志行也六五貞吉無悔君子之光有孚吉象曰君子之光其暉吉也六五為未濟之主離明居中貞吉而無悔矣下得二陽之助二陽君子也進遇離明之主相與共濟君子之道光矣六五君位下得陽助剛柔相孚吉孰大焉象曰君子之光其暉吉也上六有孚于飲酒無咎濡其首有孚失是象曰飲酒濡首亦不失節也四伐國逆闕六闕三年功成行賞之時也古者師行受賑反闕策勳也闕相孚故曰有孚于飲酒當此賞功之時思既濟之閔而失有孚之道者正在此爻今濟道既成宜用以闕有孚失是蓋以九居上故能保成功如此象曰亦不失節也當飲酒之時而思濡首之戒可謂不失節也未濟與既濟只爭一爻聖人設卦不終既濟而終未濟者序卦云物不可窮也故受之以未濟終焉終未濟所以寓生生不窮之意也然上經首乾坤終坎離下經首咸恆終既濟未濟亦坎離也天地之道不過陰陽五行之用莫先水火上經首天地陰陽之正也故以水火之正終焉下經首夫婦陰陽之交也故以水火之交終焉終始之意義蓋如此西溪易說卷十二
